<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>בנק הפריטים — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{
  --ink:#1c1208;--gold:#d4a843;--gold2:#f0c060;
  --parch:#fdf5e0;--surface:rgba(44,26,14,0.88);
  --border:rgba(212,168,67,0.18);--border2:rgba(212,168,67,0.38);
  --green:#1a5c2a;--red:#8b2020;
  --cat1:#1a2e1a;--cat2:#1a1a2e;--cat3:#2e1a0d;--cat4:#2e0d2e;--cat5:#0d2e2e;
  --cat1b:rgba(42,110,42,.35);--cat2b:rgba(42,42,180,.3);
  --cat3b:rgba(180,90,20,.3);--cat4b:rgba(140,20,140,.3);--cat5b:rgba(20,140,140,.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Heebo',sans-serif;background:#0f0a04;color:var(--parch);direction:rtl;min-height:100vh;}

/* TOPBAR */
.topbar{background:rgba(15,8,2,.97);border-bottom:1px solid var(--border2);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;font-weight:700;color:var(--gold2);}
.btn-add{padding:8px 18px;background:linear-gradient(135deg,var(--gold),#b8860b);color:var(--ink);border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .18s;}
.btn-add:hover{opacity:.9;}
.btn-back{padding:5px 14px;background:none;border:1px solid var(--border2);color:var(--gold);border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:600;}
.btn-back:hover{background:rgba(212,168,67,.1);}

/* MAIN */
.main{padding:24px;max-width:1100px;margin:0 auto;}

/* CATEGORY */
.category-section{margin-bottom:32px;}
.category-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.category-icon{font-size:1.3rem;}
.category-name{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--gold2);}
.category-count{font-size:.75rem;opacity:.4;}

/* ITEMS GRID */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}

/* ITEM CUBE */
.item-cube{
  border-radius:12px;padding:14px 10px;text-align:center;
  cursor:pointer;transition:all .2s;
  border:1.5px solid var(--border);
  background:var(--surface);
  position:relative;
}
.item-cube:hover{transform:translateY(-3px);border-color:var(--gold);}
.item-cube .cube-icon{font-size:1.6rem;margin-bottom:6px;display:block;}
.item-cube .cube-name{font-size:.8rem;font-weight:700;line-height:1.3;}
.item-cube .cube-edit{
  position:absolute;top:6px;left:6px;
  padding:2px 7px;font-size:.65rem;font-weight:700;
  background:rgba(212,168,67,.15);border:1px solid var(--border);
  border-radius:10px;color:var(--gold);cursor:pointer;
  opacity:0;transition:opacity .18s;font-family:'Heebo',sans-serif;
}
.item-cube:hover .cube-edit{opacity:1;}

/* category colors */
.cat-1{background:var(--cat1);border-color:var(--cat1b);}
.cat-1:hover{border-color:#6ee7a0;}
.cat-2{background:var(--cat2);border-color:var(--cat2b);}
.cat-2:hover{border-color:#93c5fd;}
.cat-3{background:var(--cat3);border-color:var(--cat3b);}
.cat-3:hover{border-color:#fcd34d;}
.cat-4{background:var(--cat4);border-color:var(--cat4b);}
.cat-4:hover{border-color:#c4b5fd;}
.cat-5{background:var(--cat5);border-color:var(--cat5b);}
.cat-5:hover{border-color:#67e8f9;}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#1a0f05;border:1px solid var(--border2);border-radius:18px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);}

/* MODAL HEADER */
.modal-header{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-icon{font-size:2.2rem;flex-shrink:0;}
.modal-title-wrap{flex:1;}
.modal-title{font-family:'Frank Ruhl Libre',serif;font-size:1.3rem;font-weight:700;color:var(--gold2);}
.modal-cat-badge{font-size:.72rem;font-weight:700;padding:2px 10px;border-radius:12px;display:inline-block;margin-top:4px;opacity:.7;}
.modal-close{padding:6px 10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--parch);cursor:pointer;font-size:.9rem;flex-shrink:0;}

/* MODAL BODY */
.modal-body{padding:16px 24px 24px;}
.modal-section{margin-bottom:18px;}
.modal-section-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.4;margin-bottom:8px;}
.modal-desc{font-size:.88rem;line-height:1.65;opacity:.8;}
.modal-desc p{margin-bottom:6px;}

/* STYLES LIST */
.styles-list{display:flex;flex-direction:column;gap:7px;}
.style-item{background:rgba(253,245,224,.05);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.style-name{font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:3px;}
.style-desc{font-size:.78rem;opacity:.6;line-height:1.5;}

/* WRITE AREA */
.write-area{width:100%;background:rgba(253,245,224,.05);border:1.5px solid var(--border);border-radius:10px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;padding:12px;resize:vertical;min-height:90px;outline:none;transition:border .18s;}
.write-area:focus{border-color:var(--gold);}
.write-area::placeholder{opacity:.3;}
.ai-strip{display:flex;gap:8px;margin-top:8px;}
.ai-input{flex:1;background:rgba(253,245,224,.05);border:1px solid var(--border);border-radius:8px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.83rem;padding:8px 12px;outline:none;}
.ai-input:focus{border-color:var(--gold);}
.ai-btn{padding:8px 14px;background:linear-gradient(135deg,var(--gold),#b8860b);color:var(--ink);border:none;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:700;}
.ai-reply{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.15);border-radius:8px;padding:10px 12px;font-size:.82rem;line-height:1.55;margin-top:8px;display:none;}
.ai-thinking{font-size:.75rem;opacity:.4;font-style:italic;margin-top:6px;display:none;}

/* MODAL FOOTER */
.modal-footer{padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end;}
.btn-save{padding:10px 24px;background:linear-gradient(135deg,var(--gold),#b8860b);color:var(--ink);border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;}
.btn-cancel{padding:10px 18px;background:none;border:1.5px solid var(--border2);color:var(--parch);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;cursor:pointer;}
.btn-delete{padding:10px 18px;background:rgba(139,32,32,.2);border:1px solid rgba(139,32,32,.4);color:#f87171;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;cursor:pointer;}

/* ADD ITEM MODAL */
.form-row{margin-bottom:14px;}
.form-label{font-size:.82rem;font-weight:700;margin-bottom:6px;display:block;opacity:.7;}
.form-input{width:100%;background:rgba(253,245,224,.06);border:1.5px solid var(--border);border-radius:8px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;padding:9px 12px;outline:none;}
.form-input:focus{border-color:var(--gold);}
.form-select{width:100%;background:rgba(20,10,2,.9);border:1.5px solid var(--border);border-radius:8px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;padding:9px 12px;outline:none;}
.form-textarea{width:100%;background:rgba(253,245,224,.06);border:1.5px solid var(--border);border-radius:8px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.85rem;padding:9px 12px;resize:vertical;min-height:80px;outline:none;}
.form-textarea:focus,.form-input:focus,.form-select:focus{border-color:var(--gold);}
.form-textarea::placeholder,.form-input::placeholder{opacity:.3;}

/* styles editor */
.styles-editor{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
.style-edit-row{display:flex;gap:8px;}
.style-edit-name{width:150px;flex-shrink:0;}
.style-edit-desc{flex:1;}
.style-remove{padding:0 8px;background:rgba(139,32,32,.2);border:1px solid rgba(139,32,32,.3);border-radius:6px;color:#f87171;cursor:pointer;font-size:.8rem;}
.btn-add-style{padding:6px 14px;background:rgba(212,168,67,.1);border:1px solid var(--border2);border-radius:6px;color:var(--gold);font-family:'Heebo',sans-serif;font-size:.78rem;cursor:pointer;}

.empty-bank{text-align:center;padding:60px 20px;opacity:.3;font-size:.9rem;}
.spin{display:inline-block;animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* used-in chips */
.used-chip{padding:4px 12px;border-radius:14px;font-size:.78rem;font-weight:700;}
.used-chip.on{background:rgba(42,110,42,.25);border:1px solid rgba(42,180,42,.35);color:#6ee7a0;}
.used-chip.off{background:rgba(253,245,224,.04);border:1px solid var(--border);color:var(--parch);opacity:.3;}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn-back" onclick="history.back()">← חזרה</button>
    <div class="topbar-title">📦 בנק הפריטים</div>
  </div>
  <button class="btn-add" onclick="openAddModal()">+ הוסף פריט</button>
</div>

<div class="main" id="main-content">
  <div class="empty-bank"><span class="spin">⏳</span><br>טוען פריטים...</div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="view-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="vm-icon">📄</div>
      <div class="modal-title-wrap">
        <div class="modal-title" id="vm-title">שם הפריט</div>
        <span class="modal-cat-badge" id="vm-cat"></span>
      </div>
      <button class="modal-close" onclick="closeModal('view-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section" id="vm-desc-section">
        <div class="modal-section-title">על הפריט</div>
        <div class="modal-desc" id="vm-desc"></div>
      </div>
      <div class="modal-section" id="vm-styles-section">
        <div class="modal-section-title">סגנונות ודוגמאות</div>
        <div class="styles-list" id="vm-styles"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">מומלץ לשימוש ב</div>
        <div id="vm-used-in" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;"></div>
        <div style="font-size:.72rem;opacity:.35;font-style:italic;">המלצה בלבד — ניתן למשוך לכל קרון</div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">תקציר הפריט</div>
        <textarea class="write-area" id="vm-notes" placeholder="כתבי תקציר קצר על הפריט, מתי מומלץ להשתמש בו ודוגמאות מהניסיון..."></textarea>
        <div class="ai-strip">
          <input class="ai-input" id="vm-ai-input" placeholder="שאלי את עוזר ההוראה..." onkeydown="if(event.key==='Enter') askViewAI()">
          <button class="ai-btn" onclick="askViewAI()">🤖 שאלי</button>
        </div>
        <div class="ai-thinking" id="vm-ai-thinking">חושב...</div>
        <div class="ai-reply" id="vm-ai-reply"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('view-modal')">סגור</button>
      <button class="btn-save" onclick="saveItemNotes()">💾 שמור תקציר</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">✏️</div>
      <div class="modal-title-wrap">
        <div class="modal-title" id="em-title">פריט חדש</div>
      </div>
      <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">שם הפריט</label>
        <input class="form-input" id="em-name" placeholder="למשל: שאלה פתוחה">
      </div>
      <div class="form-row">
        <label class="form-label">אייקון (אמוג׳י)</label>
        <input class="form-input" id="em-icon" placeholder="למשל: ❓" style="width:100px;">
      </div>
      <div class="form-row">
        <label class="form-label">קטגוריה</label>
        <select class="form-select" id="em-cat">
          <option value="0">📝 שאלות ומשימות</option>
          <option value="1">✍️ כתיבה ויצירה</option>
          <option value="2">🎬 מדיה</option>
          <option value="3">🎮 משחקי ידע ותחרות</option>
          <option value="4">🔍 גילוי מיון והתאמה</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">הסבר על הפריט</label>
        <textarea class="form-textarea" id="em-desc" placeholder="תיאור קצר של הפריט, מטרתו ואופן השימוש..."></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">סגנונות / דוגמאות</label>
        <div class="styles-editor" id="em-styles-editor"></div>
        <button class="btn-add-style" onclick="addStyleRow()">+ הוסף סגנון</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="em-delete-btn" style="display:none;" onclick="deleteItem()">🗑 מחק פריט</button>
      <button class="btn-cancel" onclick="closeModal('edit-modal')">ביטול</button>
      <button class="btn-save" onclick="saveItem()">💾 שמור פריט</button>
    </div>
  </div>
</div>

let bankItems=[];

// ── INIT ──
window.onload=function(){
  db.ref('teacher/itemBank').once('value',snap=>{
    const saved=snap.val();
    if(saved){
      bankItems=Object.values(saved);
    } else {
      // טעינת ברירת מחדל
      bankItems=DEFAULT_ITEMS.map(item=>({...item}));
      saveBankToFirebase();
    }
    renderBank();
  });
};

function saveBankToFirebase(){
  const obj={};
  bankItems.forEach(item=>obj[item.id]=item);
  db.ref('teacher/itemBank').set(obj);
}

// ── RENDER ──
function renderBank(){
  const main=document.getElementById('main-content');
  main.innerHTML='';
  CATS.forEach((cat,ci)=>{
    const items=bankItems.filter(it=>it.cat===ci);
    if(!items.length)return;
    const sec=document.createElement('div');
    sec.className='category-section';
    sec.innerHTML=`<div class="category-header">
      <span class="category-icon">${cat.icon}</span>
      <span class="category-name">${cat.name}</span>
      <span class="category-count">(${items.length} פריטים)</span>
    </div>
    <div class="items-grid">
      ${items.map(item=>`
        <div class="item-cube ${cat.cls}" onclick="openViewModal('${item.id}')">
          <button class="cube-edit" style="display:none;"></button>
          <span class="cube-icon">${item.icon||'📄'}</span>
          <div class="cube-name">${item.name}</div>
        </div>`).join('')}
    </div>`;
    main.appendChild(sec);
  });
}

// ── VIEW MODAL ──
function openViewModal(id){
  currentItemId=id;
  const item=bankItems.find(it=>it.id===id);
  if(!item)return;
  const cat=CATS[item.cat];
  document.getElementById('vm-icon').textContent=item.icon||'📄';
  document.getElementById('vm-title').textContent=item.name;
  const badge=document.getElementById('vm-cat');
  badge.textContent=cat?.name||'';
  badge.style.background=`rgba(212,168,67,.15)`;
  badge.style.color='var(--gold)';
  // desc
  const descEl=document.getElementById('vm-desc');
  descEl.innerHTML=`<p>${item.desc||''}</p>`;
  document.getElementById('vm-desc-section').style.display=item.desc?'block':'none';
  // styles
  const stylesEl=document.getElementById('vm-styles');
  const stylesSec=document.getElementById('vm-styles-section');
  if(item.styles&&item.styles.length){
    stylesEl.innerHTML=item.styles.map(s=>`
      <div class="style-item">
        <div class="style-name">${s.name}</div>
        <div class="style-desc">${s.desc||''}</div>
      </div>`).join('');
    stylesSec.style.display='block';
  } else {
    stylesSec.style.display='none';
  }
  document.getElementById('vm-notes').value=item.notes||'';
  document.getElementById('vm-ai-reply').style.display='none';
  document.getElementById('vm-ai-input').value='';
  // usedIn
  const usedIn=item.usedIn||[];
  const usedLabels=[{key:'intro',label:'🌅 פתיח'},{key:'body',label:'🚂 גוף השיעור'},{key:'closing',label:'🌇 סיום'},{key:'enrichment',label:'⭐ העשרה'}];
  document.getElementById('vm-used-in').innerHTML=usedLabels.map(u=>
    `<span class="used-chip ${usedIn.includes(u.key)?'on':'off'}">${u.label}</span>`).join('');
  document.getElementById('view-modal').classList.add('open');
}

function saveItemNotes(){
  const item=bankItems.find(it=>it.id===currentItemId);
  if(!item)return;
  item.notes=document.getElementById('vm-notes').value;
  db.ref(`teacher/itemBank/${item.id}`).update({notes:item.notes});
  closeModal('view-modal');
}

function editFromView(){
  closeModal('view-modal');
  openEditModal(currentItemId);
}

// ── EDIT MODAL ──
function openEditModal(id){
  editingItemId=id||null;
  const item=id?bankItems.find(it=>it.id===id):null;
  document.getElementById('em-title').textContent=item?'ערכי פריט':'פריט חדש';
  document.getElementById('em-name').value=item?.name||'';
  document.getElementById('em-icon').value=item?.icon||'';
  document.getElementById('em-cat').value=item?.cat||0;
  document.getElementById('em-desc').value=item?.desc||'';
  document.getElementById('em-delete-btn').style.display=item?'block':'none';
  buildStylesEditor(item?.styles||[]);
  document.getElementById('edit-modal').classList.add('open');
}

function openAddModal(){openEditModal(null);}

function buildStylesEditor(styles){
  const editor=document.getElementById('em-styles-editor');
  editor.innerHTML=(styles.length?styles:[{name:'',desc:''}]).map((s,i)=>`
    <div class="style-edit-row">
      <input class="form-input style-edit-name" placeholder="שם הסגנון" value="${esc(s.name||'')}">
      <input class="form-input style-edit-desc" placeholder="תיאור קצר" value="${esc(s.desc||'')}">
      <button class="style-remove" onclick="removeStyleRow(this)">✕</button>
    </div>`).join('');
}

function addStyleRow(){
  const editor=document.getElementById('em-styles-editor');
  const row=document.createElement('div');
  row.className='style-edit-row';
  row.innerHTML=`<input class="form-input style-edit-name" placeholder="שם הסגנון">
    <input class="form-input style-edit-desc" placeholder="תיאור קצר">
    <button class="style-remove" onclick="removeStyleRow(this)">✕</button>`;
  editor.appendChild(row);
}

function removeStyleRow(btn){btn.parentElement.remove();}

async function saveItem(){
  const name=document.getElementById('em-name').value.trim();
  if(!name){alert('יש להזין שם פריט');return;}
  const rows=document.querySelectorAll('#em-styles-editor .style-edit-row');
  const styles=Array.from(rows)
    .map(r=>({name:r.querySelector('.style-edit-name').value.trim(),desc:r.querySelector('.style-edit-desc').value.trim()}))
    .filter(s=>s.name);
  const item={
    id:editingItemId||'item_'+Date.now(),
    name,
    icon:document.getElementById('em-icon').value.trim()||'📄',
    cat:parseInt(document.getElementById('em-cat').value),
    desc:document.getElementById('em-desc').value.trim(),
    styles,
    notes:editingItemId?bankItems.find(it=>it.id===editingItemId)?.notes||'':''
  };
  if(editingItemId){
    const idx=bankItems.findIndex(it=>it.id===editingItemId);
    if(idx>=0)bankItems[idx]=item;
  } else {
    bankItems.push(item);
  }
  await db.ref(`teacher/itemBank/${item.id}`).set(item);
  closeModal('edit-modal');
  renderBank();
}

async function deleteItem(){
  if(!editingItemId)return;
  if(!confirm('למחוק את הפריט?'))return;
  bankItems=bankItems.filter(it=>it.id!==editingItemId);
  await db.ref(`teacher/itemBank/${editingItemId}`).remove();
  closeModal('edit-modal');
  renderBank();
}

// ── AI ──
async function askViewAI(){
  const input=document.getElementById('vm-ai-input');
  const msg=input.value.trim();if(!msg)return;
  input.value='';
  const item=bankItems.find(it=>it.id===currentItemId);
  document.getElementById('vm-ai-thinking').style.display='block';
  document.getElementById('vm-ai-reply').style.display='none';
  const sys=`אתה עוזר הוראה. המורה שואלת על הפריט הפדגוגי "${item?.name||''}". ענה בעברית, קצר ומועיל.`;
  try{
    const r=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:sys,
        messages:[{role:'user',content:msg}]})});
    const d=await r.json();
    const text=d.content?.[0]?.text||'לא קיבלתי תשובה';
    document.getElementById('vm-ai-reply').textContent=text;
    document.getElementById('vm-ai-reply').style.display='block';
  }catch(e){
    document.getElementById('vm-ai-reply').textContent='שגיאה בחיבור';
    document.getElementById('vm-ai-reply').style.display='block';
  }
  document.getElementById('vm-ai-thinking').style.display='none';
}

// ── UTILS ──
function closeModal(id){document.getElementById(id).classList.remove('open');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay=>{
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open');});
});
</script>
