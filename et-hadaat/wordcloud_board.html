<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ענן מילים — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{--gold:#d4a843;--gold2:#f0c060;--parch:#fdf5e0;--border:rgba(212,168,67,0.22);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0a0602;color:var(--parch);direction:rtl;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
.topbar{background:rgba(10,5,2,.95);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.question-bar{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--gold2);flex:1;}
.count-badge{font-size:.78rem;opacity:.5;white-space:nowrap;}
.btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.78rem;cursor:pointer;}
.btn:hover{background:rgba(212,168,67,.1);}
.canvas-area{flex:1;position:relative;overflow:hidden;}
canvas{position:absolute;inset:0;}
.empty-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:.25;font-size:1.1rem;gap:8px;}
.spin{display:inline-block;animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="question-bar" id="question-display">☁️ ענן מילים</div>
  <div class="live-dot"></div>
  <span class="count-badge" id="count-badge">0 תשובות</span>
  <button class="btn" onclick="clearWords()" style="color:#f87171;border-color:rgba(248,129,113,.3);">🗑 נקה</button>
  <button class="btn" onclick="window.close()">✕</button>
</div>

<div class="canvas-area" id="canvas-area">
  <canvas id="wc-canvas"></canvas>
  <div class="empty-msg" id="empty-msg">
    <span class="spin" style="font-size:2rem;">⏳</span>
    ממתין לתשובות התלמידים...
  </div>
</div>

<script>
const FB_CFG={apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",authDomain:"et-hadaat.firebaseapp.com",databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",projectId:"et-hadaat",storageBucket:"et-hadaat.firebasestorage.app",messagingSenderId:"141400405468",appId:"1:141400405468:web:c1090c52477d14a159cb19"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

const params=new URLSearchParams(window.location.search);
const boardId=params.get('boardId')||'wc_default';
const question=decodeURIComponent(params.get('q')||'');

if(question) document.getElementById('question-display').textContent='☁️ '+question;

const COLORS=['#f0c060','#86efac','#93c5fd','#f9a8d4','#c4b5fd','#fdba74','#6ee7b7','#fca5a5','#fde68a','#a5f3fc','#d8b4fe','#fb923c'];

let freq={};
let animFrame=null;

// ── LISTEN ──
db.ref(`wordclouds/${boardId}/words`).on('value',snap=>{
  const data=snap.val()||{};
  freq={};
  Object.values(data).forEach(entry=>{
    const w=(entry.word||'').trim().toLowerCase();
    if(w) w.split(/\s+/).forEach(part=>{
      if(part.length>1) freq[part]=(freq[part]||0)+1;
    });
  });
  const total=Object.values(data).length;
  document.getElementById('count-badge').textContent=total+' תשובות';
  const emptyEl=document.getElementById('empty-msg');
  if(Object.keys(freq).length){emptyEl.style.display='none';}else{emptyEl.style.display='flex';}
  if(animFrame)cancelAnimationFrame(animFrame);
  animFrame=requestAnimationFrame(drawCloud);
});

// ── DRAW ──
function drawCloud(){
  const canvas=document.getElementById('wc-canvas');
  const area=document.getElementById('canvas-area');
  const W=area.offsetWidth,H=area.offsetHeight;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const words=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,60);
  if(!words.length)return;

  const maxFreq=words[0][1];
  const minSize=Math.max(14,H/20);
  const maxSize=Math.min(H/2.5,W/5);
  const placed=[];

  // ציור ספירלה מהמרכז החוצה
  function tryPlace(word,size){
    ctx.font=`bold ${size}px Heebo,sans-serif`;
    const tw=ctx.measureText(word).width;
    const th=size;
    const cx=W/2,cy=H/2;
    let angle=Math.random()*Math.PI*2;
    let radius=0;
    const step=2.5;

    for(let i=0;i<400;i++){
      const x=cx+radius*Math.cos(angle)-tw/2;
      const y=cy+radius*Math.sin(angle)+th/3;
      if(x>8&&x+tw<W-8&&y-th>8&&y<H-8){
        const ok=!placed.some(p=>!(x+tw+6<p.x||x>p.x+p.w+6||y-th-4>p.y+p.h||y+4<p.y));
        if(ok){
          placed.push({x,y:y-th,w:tw,h:th});
          return {x,y};
        }
      }
      angle+=0.25;
      radius+=step*0.08;
    }
    return null;
  }

  words.forEach(([word,count],i)=>{
    const ratio=count/maxFreq;
    const size=Math.round(minSize+ratio*(maxSize-minSize));
    const pos=tryPlace(word,size);
    if(!pos)return;

    ctx.save();
    ctx.font=`bold ${size}px Heebo,sans-serif`;
    // צל עדין
    ctx.shadowColor='rgba(0,0,0,.5)';
    ctx.shadowBlur=6;
    ctx.fillStyle=COLORS[i%COLORS.length];
    // opacity לפי דירוג
    ctx.globalAlpha=0.5+ratio*0.5;
    ctx.fillText(word,pos.x,pos.y+size);
    ctx.restore();
  });
}

function clearWords(){
  if(!confirm('למחוק את כל התשובות?'))return;
  db.ref(`wordclouds/${boardId}/words`).remove();
}

// עדכן בשינוי גודל חלון
window.addEventListener('resize',()=>{
  if(animFrame)cancelAnimationFrame(animFrame);
  animFrame=requestAnimationFrame(drawCloud);
});
</script>
</body>
</html>
