<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>שיעור — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{
  --gold:#d4a843;--gold2:#f0c060;--parch:#fdf5e0;
  --surface:rgba(44,26,14,0.88);--border:rgba(212,168,67,0.18);
  --border2:rgba(212,168,67,0.38);--green:#1a5c2a;
  --intro:#0d2e1a;--body:#0d1e2e;--close:#2e0d0d;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Heebo',sans-serif;background:#0f0a04;color:var(--parch);min-height:100vh;direction:rtl;}

/* TOPBAR */
.topbar{background:rgba(15,8,2,.97);border-bottom:1px solid var(--border2);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:.95rem;font-weight:700;color:var(--gold2);}
.topbar-meta{font-size:.78rem;opacity:.5;}
.btn-back{padding:5px 12px;background:none;border:1px solid var(--border2);color:var(--gold);border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:600;}

/* PROGRESS BAR */
.progress-bar{background:rgba(212,168,67,.1);height:4px;flex-shrink:0;}
.progress-fill{height:100%;background:var(--gold);transition:width .4s ease;}

/* SECTION HEADER */
.section-header{padding:10px 20px 0;display:flex;align-items:center;gap:8px;}
.section-badge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:12px;border:1px solid var(--border2);opacity:.7;}

/* STATION PAGE */
.station-page{display:none;min-height:calc(100vh - 110px);padding:16px 20px;flex-direction:column;}
.station-page.active{display:flex;}
.station-title{font-size:.8rem;font-weight:700;color:var(--gold);opacity:.6;margin-bottom:12px;}

/* SLOTS */
.slots-wrap{display:flex;flex-direction:column;gap:14px;flex:1;}
.slots-wrap.simultaneous{display:flex;flex-direction:column;}

/* SLOT ITEM */
.wc-input-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.wc-canvas-wrap{margin-top:14px;background:rgba(253,245,224,.03);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;}
.wc-empty{text-align:center;padding:40px;opacity:.3;font-size:.85rem;}
.tl-wrap{overflow-x:auto;padding:10px 0 20px;}
.tl-axis{position:relative;height:80px;display:flex;align-items:center;}
.tl-line{position:absolute;top:50%;left:0;right:0;height:3px;background:var(--gold);border-radius:2px;}
.tl-years{display:flex;position:relative;z-index:1;width:100%;}
.tl-year-col{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
.tl-tick{width:2px;height:14px;background:var(--gold);margin-bottom:4px;}
.tl-year-label{font-size:.72rem;color:var(--gold);font-weight:700;white-space:nowrap;}
.tl-year-box{padding:3px 8px;background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3);border-radius:6px;font-size:.75rem;color:var(--gold);font-weight:700;min-width:48px;text-align:center;}
.tl-year-blank{padding:3px 8px;background:rgba(253,245,224,.06);border:2px dashed rgba(212,168,67,.3);border-radius:6px;min-width:48px;min-height:26px;text-align:center;transition:all .15s;}
.tl-year-blank.drag-over{background:rgba(212,168,67,.15);border-color:var(--gold);}
.tl-year-blank.filled{border-style:solid;border-color:var(--gold);background:rgba(212,168,67,.1);}
.tl-events-row{display:flex;margin-top:10px;}
.tl-event-col{flex:1;min-height:50px;padding:0 4px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tl-event-card{background:rgba(44,26,14,.8);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-size:.78rem;text-align:center;line-height:1.4;width:100%;transition:all .15s;}
.tl-event-blank{border:2px dashed rgba(212,168,67,.25);border-radius:7px;min-height:42px;width:100%;transition:all .15s;}
.tl-event-blank.drag-over{background:rgba(212,168,67,.1);border-color:var(--gold);}
.tl-event-blank.filled{border-style:solid;border-color:var(--gold);}
.tl-bank{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:rgba(253,245,224,.04);border:1px solid var(--border);border-radius:10px;margin-top:14px;min-height:50px;}
.tl-bank-item{padding:5px 12px;background:rgba(44,26,14,.7);border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;cursor:grab;user-select:none;white-space:nowrap;}
.tl-bank-item:active{cursor:grabbing;opacity:.6;}
.tl-bank-item.used{opacity:.25;pointer-events:none;}
.klue-text{line-height:2.4;font-size:.92rem;direction:rtl;word-spacing:4px;}
.klue-blank{display:inline-flex;align-items:center;justify-content:center;min-width:80px;height:28px;border-bottom:2px solid var(--gold);background:rgba(212,168,67,.06);border-radius:4px 4px 0 0;margin:0 2px;padding:0 6px;vertical-align:middle;cursor:pointer;transition:all .15s;font-size:.88rem;color:var(--parch);}
.klue-blank.drag-over{background:rgba(212,168,67,.2);border-color:var(--gold2);}
.klue-blank.filled{background:rgba(34,197,94,.1);border-color:#22c55e;cursor:default;}
.klue-blank.wrong{background:rgba(248,129,113,.1);border-color:#f87171;}
.klue-bank{display:flex;flex-wrap:wrap;gap:7px;padding:10px;background:rgba(253,245,224,.04);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;min-height:44px;}
.klue-chip{padding:5px 12px;background:rgba(44,26,14,.7);border:1.5px solid var(--border);border-radius:16px;font-size:.85rem;cursor:grab;user-select:none;transition:all .15s;}
.klue-chip:active{cursor:grabbing;opacity:.6;}
.klue-chip.used{opacity:.25;pointer-events:none;}
.klue-score{text-align:center;padding:10px;background:rgba(212,168,67,.08);border:1px solid var(--border);border-radius:8px;margin-top:10px;font-size:.88rem;}
.wc2-area{margin-top:10px;}
.wc2-cards-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:60px;padding:10px;background:rgba(253,245,224,.03);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;}
.wc2-card{padding:8px 14px;background:rgba(44,26,14,.7);border:1.5px solid var(--border);border-radius:8px;cursor:grab;font-size:.88rem;user-select:none;transition:all .15s;display:flex;align-items:center;gap:6px;}
.wc2-card:active{cursor:grabbing;opacity:.7;}
.wc2-card img{height:48px;width:72px;object-fit:cover;border-radius:5px;}
.wc2-card.used{opacity:.3;pointer-events:none;}
.wc2-pair-row{background:rgba(253,245,224,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.wc2-pair-slots{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.wc2-slot{flex:1;min-width:90px;min-height:44px;border:2px dashed rgba(212,168,67,.25);border-radius:7px;padding:6px 10px;display:flex;align-items:center;justify-content:center;font-size:.82rem;transition:all .15s;position:relative;}
.wc2-slot.has-card{border-style:solid;border-color:var(--gold);background:rgba(212,168,67,.06);}
.wc2-slot.drag-over{background:rgba(212,168,67,.12);border-color:var(--gold);}
.wc2-connection-input{width:100%;background:rgba(253,245,224,.06);border:1px solid var(--border);border-radius:6px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.82rem;padding:6px 10px;outline:none;}
.wc2-connection-input:focus{border-color:var(--gold);}
.wc2-remove-btn{position:absolute;top:2px;left:2px;background:none;border:none;color:#f87171;cursor:pointer;font-size:.7rem;padding:1px 4px;}
.dd-wrap{display:flex;gap:12px;margin-top:10px;}
.dd-bank{flex:1;min-height:200px;}
.dd-targets{flex:1;}
.dd-item{background:rgba(253,245,224,.08);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:grab;font-size:.88rem;line-height:1.5;transition:all .15s;user-select:none;}
.dd-item:active{cursor:grabbing;opacity:.7;}
.dd-item.dragging{opacity:.4;border-style:dashed;}
.dd-item.correct{border-color:#22c55e;background:rgba(34,197,94,.12);cursor:default;}
.dd-item.wrong{border-color:#f87171;background:rgba(248,129,113,.1);cursor:default;}
.dd-slot{min-height:52px;border:2px dashed rgba(212,168,67,.25);border-radius:8px;padding:6px 10px;margin-bottom:8px;display:flex;align-items:center;gap:8px;transition:background .15s;}
.dd-slot.drag-over{background:rgba(212,168,67,.1);border-color:var(--gold);}
.dd-slot-num{min-width:22px;height:22px;border-radius:5px;background:rgba(212,168,67,.15);color:var(--gold);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dd-slot-content{flex:1;font-size:.88rem;}
.dd-score{text-align:center;padding:12px;background:rgba(212,168,67,.08);border:1px solid var(--border);border-radius:10px;margin-top:10px;font-size:.9rem;}
@media(max-width:600px){.dd-wrap{flex-direction:column;}}
.sticky-colors{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.sticky-color-btn{width:32px;height:32px;border-radius:6px;border:3px solid transparent;cursor:pointer;transition:all .15s;}
.sticky-color-btn.selected{border-color:#fff;transform:scale(1.15);}
.sticky-preview{border-radius:10px;padding:14px;min-height:90px;margin-bottom:10px;direction:rtl;}
.sticky-preview textarea{background:transparent;border:none;width:100%;resize:none;font-family:'Heebo',sans-serif;font-size:.92rem;outline:none;min-height:70px;color:#1c1208;}
.slot-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;width:100%;}
/* ── sources split layout ── */
.sources-wrap{display:flex;gap:0;height:calc(100vh - 180px);min-height:400px;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sources-left{flex:1;overflow-y:auto;padding:20px;border-left:1px solid var(--border);background:rgba(44,26,14,.5);position:relative;}
.sources-right{width:46%;overflow-y:auto;padding:16px;background:var(--surface);}
.src-line{display:flex;gap:10px;line-height:1.85;font-size:.92rem;}
.src-line-num{min-width:22px;color:var(--gold);opacity:.4;font-size:.75rem;padding-top:3px;user-select:none;}
.src-line-text{flex:1;}
.src-line-text::selection{background:rgba(212,168,67,.35);}
.src-q-block{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.src-q-block:last-child{border-bottom:none;}
.src-q-label{font-size:.7rem;font-weight:700;color:var(--gold);opacity:.6;margin-bottom:4px;letter-spacing:.04em;}
.src-q-text{font-size:.9rem;line-height:1.6;margin-bottom:8px;}
@media(max-width:600px){.sources-wrap{flex-direction:column;height:auto;}.sources-left{min-height:200px;border-left:none;border-bottom:1px solid var(--border);}.sources-right{width:100%;}}
.slot-type-label{font-size:.7rem;font-weight:700;color:var(--gold);opacity:.55;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}

/* TEXT/SOURCE */
.source-title{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--gold2);margin-bottom:8px;}
.source-text{font-size:.92rem;line-height:1.8;direction:rtl;text-align:right;}

/* IMAGE */
.slot-image{width:100%;border-radius:8px;max-height:260px;object-fit:contain;}

/* QUESTION */
.question-text{font-size:.95rem;font-weight:600;line-height:1.6;margin-bottom:12px;}
.answer-area{width:100%;background:rgba(253,245,224,.06);border:1.5px solid var(--border);border-radius:8px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.9rem;padding:10px;resize:vertical;min-height:90px;outline:none;direction:rtl;}
.answer-area:focus{border-color:var(--gold);}
.answer-area::placeholder{opacity:.3;}
.btn-submit{padding:8px 20px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:8px;}
.answer-saved{font-size:.78rem;color:#6ee7a0;margin-top:6px;display:none;}

/* NAVIGATION FOOTER */
.nav-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,5,2,.9);flex-shrink:0;position:sticky;bottom:0;}
.btn-nav{padding:10px 22px;border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .18s;}
.btn-prev{background:none;border:1.5px solid var(--border2);color:var(--parch);}
.btn-next{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;}
.btn-next:disabled{opacity:.4;cursor:not-allowed;}
.station-counter{font-size:.78rem;opacity:.45;}

/* SORT TABLE */
.sort-wrap{display:grid;grid-template-columns:1fr 180px;gap:12px;align-items:start;}
.sort-table-area{overflow-x:auto;}
.sort-table{width:100%;border-collapse:collapse;}
.sort-table th{background:rgba(212,168,67,.15);border:1px solid var(--border2);padding:8px 10px;font-size:.82rem;font-weight:700;color:var(--gold2);text-align:center;}
.sort-table td{border:1px solid var(--border);padding:6px;vertical-align:top;min-height:40px;min-width:90px;}
.sort-cell{min-height:36px;border-radius:6px;padding:4px;}
.sort-cell.drag-over{background:rgba(212,168,67,.15);outline:2px dashed var(--gold);}
.sort-chip{background:rgba(44,26,14,.9);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:.8rem;margin:3px;cursor:grab;display:inline-block;user-select:none;transition:all .15s;}
.sort-chip:hover{border-color:var(--gold);}
.sort-chip.correct{background:rgba(26,92,42,.4);border-color:#6ee7a0;color:#6ee7a0;}
.sort-chip.wrong{background:rgba(139,32,32,.3);border-color:#f87171;color:#f87171;}
.sort-bank{background:rgba(253,245,224,.04);border:1px solid var(--border);border-radius:10px;padding:10px;}
.sort-bank-title{font-size:.72rem;font-weight:700;opacity:.45;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
.sort-bank-items{display:flex;flex-direction:column;gap:4px;}
.btn-check{padding:8px 18px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:10px;width:100%;}
.sort-result{font-size:.82rem;margin-top:8px;text-align:center;font-weight:700;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;opacity:.4;}
.spin{display:inline-block;animation:spin 1.2s linear infinite;font-size:2rem;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* END SCREEN */
.end-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px);text-align:center;padding:32px;}
.end-screen.active{display:flex;}
.end-icon{font-size:4rem;margin-bottom:16px;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.end-title{font-family:'Frank Ruhl Libre',serif;font-size:1.5rem;font-weight:700;color:var(--gold2);margin-bottom:8px;}
.end-sub{font-size:.88rem;opacity:.55;margin-bottom:24px;}

.mc-options{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.mc-option{width:100%;padding:10px 14px;border-radius:8px;border:2px solid var(--border2,#334155);background:transparent;color:var(--parch,#fdf5e0);font-family:Heebo,sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;text-align:right;transition:all .15s;}
.mc-option:hover{border-color:var(--gold,#d4a843);background:rgba(212,168,67,.08);}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="goBack()">← חזרה</button>
  <div class="topbar-title" id="lesson-title">טוען שיעור...</div>
  <div class="topbar-meta" id="lesson-meta"></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<div id="loading-screen" class="loading-screen">
  <span class="spin">⏳</span>
  <div>טוען שיעור...</div>
</div>

<div id="stations-container"></div>

<div class="end-screen" id="end-screen">
  <div class="end-icon">🎉</div>
  <div class="end-title">סיימת את השיעור!</div>
  <div class="end-sub" id="end-sub">כל הכבוד על העבודה היום</div>
  <button class="btn-nav btn-next" onclick="goBack()">← חזרה ליחידה</button>
  <button class="btn-nav" id="btn-enrichment" onclick="openEnrichment()"
    style="display:none;margin-top:12px;background:linear-gradient(135deg,#7c3aed,#4c1d95);color:white;border:none;padding:14px 28px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;">
    🌟 קרון העשרה ←
  </button>
</div>

<div class="nav-footer" id="nav-footer" style="display:none;">
  <button class="btn-nav btn-prev" id="btn-prev" onclick="prevStation()">← קודם</button>
  <div class="station-counter" id="station-counter"></div>
  <button class="btn-nav btn-next" id="btn-next" onclick="nextStation()">הבא ←</button>
</div>

<script>
const FB_CFG={apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",authDomain:"et-hadaat.firebaseapp.com",databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",projectId:"et-hadaat",storageBucket:"et-hadaat.firebasestorage.app",messagingSenderId:"141400405468",appId:"1:141400405468:web:c1090c52477d14a159cb19"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

// URL params
const params=new URLSearchParams(window.location.search);
const subjectId=params.get('subject');
const unitId=params.get('unit');
const lessonIdx=parseInt(params.get('lesson')||'0');
const studentName=decodeURIComponent(params.get('student')||'');
const classCode=params.get('class')||'';
const isPreview=params.get('preview')==='1';

// נתיב תשובות המורה ב-Firebase
const teacherAnswersPath=`teacherAnswers/${subjectId}/${unitId}/lesson_${lessonIdx}`;
const answersPath=`studentAnswers/${subjectId}/${unitId}/lesson_${lessonIdx}/${encodeURIComponent(studentName||'preview')}`;
const AI_PROXY='https://anthropic-proxy.anna-sho.workers.dev';

let lessonData=null;
let allStations=[];
let currentStation=0;
let answers={};
let teacherAnswers={};
let agentConfig={avatar:'🤖',name:'עוזר'};
// טעינת סוכן הלמידה מ-localStorage
try{const ag=localStorage.getItem('agent_'+classCode+'_'+studentName);if(ag)agentConfig=JSON.parse(ag);}catch(e){}

const SECTION_LABELS={intro:'🌅 פתיח',body:'🚂 גוף השיעור',closing:'🌇 סיום',enrichment:'⭐ העשרה'};
const ITEM_TYPES={
  entry:{label:'🚪 כרטיס כניסה',hasAnswer:true},
  entry_card:{label:'🚪 כרטיס כניסה',hasAnswer:true},
  exit:{label:'🎫 כרטיס יציאה',hasAnswer:true},
  exit_card:{label:'🎫 כרטיס יציאה',hasAnswer:true},
  open_q:{label:'❓ שאלה פתוחה',hasAnswer:true},
  question:{label:'❓ שאלה פתוחה',hasAnswer:true},
  text:{label:'',hasAnswer:false},
  sources:{label:'📜 קריאת מקורות',hasAnswer:false},
  image:{label:'🖼️ תמונה',hasAnswer:false},
  video:{label:'▶️ סרטון',hasAnswer:false},
  mc_q:{label:'🔘 רב-ברירה',hasAnswer:true},
  tf_q:{label:'✅ נכון/לא נכון',hasAnswer:true},
  argue:{label:'🖊️ כתיבה טיעונית',hasAnswer:true},
  full_ans:{label:'📝 תשובה מלאה',hasAnswer:true},
  fill_table:{label:'📋 טבלת מילוי',hasAnswer:false},
};

// ── INIT ──
window.onload=function(){
  if(!subjectId||!unitId){showError('חסרים פרמטרים. חזרי ללוח התלמיד.');return;}
  db.ref(`teacher/subjects/${subjectId}/units/${unitId}/lessons/${lessonIdx}`).once('value',snap=>{
    const lesson=snap.val();
    if(!lesson){showError('השיעור לא נמצא.');return;}
    lessonData=lesson;
    buildStations();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('nav-footer').style.display='flex';

    if(isPreview){
      // מצב תצוגה מקדימה — הצג באנר מורה
      const banner=document.createElement('div');
      banner.style.cssText='background:linear-gradient(135deg,#1a5c2a,#2a6b2a);color:#fdf5e0;padding:8px 20px;font-size:.82rem;font-weight:700;text-align:center;position:sticky;top:56px;z-index:40;';
      banner.textContent='👩‍🏫 מצב תצוגה מקדימה — תשובותייך ישמרו כתשובות דוגמא לתלמידים';
      document.getElementById('stations-container').before(banner);
    } else {
      // מצב תלמיד — טען תשובות דוגמא של המורה
      db.ref(teacherAnswersPath).once('value',snap=>{
        teacherAnswers=snap.val()||{};
      });
    }

    renderCurrentStation();
  });
};

function buildStations(){
  const d=lessonData.data||{};
  allStations=[];

  // פתיח
  if(d.intro) d.intro.forEach((st,si)=>{
    const slots=(st.slots||[]).filter(s=>s.type);
    if(slots.length) allStations.push({section:'intro',si,slots,mode:st.displayMode||'simultaneous'});
  });
  // גוף
  if(d.stations) d.stations.forEach((st,si)=>{
    const slots=(st.slots||[]).filter(s=>s.type);
    if(slots.length) allStations.push({section:'body',si,slots,mode:st.displayMode||'simultaneous'});
  });
  // סיום
  if(d.closing) d.closing.forEach((st,si)=>{
    const slots=(st.slots||[]).filter(s=>s.type);
    if(slots.length) allStations.push({section:'closing',si,slots,mode:st.displayMode||'simultaneous'});
  });

  document.getElementById('lesson-title').textContent=lessonData.topic||lessonData.name||'שיעור';
  document.getElementById('lesson-meta').textContent=studentName;
}

function renderCurrentStation(){
  const container=document.getElementById('stations-container');
  container.querySelectorAll('.station-page').forEach(p=>p.remove());

  if(currentStation>=allStations.length){
    showEndScreen();return;
  }

  const st=allStations[currentStation];
  const prev=currentStation>0?allStations[currentStation-1]:null;

  // תווית מעבר בין קרונות
  const showTransition=prev&&prev.section!==st.section;
  const sectionLabels={intro:'🌅 פתיח',body:'🚂 גוף השיעור',closing:'🌇 סיום'};

  const page=document.createElement('div');
  page.className='station-page active';
  page.id='station-page-'+currentStation;

  page.innerHTML=`
    ${showTransition?`<div style="text-align:center;padding:10px 0 16px;font-size:.85rem;font-weight:700;color:var(--gold);opacity:.7;letter-spacing:.05em;">
      ${sectionLabels[st.section]||''}
    </div>`:''}
    <div class="station-title">${sectionLabels[st.section]||''} · תחנה ${st.si+1}</div>
    <div class="slots-wrap ${st.mode}" id="slots-${currentStation}"></div>`;

  container.appendChild(page);

  const slotsWrap=document.getElementById('slots-'+currentStation);
  st.slots.forEach((slot,sli)=>{
    const block=buildSlotBlock(slot,currentStation,sli);
    slotsWrap.appendChild(block);
  });

  updateNav();
}

function chooseMC(stIdx,sli,chosen,correct){
  const key=`${stIdx}-${sli}`;
  answers[key]=String(chosen);
  const savePath=isPreview
    ?`${teacherAnswersPath}/station_${stIdx}_${sli}`
    :`studentAnswers/${classCode}/${studentName}/lesson_${lessonIdx}/station_${stIdx}_${sli}`;
  db.ref(savePath).set({answer:String(chosen),ts:Date.now()});
  const saved=document.getElementById(`saved-${stIdx}-${sli}`);
  if(saved){
    saved.textContent=isPreview?'✅ נשמר כדוגמא':(chosen===correct?'✅ נכון!':'❌ לא נכון');
    saved.style.display='block';
  }
  // Update button styles
  const container=document.getElementById(`mc-${stIdx}-${sli}`);
  if(container){
    container.querySelectorAll('.mc-option').forEach(btn=>{
      const idx=parseInt(btn.dataset.idx);
      if(idx===correct){btn.style.background='rgba(34,197,94,.2)';btn.style.borderColor='#22c55e';}
      else if(idx===chosen){btn.style.background='rgba(248,129,113,.15)';btn.style.borderColor='#f87171';}
      else btn.style.opacity='.5';
      btn.style.pointerEvents='none';
    });
  }
}

function chooseTF(stIdx,sli,chosen,isSurvey,correct){
  const key=`${stIdx}-${sli}`;
  answers[key]=String(chosen);
  const savePath=isPreview
    ?`${teacherAnswersPath}/station_${stIdx}_${sli}`
    :`studentAnswers/${classCode}/${studentName}/lesson_${lessonIdx}/station_${stIdx}_${sli}`;
  db.ref(savePath).set({answer:String(chosen),ts:Date.now()});
  const saved=document.getElementById(`saved-${stIdx}-${sli}`);
  if(saved){
    saved.textContent=isPreview?'✅ נשמר כדוגמא':(isSurvey?'✓ תשובתך נשמרה':(chosen===correct?'✅ נכון!':'❌ לא נכון'));
    saved.style.display='block';
  }
}

function buildSlotBlock(slot,stIdx,sli){
  const block=document.createElement('div');
  block.className='slot-block';
  const typeInfo=ITEM_TYPES[slot.type]||{label:slot.type,hasAnswer:false};
  const savedAnswer=answers[`${stIdx}-${sli}`]||'';

  let html=`<div class="slot-type-label">${typeInfo.label}</div>`;

  if(slot.type==='sort_table'){
    return buildSortTable(slot, stIdx, sli);
  }

  if(slot.type==='fill_table'){
    return buildFillTable(slot, stIdx, sli);
  }

  // ── כתיבה טיעונית / תשובה מלאה ──
  if(slot.type==='argue'||slot.type==='full_ans'){
    const d=slot.argueData||{prompt:'',style:'מובנית',wordBank:'',showWordBank:false};
    const uid=`ans-${stIdx}-${sli}`;
    const savedAnswer=answers[`${stIdx}-${sli}`]||'';
    const isStructured=d.style==='מובנית';
    let writeArea='';
    if(isStructured){
      const sections=slot.type==='argue'
        ?['פתיחה — הצגת עמדתך','גוף — נימוקים ודוגמאות','סיום — סיכום וחיזוק הטענה']
        :['היגד מכליל — רעיון מרכזי','פירוט ודוגמאות','מסקנה'];
      writeArea=sections.map((sec,i)=>`
        <div style="margin-bottom:10px;">
          <div style="font-size:.72rem;font-weight:700;color:var(--gold);opacity:.7;margin-bottom:4px;">${sec}</div>
          <textarea class="answer-area" id="${uid}-${i}" rows="3"
            placeholder="כתוב/כתבי כאן..."
            oninput="autoSaveArgue('${stIdx}','${sli}','${uid}')">${esc((savedAnswer?JSON.parse(savedAnswer):[{}])[i]?.text||'')}</textarea>
        </div>`).join('');
    } else {
      writeArea=`<textarea class="answer-area" id="${uid}" rows="6"
        placeholder="כתוב/כתבי את תשובתך כאן...">${esc(savedAnswer)}</textarea>`;
    }
    const wordBankHtml=d.showWordBank&&d.wordBank
      ?`<div style="margin-bottom:12px;background:rgba(212,168,67,.06);border:1px solid rgba(212,168,67,.15);border-radius:8px;padding:10px 12px;">
          <div style="font-size:.7rem;font-weight:700;color:var(--gold);opacity:.6;margin-bottom:6px;">בנק מילים</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">${d.wordBank.split(',').map(w=>w.trim()).filter(Boolean).map(w=>`<span style="padding:3px 10px;background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.2);border-radius:12px;font-size:.8rem;cursor:pointer;color:var(--parch);" onclick="insertWord(this,'${uid}${isStructured?'-0':''}','${w.trim()}')">${esc(w.trim())}</span>`).join('')}</div>
        </div>`:'';
    html+=`<div class="source-text">${esc(d.prompt)}</div>
      <div style="font-size:.8rem;opacity:.5;margin:6px 0 12px;">ענה/י על השאלה</div>
      ${wordBankHtml}
      ${writeArea}
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
        <button class="btn-submit" onclick="saveArgueAnswer('${stIdx}','${sli}','${uid}',${isStructured},${sections?sections.length:0})">שמור תשובה ✓</button>
        <span class="answer-saved" id="saved-${stIdx}-${sli}">✅ נשמר</span>
      </div>`;
    block.innerHTML=html;
    return block;
  }

  if(slot.type==='image'){
    html+=`<img class="slot-image" src="${esc(slot.content||'')}" alt="תמונה">`;
  } else if(slot.type==='video'){
    const ytId=extractYT(slot.content||'');
    html+=ytId
      ?`<iframe width="100%" height="200" src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>`
      :`<div style="opacity:.4;font-size:.85rem;">קישור וידאו: ${esc(slot.content||'')}</div>`;
  } else if(slot.content){
    html+=`<div class="source-text">${slot.content.replace(/\n/g,'<br>')}</div>`;
  }

  // ── קריאת מקורות ──
  if(slot.type==='sources'){
    const d=slot.sourcesData||{mode:'text',text:'',imageUrl:'',questions:[]};
    const qs=d.questions||[];

    // בניית צד שמאל — מקור
    let leftHtml='';
    if(d.mode==='image'){
      const src=d.imageUrl||'';
      leftHtml=`<img src="${esc(src)}" style="max-width:100%;border-radius:8px;" alt="מקור">`;
    } else {
      const lines=(d.text||'').split('\n').slice(0,15);
      leftHtml=lines.map((line,i)=>`
        <div class="src-line">
          <span class="src-line-num">${i+1}</span>
          <span class="src-line-text">${esc(line)||'&nbsp;'}</span>
        </div>`).join('');
    }

    // בניית צד ימין — שאלות
    const rightHtml=qs.map((q,qi)=>{
      const key=`${stIdx}-${sli}-${qi}`;
      const saved=answers[key]||'';
      let answerHtml='';
      if(q.type==='mc'){
        const opts=(q.options||[]).filter(Boolean).map((o,oi)=>{
          const answered=saved!=='';
          const chosen=answered?parseInt(saved):-1;
          let style='';
          if(answered){
            if(oi===q.correct)style='border-color:#22c55e;background:rgba(34,197,94,.15);';
            else if(oi===chosen)style='border-color:#f87171;background:rgba(248,129,113,.1);';
            else style='opacity:.5;';
          }
          return `<button class="mc-option" onclick="chooseSrcMC(${stIdx},${sli},${qi},${oi},${q.correct})"
            style="${style}${answered?'pointer-events:none;':''};margin-bottom:5px;width:100%;">${esc(o)}</button>`;
        }).join('');
        answerHtml=`<div id="src-mc-${stIdx}-${sli}-${qi}">${opts}</div>
          <div class="answer-saved" id="saved-${stIdx}-${sli}-${qi}" style="${saved!==''?'display:block':'display:none'}">
            ${saved!==''?(parseInt(saved)===q.correct?'✅ נכון!':'❌ לא נכון. התשובה: '+esc((q.options||[])[q.correct]||'')):''}
          </div>`;
      } else if(q.type==='tf'){
        const answered=saved!=='';
        const chosen=saved==='true'?true:saved==='false'?false:null;
        answerHtml=`<div style="display:flex;gap:8px;margin-bottom:6px;">
          <button onclick="chooseSrcTF(${stIdx},${sli},${qi},true,${q.tfCorrect===true})"
            style="flex:1;padding:8px;border-radius:7px;border:2px solid ${answered&&q.tfCorrect===true?'#22c55e':answered&&chosen===true?'#f87171':'var(--border)'};background:${answered&&q.tfCorrect===true?'rgba(34,197,94,.15)':answered&&chosen===true?'rgba(248,129,113,.1)':'transparent'};cursor:pointer;font-family:Heebo,sans-serif;${answered?'pointer-events:none;':''}">✅ נכון</button>
          <button onclick="chooseSrcTF(${stIdx},${sli},${qi},false,${q.tfCorrect===false})"
            style="flex:1;padding:8px;border-radius:7px;border:2px solid ${answered&&q.tfCorrect===false?'#22c55e':answered&&chosen===false?'#f87171':'var(--border)'};background:${answered&&q.tfCorrect===false?'rgba(34,197,94,.15)':answered&&chosen===false?'rgba(248,129,113,.1)':'transparent'};cursor:pointer;font-family:Heebo,sans-serif;${answered?'pointer-events:none;':''}">❌ לא נכון</button>
        </div>
        <div class="answer-saved" id="saved-${stIdx}-${sli}-${qi}" style="${answered?'display:block':'display:none'}">
          ${answered?(chosen===q.tfCorrect?'✅ נכון!':'❌ לא נכון'):''}
        </div>`;
      } else {
        const uid=`src-ans-${stIdx}-${sli}-${qi}`;
        answerHtml=`<textarea class="answer-area" id="${uid}" rows="3"
          placeholder="כתוב/כתבי את תשובתך...">${esc(saved)}</textarea>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
            <button class="btn-submit" style="padding:6px 14px;font-size:.82rem;" onclick="saveSrcAnswer(${stIdx},${sli},${qi},'${uid}')">שמור ✓</button>
            <span class="answer-saved" id="saved-${stIdx}-${sli}-${qi}" style="display:none;">✅ נשמר</span>
          </div>`;
      }
      return `<div class="src-q-block">
        <div class="src-q-label">שאלה ${qi+1}</div>
        <div class="src-q-text">${esc(q.question)}</div>
        ${answerHtml}
      </div>`;
    }).join('');

    block.className='';
    block.innerHTML=`
      <div style="font-size:.7rem;font-weight:700;color:var(--gold);opacity:.5;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;">📜 קריאת מקורות</div>
      <div class="sources-wrap">
        <div class="sources-right">
          <div style="font-size:.75rem;opacity:.4;margin-bottom:10px;">ענה/י על השאלות</div>
          ${rightHtml||'<div style="opacity:.3;font-size:.85rem;">אין שאלות</div>'}
          <button onclick="openAgent('${stIdx}','${sli}','')"
            style="margin-top:10px;padding:6px 12px;background:rgba(109,40,217,.15);border:1px solid rgba(109,40,217,.3);border-radius:20px;color:#c4b5fd;font-family:Heebo,sans-serif;font-size:.78rem;cursor:pointer;">
            ${agentConfig.avatar||'🤖'} שאל/י את הסוכן
          </button>
        </div>
        <div class="sources-left">
          <div style="font-size:.72rem;opacity:.35;margin-bottom:10px;">${d.mode==='text'?'💡 ניתן לסמן טקסט במירקור':'📷 תמונת מקור'}</div>
          ${leftHtml}
        </div>
      </div>`;
    return block;
  }

  // ── ענן מילים ──
  if(slot.type==='wordcloud'){
    const d=slot.wordcloudData||{question:'',maxWords:2};
    const wcId=`wc-${stIdx}-${sli}`;
    const boardId=`wc_${subjectId}_${unitId}_${lessonIdx}_${stIdx}_${sli}`;
    html+=`<div class="wc-input-wrap">
      <div style="font-size:.9rem;font-weight:700;margin-bottom:4px;">${esc(d.question||'ענן מילים')}</div>
      <div style="font-size:.8rem;opacity:.5;margin-bottom:10px;">הזן/י עד ${d.maxWords||2} מילים</div>
      <div style="display:flex;gap:8px;">
        <input id="wc-input-${wcId}" class="answer-area" style="min-height:0;padding:8px 12px;flex:1;resize:none;"
          placeholder="${d.maxWords===1?'מילה אחת...':'עד שתי מילים...'}"
          maxlength="${d.maxWords===1?20:40}">
        <button class="btn-submit" style="white-space:nowrap;" onclick="submitWC('${wcId}','${boardId}','${esc(d.question)}',${d.maxWords||2})">שלח ☁️</button>
      </div>
      <span class="answer-saved" id="saved-${stIdx}-${sli}" style="display:none;margin-top:6px;">✅ נשמר</span>
    </div>
    <div class="wc-canvas-wrap" id="wc-wrap-${wcId}" style="height:200px;">
      <div class="wc-empty" id="wc-empty-${wcId}">ממתין לתשובות...</div>
      <canvas id="wc-canvas-${wcId}" style="width:100%;height:100%;"></canvas>
    </div>`;
    block.innerHTML=html;
    // התחל להאזין לנתונים
    setTimeout(()=>listenWC(wcId,boardId),100);
    return block;
  }

  // ── זום תמונה ──
  if(slot.type==='zoom_img'){
    const d=slot.zoomData||{images:[]};
    const zoomParams=encodeURIComponent(JSON.stringify(d));
    const zoomUrl=window.location.href.replace(/[^/]*$/, 'zoom_image.html')+'?data='+zoomParams;
    html+=`<div style="text-align:center;padding:24px 16px;background:rgba(253,245,224,.03);border:1px solid var(--border);border-radius:12px;">
      <div style="font-size:2rem;margin-bottom:10px;">🔎</div>
      <div style="font-size:.9rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">זום תמונה</div>
      <div style="font-size:.8rem;opacity:.5;margin-bottom:16px;">${d.images?.length||0} תמונות · נוהל על ידי המורה על הלוח</div>
      <div style="font-size:.82rem;opacity:.55;padding:10px;background:rgba(212,168,67,.06);border-radius:8px;">
        פעילות זו מנוהלת על ידי המורה ומוקרנת על הלוח.<br>קבל/י הוראות מהמורה.
      </div>
    </div>`;
    block.innerHTML=html;
    return block;
  }

  // ── גלה את התמונה ──
  if(slot.type==='reveal_img'){
    const d=slot.revealData||{images:[]};
    const imgs=d.images||[];
    const revealParams=encodeURIComponent(JSON.stringify(d));
    const savePath=`${answersPath}/${stIdx}-${sli}`;
    const revealUrl=window.location.href.replace(/[^/]*$\.html.*$/,'reveal_image.html')
      +'?data='+revealParams+'&student='+encodeURIComponent(studentName||'')+'&savePath='+encodeURIComponent(savePath);
    html+=`<div style="text-align:center;padding:24px 16px;background:rgba(253,245,224,.03);border:1px solid var(--border);border-radius:12px;">
      <div style="font-size:2rem;margin-bottom:10px;">🖼️</div>
      <div style="font-size:.9rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">גלה את התמונה</div>
      <div style="font-size:.8rem;opacity:.5;margin-bottom:16px;">${imgs.length} תמונה${imgs.length>1?'ות':''} · ענה על שאלות וגלה מה מסתתר</div>
      <button onclick="window.open('${revealUrl}','_blank','width=900,height=640')"
        style="padding:10px 24px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:10px;font-family:Heebo,sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;">
        פתח פעילות 🖼️
      </button>
    </div>`;
    block.innerHTML=html;
    return block;
  }

  // ── השלמת משפטים ──
  if(slot.type==='fill_sentence'){
    const d=slot.fillSentenceData||{instruction:'',sentences:[],useBank:true};
    const sents=(d.sentences||[]).filter(s=>s.text);
    const useBank=d.useBank!==false;
    const uid=`fs-${stIdx}-${sli}`;

    // אסוף כל המילים לבנק ועורבב
    const allAnswers=[];
    sents.forEach((s,si2)=>{
      (s.answers||[]).forEach((ans,bi)=>{
        if(ans)allAnswers.push({si2,bi,word:ans});
      });
    });
    const shuffledBank=[...allAnswers].sort(()=>Math.random()-.5);

    const bankHtml=useBank&&shuffledBank.length
      ?`<div style="font-size:.72rem;opacity:.4;margin-bottom:6px;">בנק מילים — גרור למקום הנכון</div>
        <div class="klue-bank" id="fs-bank-${uid}">
          ${shuffledBank.map((item,bk)=>`
            <div class="klue-chip" id="fs-chip-${uid}-${bk}"
              draggable="true" data-word="${esc(item.word)}" data-bk="${bk}"
              ondragstart="fsDragStart(event,'${uid}',${bk})"
              ontouchstart="fsTouchStart(event,'${uid}',${bk})"
              ontouchmove="fsTouchMove(event,'${uid}')"
              ontouchend="fsTouchEnd(event,'${uid}')">${esc(item.word)}</div>`).join('')}
        </div>`:''
    ;

    const sentsHtml=sents.map((s,si2)=>{
      const parts=s.text.split('___');
      let sentHtml='<span>';
      parts.forEach((part,pi)=>{
        sentHtml+=esc(part);
        if(pi<parts.length-1){
          const blankId=`fs-blank-${uid}-${si2}-${pi}`;
          if(useBank){
            sentHtml+=`</span><span class="klue-blank" id="${blankId}"
              data-si2="${si2}" data-pi="${pi}"
              ondragover="event.preventDefault();this.classList.add('drag-over')"
              ondragleave="this.classList.remove('drag-over')"
              ondrop="fsDrop(event,'${uid}',${si2},${pi})">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><span>`;
          } else {
            sentHtml+=`</span><input id="${blankId}" class="answer-area"
              style="min-height:0;padding:3px 8px;display:inline;width:100px;font-size:.88rem;vertical-align:middle;resize:none;"
              placeholder="___"
              oninput="fsInputChange('${uid}',${si2},${pi},this.value)"><span>`;
          }
        }
      });
      sentHtml+='</span>';
      return `<div style="margin-bottom:12px;">
        <div style="font-size:.7rem;color:var(--gold);opacity:.55;margin-bottom:4px;">משפט ${si2+1}</div>
        <div class="klue-text" style="line-height:2.2;">${sentHtml}</div>
        ${!useBank?`<button onclick="fsHint('${uid}',${si2},'${esc(s.text)}')"
          style="margin-top:4px;padding:4px 10px;background:rgba(109,40,217,.1);border:1px solid rgba(109,40,217,.3);border-radius:14px;color:#c4b5fd;font-family:Heebo,sans-serif;font-size:.75rem;cursor:pointer;">💡 רמז</button>
        <div id="fs-hint-${uid}-${si2}" style="display:none;margin-top:4px;padding:6px 10px;background:rgba(109,40,217,.1);border-radius:7px;font-size:.8rem;color:#c4b5fd;"></div>`:''}
      </div>`;
    }).join('');

    html+=`<div style="font-size:.85rem;opacity:.65;margin-bottom:10px;">${esc(d.instruction||'השלימו את המשפטים')}</div>
      ${bankHtml}
      <div id="fs-sents-${uid}">${sentsHtml}</div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        <button class="btn-submit" onclick="fsCheck('${uid}',${JSON.stringify(sents).replace(/'/g,"\'")},${useBank})">בדוק ✓</button>
        <button onclick="fsReset('${uid}')" style="padding:7px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--parch);font-family:Heebo,sans-serif;font-size:.85rem;cursor:pointer;">אפס</button>
      </div>
      <div id="fs-score-${uid}" style="display:none;" class="klue-score"></div>`;
    block.innerHTML=html;
    window[`_fsData_${uid}`]={sents,shuffledBank,filled:{},inputs:{}};
    return block;
  }

  // ── ציר זמן ──
  if(slot.type==='timeline'){
    const d=slot.timelineData||{startYear:1800,endYear:2000,interval:50,events:[],studentView:'all'};
    const uid=`tl-${stIdx}-${sli}`;
    const years=[];
    for(let y=d.startYear;y<=d.endYear;y+=d.interval)years.push(y);
    const events=(d.events||[]).filter(e=>e.text||e.year);
    const sv=d.studentView||'all';

    // קבע מה להסתיר
    function shouldHideYear(ev){return sv==='events_only'||(sv==='custom'&&ev.hideYear);}
    function shouldHideEvent(ev){return sv==='years_only'||(sv==='custom'&&ev.hideText);}

    // אסוף פריטים להגרלה בבנק
    const bankItems=[];
    events.forEach((ev,ei)=>{
      if(shouldHideYear(ev)&&ev.year) bankItems.push({type:'year',val:String(ev.year),ei});
      if(shouldHideEvent(ev)&&ev.text) bankItems.push({type:'event',val:ev.text,ei});
    });
    const shuffledBank=[...bankItems].sort(()=>Math.random()-.5);

    // בנה עמודות ציר
    const yearColsHtml=years.map((y,yi)=>{
      // אירועים שמשויכים לשנה זו
      const colEvents=events.filter(ev=>ev.year===y||(ev.year>y&&ev.year<(years[yi+1]||Infinity)));
      const yearDisplay=shouldHideYear({year:y,hideYear:false})
        ?`<div class="tl-year-blank" id="tl-yrblank-${uid}-${yi}"
            ondragover="event.preventDefault();this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="tlDrop(event,'${uid}','year',${yi})"></div>`
        :`<div class="tl-year-box">${y}</div>`;

      return `<div class="tl-year-col">
        <div class="tl-tick"></div>
        ${yearDisplay}
      </div>`;
    }).join('');

    // בנה שורת אירועים
    const eventColsHtml=years.map((y,yi)=>{
      const colEvents=events.filter((ev,ei)=>{
        const yr=parseInt(ev.year)||0;
        return yr===y||(yr>y&&yr<(years[yi+1]||Infinity));
      });
      const evHtml=colEvents.map((ev,li)=>{
        const ei=events.indexOf(ev);
        if(shouldHideEvent(ev)){
          return `<div class="tl-event-blank" id="tl-evblank-${uid}-${ei}"
            ondragover="event.preventDefault();this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="tlDrop(event,'${uid}','event',${ei})"></div>`;
        }
        return `<div class="tl-event-card">${esc(ev.text)}</div>`;
      }).join('');
      return `<div class="tl-event-col">${evHtml}</div>`;
    }).join('');

    const bankHtml=shuffledBank.length
      ?`<div style="font-size:.72rem;opacity:.4;margin-bottom:6px;">גרור לציר הזמן</div>
        <div class="tl-bank" id="tl-bank-${uid}">
          ${shuffledBank.map((item,bi)=>`
            <div class="tl-bank-item" id="tl-bitem-${uid}-${bi}"
              draggable="true" data-type="${item.type}" data-val="${esc(item.val)}" data-ei="${item.ei}" data-bi="${bi}"
              ondragstart="tlDragStart(event,'${uid}',${bi})"
              ontouchstart="tlTouchStart(event,'${uid}',${bi})"
              ontouchmove="tlTouchMove(event,'${uid}')"
              ontouchend="tlTouchEnd(event,'${uid}')">${esc(item.val)}</div>`).join('')}
        </div>`:'';

    html+=`<div class="tl-wrap">
      <div class="tl-axis">
        <div class="tl-line"></div>
        <div class="tl-years" style="min-width:${Math.max(years.length*80,300)}px;">${yearColsHtml}</div>
      </div>
      <div class="tl-events-row" style="min-width:${Math.max(years.length*80,300)}px;">${eventColsHtml}</div>
    </div>
    ${bankHtml}
    ${shuffledBank.length?`<div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn-submit" onclick="tlCheck('${uid}')">בדוק ✓</button>
      <button onclick="tlReset('${uid}')" style="padding:7px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--parch);font-family:Heebo,sans-serif;font-size:.85rem;cursor:pointer;">אפס</button>
    </div>`:''}
    <div id="tl-score-${uid}" style="display:none;" class="klue-score"></div>`;
    block.innerHTML=html;
    window[`_tlData_${uid}`]={shuffledBank,filled:{},events,years};
    return block;
  }

  // ── קלו ──
  if(slot.type==='klue'){
    const d=slot.klueData||{text:'',hiddenWords:[],useBank:true};
    const words=(d.text||'').split(/\s+/).filter(Boolean);
    const hiddenIdxs=new Set(d.hiddenWords||[]);
    const uid=`klue-${stIdx}-${sli}`;
    const useBank=d.useBank!==false;

    // בנק מילים מעורבב
    const bankWords=[...hiddenIdxs].map(wi=>({wi,word:words[wi]?.replace(/[.,;:!?״"'()\[\]]/g,'')||''}))
      .sort(()=>Math.random()-.5);

    const bankHtml=useBank
      ? `<div style="font-size:.72rem;opacity:.4;margin-bottom:6px;">בנק מילים — גרור למקום הנכון</div>
         <div class="klue-bank" id="klue-bank-${uid}">
           ${bankWords.map((bw,bi)=>`
             <div class="klue-chip" id="klue-chip-${uid}-${bi}"
               draggable="true" data-word="${esc(bw.word)}" data-wi="${bw.wi}" data-bi="${bi}"
               ondragstart="klueDragStart(event,'${uid}',${bi})"
               ontouchstart="klueTouchStart(event,'${uid}',${bi})"
               ontouchmove="klueTouchMove(event,'${uid}')"
               ontouchend="klueTouchEnd(event,'${uid}')">${esc(bw.word)}</div>`).join('')}
         </div>` : '';

    // בנה טקסט עם ריבועים
    const textHtml=words.map((w,wi)=>{
      if(!hiddenIdxs.has(wi))return `<span>${esc(w)} </span>`;
      const blankId=`klue-blank-${uid}-${wi}`;
      return `<span class="klue-blank" id="${blankId}"
        data-wi="${wi}" data-correct="${esc(w.replace(/[.,;:!?״"'()\[\]]/g,''))}"
        ondragover="if(event.preventDefault)event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="klueDrop(event,'${uid}',${wi})">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><span>${esc(w.replace(/[^ ]/g,'').padEnd(0))} </span>`;
    }).join('');

    html+=`${bankHtml}
      <div class="klue-text">${textHtml}</div>
      ${!useBank?`<div id="klue-hint-${uid}" style="display:none;margin:8px 0;padding:8px 12px;background:rgba(109,40,217,.1);border:1px solid rgba(109,40,217,.3);border-radius:8px;font-size:.82rem;color:#c4b5fd;"></div>`:''}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        <button class="btn-submit" onclick="klueCheck('${uid}',${useBank})">בדוק ✓</button>
        <button onclick="klueReset('${uid}')" style="padding:7px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--parch);font-family:Heebo,sans-serif;font-size:.85rem;cursor:pointer;">אפס</button>
        ${!useBank?`<button onclick="klueHint('${uid}','${esc(d.text||'')}',${stIdx},${sli})" style="padding:7px 14px;background:rgba(109,40,217,.1);border:1px solid rgba(109,40,217,.3);border-radius:8px;color:#c4b5fd;font-family:Heebo,sans-serif;font-size:.85rem;cursor:pointer;">💡 רמז מהסוכן</button>`:''}
      </div>
      <div id="klue-score-${uid}" style="display:none;" class="klue-score"></div>`;
    block.innerHTML=html;
    window[`_klueData_${uid}`]={words,hiddenIdxs,bankWords,filled:{}};
    return block;
  }

  // ── מה הקשר? ──
  if(slot.type==='what_connects'){
    const d=slot.whatConnectsData||{instruction:'',cards:[],numPairs:2};
    const cards=(d.cards||[]).filter(c=>c.value);
    const numPairs=Math.min(d.numPairs||2,10);
    const uid=`wc2-${stIdx}-${sli}`;

    // ערבב כרטיסיות
    const shuffled=[...cards].sort(()=>Math.random()-.5);
    const bankHtml=shuffled.map((c,i)=>`
      <div class="wc2-card" id="wc2-card-${uid}-${i}"
        draggable="true" data-ci="${i}"
        ondragstart="wc2DragStart(event,'${uid}',${i})"
        ontouchstart="wc2TouchStart(event,'${uid}',${i})"
        ontouchmove="wc2TouchMove(event,'${uid}')"
        ontouchend="wc2TouchEnd(event,'${uid}')">
        ${c.type==='image'
          ? `<img src="${esc(c.value)}" alt="כרטיסיה" onerror="this.style.display='none'">`
          : esc(c.value)}
      </div>`).join('');

    const pairsHtml=Array.from({length:numPairs},(_,pi)=>`
      <div class="wc2-pair-row" id="wc2-pair-${uid}-${pi}">
        <div style="font-size:.7rem;opacity:.4;margin-bottom:6px;">זוג ${pi+1}</div>
        <div class="wc2-pair-slots">
          <div class="wc2-slot" id="wc2-slot-${uid}-${pi}-0"
            ondragover="wc2DragOver(event)" ondragleave="wc2DragLeave(event)"
            ondrop="wc2Drop(event,'${uid}',${pi},0)">
            <span style="opacity:.3;font-size:.75rem;">גרור כרטיסיה</span>
          </div>
          <div class="wc2-slot" id="wc2-slot-${uid}-${pi}-1"
            ondragover="wc2DragOver(event)" ondragleave="wc2DragLeave(event)"
            ondrop="wc2Drop(event,'${uid}',${pi},1)">
            <span style="opacity:.3;font-size:.75rem;">גרור כרטיסיה</span>
          </div>
        </div>
        <input class="wc2-connection-input" placeholder="מה הקשר בין הכרטיסיות?"
          oninput="wc2SaveData('${uid}',${numPairs})">
      </div>`).join('');

    html+=`<div style="font-size:.85rem;opacity:.65;margin-bottom:10px;">${esc(d.instruction||`מצאו ${numPairs} זוגות של כרטיסיות שיש ביניהן קשר והסבירו`)}</div>
      <div class="wc2-area">
        <div style="font-size:.72rem;opacity:.4;margin-bottom:6px;">כרטיסיות — גרור לזוגות</div>
        <div class="wc2-cards-bank" id="wc2-bank-${uid}">${bankHtml}</div>
        <div style="font-size:.72rem;opacity:.4;margin-bottom:8px;">זוגות שלי</div>
        <div id="wc2-pairs-${uid}">${pairsHtml}</div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn-submit" onclick="wc2Submit('${uid}',${numPairs})">שמור תשובות ✓</button>
      </div>
      <span class="answer-saved" id="saved-${stIdx}-${sli}" style="display:none;margin-top:6px;">✅ נשמר</span>`;
    block.innerHTML=html;
    window[`_wc2Data_${uid}`]={shuffled,slots:{},numPairs};
    return block;
  }

  // ── רצף אירועים ──
  if(slot.type==='drag_drop'){
    const d=slot.dragDropData||{instruction:'',sentences:[]};
    const sents=d.sentences.filter(Boolean);
    if(!sents.length){html+='<div style="opacity:.4;">אין משפטים מוגדרים</div>';block.innerHTML=html;return block;}
    // ערבב סדר
    const shuffled=[...sents].map((s,i)=>({text:s,origIdx:i})).sort(()=>Math.random()-.5);
    const uid=`dd-${stIdx}-${sli}`;
    const bankHtml=shuffled.map((item,i)=>`
      <div class="dd-item" id="dd-item-${uid}-${i}"
        draggable="true" data-orig="${item.origIdx}" data-idx="${i}"
        ondragstart="ddDragStart(event,'${uid}',${i})"
        ontouchstart="ddTouchStart(event,'${uid}',${i})"
        ontouchmove="ddTouchMove(event,'${uid}')"
        ontouchend="ddTouchEnd(event,'${uid}')">
        ${esc(item.text)}
      </div>`).join('');
    const slotsHtml=sents.map((_,i)=>`
      <div class="dd-slot" id="dd-slot-${uid}-${i}"
        ondragover="ddDragOver(event)" ondragleave="ddDragLeave(event)"
        ondrop="ddDrop(event,'${uid}',${i})">
        <span class="dd-slot-num">${i+1}</span>
        <span class="dd-slot-content" id="dd-slot-text-${uid}-${i}"></span>
      </div>`).join('');

    html+=`<div style="font-size:.85rem;opacity:.65;margin-bottom:10px;">${esc(d.instruction||'סדרו את האירועים לפי הסדר הכרונולוגי')}</div>
      <div class="dd-wrap">
        <div>
          <div style="font-size:.72rem;opacity:.4;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;">משפטים לסידור</div>
          <div id="dd-bank-${uid}">${bankHtml}</div>
        </div>
        <div>
          <div style="font-size:.72rem;opacity:.4;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;">גררו לסדר הנכון</div>
          <div id="dd-targets-${uid}">${slotsHtml}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn-submit" onclick="checkDD('${uid}',${sents.length})">בדוק ✓</button>
        <button onclick="resetDD('${uid}')" style="padding:7px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--parch);font-family:Heebo,sans-serif;font-size:.85rem;cursor:pointer;">אפס</button>
      </div>
      <div id="dd-score-${uid}" style="display:none;" class="dd-score"></div>`;
    block.innerHTML=html;
    // שמור נתוני ההגרלה לצורך בדיקה
    window[`_ddData_${uid}`]={shuffled,total:sents.length,slots:{}};
    return block;
  }

  // ── פתקיות ──
  if(slot.type==='stickies'){
    const d=slot.stickiesData||{boardName:'',instruction:'',showNames:true};
    const boardId=`stickies_${subjectId}_${unitId}_${lessonIdx}_${stIdx}_${sli}`;
    const COLORS=["#fde68a", "#86efac", "#93c5fd", "#f9a8d4", "#c4b5fd", "#fdba74", "#6ee7b7", "#fca5a5"];
    const uid=`sticky-${stIdx}-${sli}`;
    const colorBtns=COLORS.map((c,i)=>`
      <div class="sticky-color-btn ${i===0?'selected':''}" style="background:${c};"
        onclick="selectStickyColor('${uid}','${c}',this)" data-color="${c}"></div>`).join('');
    html+=`<div style="font-size:.88rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">${esc(d.boardName||'לוח שיתופי')}</div>
      ${d.instruction?`<div style="font-size:.82rem;opacity:.7;margin-bottom:12px;">${esc(d.instruction)}</div>`:''}
      <div style="font-size:.75rem;opacity:.5;margin-bottom:6px;">בחר/י צבע פתקית:</div>
      <div class="sticky-colors" id="colors-${uid}">${colorBtns}</div>
      <div class="sticky-preview" id="preview-${uid}" style="background:${COLORS[0]};">
        <textarea id="text-${uid}" placeholder="כתוב/כתבי כאן..."
          oninput="document.getElementById('preview-${uid}').style.background=document.querySelector('#colors-${uid} .selected')?.dataset.color||'${COLORS[0]}'"></textarea>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">
        <button onclick="uploadStickyImage('${uid}')"
          style="padding:6px 12px;background:rgba(212,168,67,.1);border:1px solid var(--border);border-radius:7px;color:var(--gold);font-family:Heebo,sans-serif;font-size:.8rem;cursor:pointer;">
          📎 הוסף תמונה
        </button>
        <input type="file" id="img-${uid}" accept="image/*" style="display:none;" onchange="handleStickyImage(this,'${uid}')">
        <span id="img-name-${uid}" style="font-size:.75rem;opacity:.5;"></span>
      </div>
      <div id="img-preview-${uid}" style="margin-bottom:8px;"></div>
      <button class="btn-submit" onclick="postSticky('${stIdx}','${sli}','${uid}','${boardId}',${JSON.stringify(d).replace(/'/g,"\\'")})">
        📌 הצג על הלוח
      </button>
      <span class="answer-saved" id="saved-${stIdx}-${sli}" style="display:none;">✅ הפתקית הוצגה!</span>`;
    block.innerHTML=html;
    return block;
  }

  // ── שאלה פתוחה ──
  if(slot.type==='question'||slot.type==='open_q'){
    const d=slot.questionData||{question:'',checkAnswers:false,sampleAnswer:''};
    const uid=`ans-${stIdx}-${sli}`;
    const savedAnswer=answers[`${stIdx}-${sli}`]||'';
    html+=`<div class="source-text">${esc(d.question||slot.content||'')}</div>
      <div style="font-size:.8rem;opacity:.5;margin:6px 0 12px;">ענה/י על השאלה</div>
      <textarea class="answer-area" id="${uid}" rows="5"
        placeholder="כתוב/כתבי את תשובתך כאן...">${esc(savedAnswer)}</textarea>
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;">
        <button class="btn-submit" onclick="saveQAnswer('${stIdx}','${sli}','${uid}',${JSON.stringify(d).replace(/'/g,'\\'')})">שמור תשובה ✓</button>
        <span class="answer-saved" id="saved-${stIdx}-${sli}" style="display:none;">✅ נשמר</span>
        <button onclick="openAgent('${stIdx}','${sli}',\`${esc(d.question||slot.content||'')}\`)"
          style="margin-right:auto;padding:6px 12px;background:rgba(109,40,217,.15);border:1px solid rgba(109,40,217,.3);border-radius:20px;color:#c4b5fd;font-family:'Heebo',sans-serif;font-size:.8rem;cursor:pointer;">
          ${agentConfig.avatar||'🤖'} שאל/י את הסוכן
        </button>
      </div>`;
    block.innerHTML=html;
    return block;
  }

  // ── רב-ברירה ──
  if(slot.type==='mc_q'){
    const mc=slot.mcData||{question:'',options:['','','',''],correct:0};
    const answered=savedAnswer!=='';
    const chosenIdx=answered?parseInt(savedAnswer):-1;
    const optHtml=mc.options.map((o,oi)=>{
      if(!o)return '';
      let style='';
      if(answered){
        if(oi===mc.correct) style='background:rgba(34,197,94,.2);border-color:#22c55e;';
        else if(oi===chosenIdx) style='background:rgba(248,129,113,.15);border-color:#f87171;';
        else style='opacity:.5;';
      }
      return `<button class="mc-option" data-idx="${oi}" onclick="chooseMC(${stIdx},${sli},${oi},${mc.correct})"
        style="${style}${answered?'pointer-events:none;':''}">${esc(o)}</button>`;
    }).join('');
    html+=`<div class="source-text">${esc(mc.question)}</div>
      <div class="mc-options" id="mc-${stIdx}-${sli}">${optHtml}</div>
      <div class="answer-saved" id="saved-${stIdx}-${sli}" style="${answered?'display:block':'display:none'}">
        ${chosenIdx===mc.correct?'✅ נכון!':'❌ לא נכון. התשובה הנכונה: '+esc(mc.options[mc.correct]||'')}
      </div>`;
    block.innerHTML=html;
    return block;
  }

  // ── נכון/לא נכון ──
  if(slot.type==='tf_q'){
    const tf=slot.tfData||{question:'',correct:true,isSurvey:false};
    const answered=savedAnswer!=='';
    const chosen=savedAnswer==='true'?true:savedAnswer==='false'?false:null;
    const btnStyle=(val)=>{
      let s='flex:1;padding:10px;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:Heebo,sans-serif;border:2px solid var(--border2);background:transparent;color:var(--parch);';
      if(answered){
        if(val===tf.correct) s+='border-color:#22c55e;background:rgba(34,197,94,.15);color:#22c55e;';
        else if(val===chosen) s+='border-color:#f87171;background:rgba(248,129,113,.1);color:#f87171;';
        else s+='opacity:.4;';
        s+='pointer-events:none;';
      }
      return s;
    };
    html+=`<div class="source-text">${esc(tf.question)}</div>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button style="${btnStyle(true)}" onclick="chooseTF(${stIdx},${sli},true,${tf.isSurvey?'true':'false'},${tf.correct?'true':'false'})">✅ נכון</button>
        <button style="${btnStyle(false)}" onclick="chooseTF(${stIdx},${sli},false,${tf.isSurvey?'true':'false'},${tf.correct?'true':'false'})">❌ לא נכון</button>
      </div>
      <div class="answer-saved" id="saved-${stIdx}-${sli}" style="${answered?'display:block':'display:none'}">
        ${tf.isSurvey?'✓ תשובתך נשמרה':(chosen===tf.correct?'✅ נכון!':'❌ לא נכון')}
      </div>`;
    block.innerHTML=html;
    return block;
  }

  if(typeInfo.hasAnswer){
    const uid=`ans-${stIdx}-${sli}`;
    html+=`<textarea class="answer-area" id="${uid}" placeholder="כתוב/כתבי את תשובתך כאן...">${esc(savedAnswer)}</textarea>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="btn-submit" onclick="saveAnswer('${stIdx}','${sli}','${uid}')">שמור תשובה ✓</button>
        <span class="answer-saved" id="saved-${stIdx}-${sli}">✅ נשמר</span>
      </div>`;
  }

  block.innerHTML=html;
  return block;
}

function buildSortTable(slot, stIdx, sli){
  const block=document.createElement('div');
  block.className='slot-block';
  const td=slot.tableData;
  if(!td||!td.cols||!td.items){
    block.innerHTML='<div style="opacity:.4;font-size:.85rem;">טבלת המיון אינה מוגדרת</div>';
    return block;
  }

  // ערבוב פריטים
  const shuffled=[...td.items.map((it,i)=>({...it,origIdx:i}))].sort(()=>Math.random()-.5);

  const id=`st-${stIdx}-${sli}`;

  // בניית טבלה
  const colsHtml=td.cols.map((c,ci)=>`<th>${c.name}</th>`).join('');
  // מספר שורות = כמות הפריטים / עמודות (לפחות 1)
  const rows=Math.ceil(td.items.length/td.cols.length)||1;
  let tableRows='';
  for(let r=0;r<rows;r++){
    tableRows+=`<tr>${td.cols.map((_,ci)=>`<td><div class="sort-cell" id="${id}-cell-${r}-${ci}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropChip(event,'${id}',${r},${ci})"></div></td>`).join('')}</tr>`;
  }

  const bankHtml=shuffled.map(it=>`
    <div class="sort-chip" draggable="true" id="${id}-chip-${it.origIdx}"
      data-idx="${it.origIdx}" data-answer="${it.answer}"
      ondragstart="dragChip(event,'${id}',${it.origIdx})">
      ${esc(it.text)}
    </div>`).join('');

  block.innerHTML=`
    <div class="slot-type-label">📊 טבלת מיון</div>
    <div class="sort-wrap">
      <div class="sort-table-area">
        <table class="sort-table">
          <thead><tr>${colsHtml}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
        <button class="btn-check" onclick="checkSortTable('${id}',${stIdx},${sli})">בדוק ✓</button>
        <div class="sort-result" id="${id}-result"></div>
      </div>
      <div class="sort-bank">
        <div class="sort-bank-title">פריטים למיון</div>
        <div class="sort-bank-items" id="${id}-bank">${bankHtml}</div>
      </div>
    </div>`;

  // שמירת מידע לבדיקה
  block.dataset.tableId=id;
  block.dataset.cols=td.cols.length;
  return block;
}


function buildFillTable(slot, stIdx, sli){

function saveFillTableCell(tableId, stIdx, sli, showMsg){
  const cells={};
  document.querySelectorAll('[id^="'+tableId+'-"]').forEach(el=>{
    const parts=el.id.replace(tableId+'-','').split('-');
    if(parts.length===2) cells[parts[0]+'-'+parts[1]]=el.value;
  });
  const val=JSON.stringify(cells);
  answers[stIdx+'-'+sli]=val;
  if(isPreview){
    db.ref(teacherAnswersPath+'/station_'+stIdx+'_'+sli).set({answer:val,savedAt:Date.now()});
  } else if(studentName&&classCode){
    db.ref('studentAnswers/'+classCode+'/'+studentName+'/lesson_'+lessonIdx+'/station_'+stIdx+'_'+sli).set({
      answer:val, timestamp:Date.now(), lessonTopic:lessonData.topic||''
    });
  }
  if(showMsg){
    const saved=document.getElementById('saved-'+stIdx+'-'+sli);
    if(saved){
      saved.textContent=isPreview?'✅ נשמר כדוגמא':'✅ נשמר';
      saved.style.display='block';
      setTimeout(()=>saved.style.display='none',2000);
    }
  }
}

function tlPlace(uid,bi,slotType,idx){

function klueCheck(uid,useBank){
  const data=window[`_klueData_${uid}`];if(!data)return;
  let correct=0,total=data.hiddenIdxs.size;
  data.hiddenIdxs.forEach(wi=>{
    const blank=document.getElementById(`klue-blank-${uid}-${wi}`);
    if(!blank)return;
    const correct_word=(data.words[wi]||'').replace(/[.,;:!?״"'()\[\]]/g,'').trim().toLowerCase();
    let student_word='';
    if(useBank){student_word=(data.filled[wi]?.word||'').trim().toLowerCase();}
    else{student_word=(blank.querySelector('input')?.value||blank.textContent||'').trim().toLowerCase();}
    const isCorrect=student_word===correct_word;
    if(isCorrect){correct++;blank.classList.add('filled');blank.classList.remove('wrong');}
    else{blank.classList.add('wrong');blank.classList.remove('filled');}
  });
  const score=document.getElementById(`klue-score-${uid}`);
  if(score){
    score.style.display='block';
    score.innerHTML=correct===total?`🎉 מצוין! כל ${total} המילים נכונות!`:`${correct} מתוך ${total} נכון`;
    score.style.color=correct===total?'#22c55e':'var(--parch)';
  }
}

function klueReset(uid){
  const data=window[`_klueData_${uid}`];if(!data)return;
  data.filled={};
  data.hiddenIdxs.forEach(wi=>{
    const blank=document.getElementById(`klue-blank-${uid}-${wi}`);
    if(blank){blank.classList.remove('filled','wrong');blank.innerHTML='&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;';blank.onclick=null;}
  });
  data.bankWords.forEach((_,bi)=>{
    const chip=document.getElementById(`klue-chip-${uid}-${bi}`);
    if(chip)chip.classList.remove('used');
  });
  const score=document.getElementById(`klue-score-${uid}`);
  if(score)score.style.display='none';
}

async function klueHint(uid,fullText,stIdx,sli){
  const data=window[`_klueData_${uid}`];if(!data)return;
  // מצא ריבוע ריק ראשון
  let emptyWi=null;
  for(const wi of data.hiddenIdxs){if(!data.filled[wi]){emptyWi=wi;break;}}
  if(emptyWi===null){return;}
  const hintEl=document.getElementById(`klue-hint-${uid}`);
  if(hintEl)hintEl.style.display='block';
  if(hintEl)hintEl.textContent='הסוכן חושב...';
  const context=data.words.slice(Math.max(0,emptyWi-4),emptyWi+5).join(' ');
  const sys=`אתה סוכן למידה. תן רמז אחד קצר (משפט אחד) שיעזור לתלמיד למצוא את המילה החסרה בטקסט הבא: "${context}". אל תאמר את המילה עצמה. ענה בעברית.`;
  try{
    const res=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,system:sys,messages:[{role:'user',content:'רמז בבקשה'}]})});
    const d2=await res.json();
    const hint=d2.content?.[0]?.text||'נסה לחשוב על ההקשר של המשפט';
    if(hintEl)hintEl.textContent='💡 '+hint;
  }catch(e){if(hintEl)hintEl.textContent='לא ניתן להתחבר לסוכן כרגע';}
}

// ── WHAT CONNECTS DRAG ──
let _wc2Dragging={uid:null,ci:null};

function wc2DragStart(e,uid,ci){
  _wc2Dragging={uid,ci};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById(`wc2-card-${uid}-${ci}`);if(el)el.style.opacity='.4';},0);
}
function wc2DragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function wc2DragLeave(e){e.currentTarget.classList.remove('drag-over');}
function wc2Drop(e,uid,pi,si){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  wc2PlaceCard(uid,_wc2Dragging.ci,pi,si);
  const el=document.getElementById(`wc2-card-${uid}-${_wc2Dragging.ci}`);
  if(el)el.style.opacity='';
}

let _wc2Touch={uid:null,ci:null,clone:null};
function wc2TouchStart(e,uid,ci){
  _wc2Touch={uid,ci,clone:null};
  const el=e.currentTarget;
  const rect=el.getBoundingClientRect();
  const clone=el.cloneNode(true);
  clone.style.cssText=`position:fixed;width:${rect.width}px;opacity:.8;z-index:999;pointer-events:none;top:${rect.top}px;left:${rect.left}px;margin:0;`;
  document.body.appendChild(clone);
  _wc2Touch.clone=clone;
}
function wc2TouchMove(e,uid){
  e.preventDefault();
  if(!_wc2Touch.clone)return;
  const t=e.touches[0];
  _wc2Touch.clone.style.top=(t.clientY-24)+'px';
  _wc2Touch.clone.style.left=(t.clientX-_wc2Touch.clone.offsetWidth/2)+'px';
  document.querySelectorAll(`[id^="wc2-slot-${uid}-"]`).forEach(s=>s.classList.remove('drag-over'));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  el?.closest('[id^="wc2-slot-"]')?.classList.add('drag-over');
}
function wc2TouchEnd(e,uid){
  if(_wc2Touch.clone){_wc2Touch.clone.remove();_wc2Touch.clone=null;}
  const t=e.changedTouches[0];
  document.querySelectorAll(`[id^="wc2-slot-${uid}-"]`).forEach(s=>s.classList.remove('drag-over'));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const slot=el?.closest('[id^="wc2-slot-"]');
  if(slot){
    const parts=slot.id.split('-');
    const si=parseInt(parts.pop()),pi=parseInt(parts.pop());
    wc2PlaceCard(uid,_wc2Touch.ci,pi,si);
  }
}

function wc2PlaceCard(uid,ci,pi,si){
  const data=window[`_wc2Data_${uid}`];if(!data||ci===null)return;
  const card=data.shuffled[ci];
  const key=`${pi}-${si}`;

  // אם המשבצת תפוסה — החזר לבנק
  const prev=data.slots[key];
  if(prev!==undefined){
    const prevEl=document.getElementById(`wc2-card-${uid}-${prev}`);
    if(prevEl)prevEl.classList.remove('used');
  }
  // אם הכרטיס כבר מוצב — פנה
  Object.entries(data.slots).forEach(([k,v])=>{
    if(v===ci){
      delete data.slots[k];
      const [pp,ss]=k.split('-');
      const slotEl=document.getElementById(`wc2-slot-${uid}-${pp}-${ss}`);
      if(slotEl){slotEl.innerHTML='<span style="opacity:.3;font-size:.75rem;">גרור כרטיסיה</span>';slotEl.classList.remove('has-card');}
    }
  });
  data.slots[key]=ci;
  const cardEl=document.getElementById(`wc2-card-${uid}-${ci}`);
  if(cardEl)cardEl.classList.add('used');
  const slotEl=document.getElementById(`wc2-slot-${uid}-${pi}-${si}`);
  if(slotEl){
    slotEl.classList.add('has-card');
    const imgOrText=card.type==='image'
      ?`<img src="${card.value}" style="height:44px;width:66px;object-fit:cover;border-radius:5px;" onerror="this.style.display='none'"> `
      :card.value;
    slotEl.innerHTML=`<span style="font-size:.85rem;">${imgOrText}</span>
      <button class="wc2-remove-btn" onclick="wc2RemoveCard('${uid}',${pi},${si})">✕</button>`;
  }
}

function wc2RemoveCard(uid,pi,si){
  const data=window[`_wc2Data_${uid}`];if(!data)return;
  const key=`${pi}-${si}`;
  const ci=data.slots[key];
  if(ci!==undefined){
    delete data.slots[key];
    const cardEl=document.getElementById(`wc2-card-${uid}-${ci}`);
    if(cardEl)cardEl.classList.remove('used');
  }
  const slotEl=document.getElementById(`wc2-slot-${uid}-${pi}-${si}`);
  if(slotEl){slotEl.innerHTML='<span style="opacity:.3;font-size:.75rem;">גרור כרטיסיה</span>';slotEl.classList.remove('has-card');}
}

async function wc2Submit(uid,numPairs){
  const data=window[`_wc2Data_${uid}`];if(!data)return;
  const pairs=[];
  for(let pi=0;pi<numPairs;pi++){
    const c0=data.slots[`${pi}-0`];
    const c1=data.slots[`${pi}-1`];
    const conn=document.querySelector(`#wc2-pair-${uid}-${pi} .wc2-connection-input`)?.value||'';
    pairs.push({
      card0:c0!==undefined?data.shuffled[c0]?.value:'',
      card1:c1!==undefined?data.shuffled[c1]?.value:'',
      connection:conn
    });
  }
  const key=`${uid.split('-')[1]}-${uid.split('-')[2]}`;
  await db.ref(answersPath+'/'+key).set({pairs,ts:Date.now()});
  const parts=uid.split('-');
  const saved=document.getElementById(`saved-${parts[1]}-${parts[2]}`);
  if(saved){saved.style.display='inline';setTimeout(()=>saved.style.display='none',2500);}
}

function checkSortTable(tableId, stIdx, sli){
  const cells=document.querySelectorAll(`[id^="${tableId}-cell-"]`);
  let correct=0, total=0;
  cells.forEach(cell=>{
    const chips=cell.querySelectorAll('.sort-chip');
    const ci=parseInt(cell.id.split('-').pop());
    chips.forEach(chip=>{
      total++;
      const correctCol=parseInt(chip.dataset.answer);
      if(correctCol===ci){correct++;chip.classList.add('correct');chip.classList.remove('wrong');}
      else{chip.classList.add('wrong');chip.classList.remove('correct');}
    });
  });
  const result=document.getElementById(`${tableId}-result`);
  if(result){
    if(total===0){result.textContent='גררי פריטים לטבלה תחילה';return;}
    result.textContent=correct===total
      ?`✅ מצוין! כל ${total} הפריטים נכונים!`
      :`${correct}/${total} נכון — נסי שוב`;
    result.style.color=correct===total?'#6ee7a0':'#f59e0b';
  }
  // שמירה ב-Firebase
  if(studentName&&classCode){
    db.ref(`studentAnswers/${classCode}/${studentName}/lesson_${lessonIdx}/station_${stIdx}_${sli}`).set({
      correct,total,timestamp:Date.now(),lessonTopic:lessonData.topic||''
    });
  }
}

function saveAnswer(stIdx,sli,uid){
  const el=document.getElementById(uid);
  const val=el?.value.trim();
  if(!val)return;
  // בדיקת 3 מילים לפחות
  const words=val.split(/\s+/).filter(w=>w.length>0);
  if(words.length<3){
    el.style.borderColor='#f87171';
    showValidationMsg('יש לכתוב לפחות 3 מילים לפני השמירה.');
    return;
  }
  el.style.borderColor='';
  answers[`${stIdx}-${sli}`]=val;

  if(isPreview){
    // שמור כתשובת דוגמא של המורה
    db.ref(`${teacherAnswersPath}/station_${stIdx}_${sli}`).set({
      answer:val, savedAt:Date.now()
    });
    const savedEl=document.getElementById(`saved-${stIdx}-${sli}`);
    if(savedEl){savedEl.textContent='✅ נשמר כתשובת דוגמא';savedEl.style.display='block';setTimeout(()=>savedEl.style.display='none',2500);}
  } else {
    // שמור תשובת תלמיד
    if(studentName&&classCode){
      db.ref(`studentAnswers/${classCode}/${studentName}/lesson_${lessonIdx}/station_${stIdx}_${sli}`).set({
        answer:val, timestamp:Date.now(), lessonTopic:lessonData.topic||''
      });
    }
    const savedEl=document.getElementById(`saved-${stIdx}-${sli}`);
    if(savedEl){savedEl.style.display='block';setTimeout(()=>savedEl.style.display='none',2500);}
    // הצג תשובת דוגמא של המורה אחרי השמירה
    const modelKey=`station_${stIdx}_${sli}`;
    if(teacherAnswers[modelKey]?.answer){
      let modelEl=document.getElementById(`model-${stIdx}-${sli}`);
      if(!modelEl){
        modelEl=document.createElement('div');
        modelEl.id=`model-${stIdx}-${sli}`;
        modelEl.style.cssText='margin-top:8px;padding:8px 12px;background:rgba(42,107,42,.15);border:1px solid rgba(42,107,42,.3);border-radius:8px;font-size:.8rem;color:#6ee7a0;direction:rtl;';
        modelEl.innerHTML=`<div style="font-size:.68rem;font-weight:700;opacity:.7;margin-bottom:4px;">💡 תשובת דוגמא:</div>${esc(teacherAnswers[modelKey].answer)}`;
        el.parentElement.appendChild(modelEl);
      }
    }
  }
}

function updateNav(){
  const total=allStations.length;
  document.getElementById('station-counter').textContent=`${currentStation+1} / ${total}`;
  document.getElementById('btn-prev').style.visibility=currentStation===0?'hidden':'visible';
  document.getElementById('btn-next').textContent=currentStation>=total-1?'סיים שיעור ✓':'הבא ←';
  document.getElementById('progress-fill').style.width=((currentStation+1)/total*100)+'%';
}

function nextStation(){
  // בדיקה שכל שאלות החובה בתחנה הנוכחית נשמרו
  const st=allStations[currentStation];
  const items=Array.isArray(st.items)?st.items:[st.item||null];
  let hasUnsaved=false;
  items.forEach((item,sli)=>{
    if(!item)return;
    const typeInfo=ITEM_TYPES[item.type]||{};
    if(!typeInfo.hasAnswer)return;
    const uid=`ans-${currentStation}-${sli}`;
    const el=document.getElementById(uid);
    if(!el)return;
    const saved=answers[`${currentStation}-${sli}`];
    const words=(el.value||'').trim().split(/\s+/).filter(w=>w.length>0);
    if(words.length<3&&!saved){
      el.style.borderColor='#f87171';
      hasUnsaved=true;
    }
  });
  if(hasUnsaved){
    showValidationMsg('יש לענות על כל השאלות (לפחות 3 מילים) לפני המעבר לתחנה הבאה.');
    return;
  }
  if(currentStation>=allStations.length-1){showEndScreen();return;}
  currentStation++;
  renderCurrentStation();
  window.scrollTo(0,0);
}

function prevStation(){
  if(currentStation<=0)return;
  currentStation--;
  renderCurrentStation();
  window.scrollTo(0,0);
}

function showEndScreen(){
  document.getElementById('stations-container').querySelectorAll('.station-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('end-screen').classList.add('active');
  document.getElementById('nav-footer').style.display='none';
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('end-sub').textContent=`${lessonData.topic||'השיעור'} הושלם בהצלחה 🎉`;
  // סמן סיום שיעור ב-Firebase
  if(studentName&&classCode){
    db.ref(`studentProgress/${classCode}/${studentName.replace(/ /g,'_')}/lesson_${lessonIdx}`).set({
      completed:true, completedAt:Date.now(), topic:lessonData.topic||''
    });
    // סמן זמינות לקרון העשרה
    db.ref(`enrichmentAvailable/${classCode}/${studentName.replace(/ /g,'_')}`).set({
      available:true, lessonIdx, at:Date.now()
    });
  }
  // הצג כפתור קרון העשרה אם יש תוכן
  const enr=lessonData.enrichment||{};
  const hasEnrich=(enr.pairsSelectedGames&&enr.pairsSelectedGames.length)||(enr.qaSelectedGames&&enr.qaSelectedGames.length);
  if(hasEnrich){
    document.getElementById('btn-enrichment').style.display='block';
  }
}
