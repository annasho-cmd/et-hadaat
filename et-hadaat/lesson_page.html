let _ddDragging={uid:null,itemIdx:null};

function ddDragStart(e,uid,idx){
  _ddDragging={uid,itemIdx:idx};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById(`dd-item-${uid}-${idx}`);if(el)el.classList.add('dragging');},0);
}
function ddDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function ddDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function ddDrop(e,uid,slotIdx){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const {itemIdx}=_ddDragging;
  if(itemIdx===null)return;
  placeItemInSlot(uid,itemIdx,slotIdx);
}

// Touch support
let _touchItem=null;
let _touchClone=null;
function ddTouchStart(e,uid,idx){
  _ddDragging={uid,itemIdx:idx};
  const el=e.currentTarget;
  const rect=el.getBoundingClientRect();
  _touchClone=el.cloneNode(true);
  _touchClone.style.cssText=`position:fixed;width:${rect.width}px;opacity:.8;z-index:999;pointer-events:none;top:${rect.top}px;left:${rect.left}px;margin:0;`;
  document.body.appendChild(_touchClone);
  el.classList.add('dragging');
}
function ddTouchMove(e,uid){
  e.preventDefault();
  if(!_touchClone)return;
  const t=e.touches[0];
  _touchClone.style.top=(t.clientY-30)+'px';
  _touchClone.style.left=(t.clientX-_touchClone.offsetWidth/2)+'px';
  // highlight slot under finger
  document.querySelectorAll(`[id^="dd-slot-${uid}-"]`).forEach(s=>s.classList.remove('drag-over'));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const slot=el?.closest('[id^="dd-slot-"]');
  if(slot)slot.classList.add('drag-over');
}
function ddTouchEnd(e,uid){
  if(_touchClone){_touchClone.remove();_touchClone=null;}
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const slot=el?.closest('[id^="dd-slot-"]');
  document.querySelectorAll(`[id^="dd-slot-${uid}-"]`).forEach(s=>s.classList.remove('drag-over'));
  if(slot){
    const slotIdx=parseInt(slot.id.split('-').pop());
    placeItemInSlot(uid,_ddDragging.itemIdx,slotIdx);
  }
  const itemEl=document.getElementById(`dd-item-${uid}-${_ddDragging.itemIdx}`);
  if(itemEl)itemEl.classList.remove('dragging');
}

function placeItemInSlot(uid,itemIdx,slotIdx){
  const data=window[`_ddData_${uid}`];if(!data)return;
  const item=data.shuffled[itemIdx];
  // אם המשבצת תפוסה — החזר את הפריט הישן לבנק
  const prev=data.slots[slotIdx];
  if(prev!==undefined){
    const prevEl=document.getElementById(`dd-item-${uid}-${prev}`);
    if(prevEl)prevEl.style.display='flex';
  }
  // אם הפריט כבר מונח במשבצת אחרת — פנה אותה
  Object.entries(data.slots).forEach(([si,ii])=>{
    if(parseInt(ii)===itemIdx){delete data.slots[si];
      document.getElementById(`dd-slot-text-${uid}-${si}`).textContent='';
      document.getElementById(`dd-slot-${uid}-${si}`).dataset.itemIdx='';}
  });
  data.slots[slotIdx]=itemIdx;
  const slotTextEl=document.getElementById(`dd-slot-text-${uid}-${slotIdx}`);
  if(slotTextEl)slotTextEl.textContent=item.text;
  const itemEl=document.getElementById(`dd-item-${uid}-${itemIdx}`);
  if(itemEl)itemEl.style.display='none';
}

function checkDD(uid,total){
  const data=window[`_ddData_${uid}`];if(!data)return;
  let correct=0;
  for(let i=0;i<total;i++){
    const itemIdx=data.slots[i];
    const slot=document.getElementById(`dd-slot-${uid}-${i}`);
    const slotText=document.getElementById(`dd-slot-text-${uid}-${i}`);
    if(itemIdx===undefined){
      if(slot)slot.style.borderColor='#f87171';
      continue;
    }
    const item=data.shuffled[itemIdx];
    const isCorrect=item.origIdx===i;
    if(isCorrect){correct++;if(slot){slot.style.borderColor='#22c55e';slot.style.background='rgba(34,197,94,.08)';}}
    else{if(slot){slot.style.borderColor='#f87171';slot.style.background='rgba(248,129,113,.08)';}}
  }
  const score=document.getElementById(`dd-score-${uid}`);
  if(score){
    score.style.display='block';
    score.innerHTML=correct===total
      ?`🎉 מצוין! כל ${total} המשפטים בסדר הנכון!`
      :`${correct} מתוך ${total} נכון — נסה שוב`;
    score.style.color=correct===total?'#22c55e':'var(--parch)';
  }
  // שמור תוצאה
  db.ref(answersPath+`/${stIdx||0}-${sli||0}`).set({correct,total,ts:Date.now()}).catch(()=>{});
}

function resetDD(uid){
  const data=window[`_ddData_${uid}`];if(!data)return;
  data.slots={};
  // החזר כל הפריטים לבנק
  data.shuffled.forEach((_,i)=>{
    const el=document.getElementById(`dd-item-${uid}-${i}`);
    if(el){el.style.display='flex';el.classList.remove('correct','wrong','dragging');}
  });
  // נקה משבצות
  Object.keys(data.slots).forEach(si=>{
    const el=document.getElementById(`dd-slot-text-${uid}-${si}`);
    if(el)el.textContent='';
    const slot=document.getElementById(`dd-slot-${uid}-${si}`);
    if(slot){slot.style.borderColor='';slot.style.background='';}
  });
  // נקה ציון
  const score=document.getElementById(`dd-score-${uid}`);
  if(score)score.style.display='none';
  // רענן לגמרי
  data.slots={};
  document.querySelectorAll(`[id^="dd-slot-text-${uid}-"]`).forEach(el=>el.textContent='');
  document.querySelectorAll(`[id^="dd-slot-${uid}-"]`).forEach(el=>{el.style.borderColor='';el.style.background='';});
  document.querySelectorAll(`[id^="dd-item-${uid}-"]`).forEach(el=>el.style.display='');
}

// ── WORDCLOUD FUNCTIONS ──
const WC_COLORS=['#f0c060','#86efac','#93c5fd','#f9a8d4','#c4b5fd','#fdba74','#6ee7b7','#fca5a5','#fde68a','#a5f3fc'];

async function submitWC(wcId,boardId,question,maxWords){
  const inp=document.getElementById('wc-input-'+wcId);
  if(!inp)return;
  const raw=inp.value.trim();
  if(!raw)return;
  // הגבל מספר מילים
  const words=raw.split(/\s+/).slice(0,maxWords).join(' ');
  inp.value='';
  await db.ref(`wordclouds/${boardId}/words`).push({
    word:words,student:studentName||'',ts:Date.now()
  });
  // שמור meta
  db.ref(`wordclouds/${boardId}/meta`).set({question,createdAt:Date.now()});
  const saved=document.getElementById('saved-'+wcId.replace('wc-',''));
  if(saved){saved.style.display='inline';setTimeout(()=>saved.style.display='none',2000);}
}

function listenWC(wcId,boardId){
  db.ref(`wordclouds/${boardId}/words`).on('value',snap=>{
    const data=snap.val()||{};
    const freq={};
    Object.values(data).forEach(entry=>{
      const w=(entry.word||'').trim().toLowerCase();
      if(w)freq[w]=(freq[w]||0)+1;
    });
    drawWordCloud(wcId,freq);
  });
}

function drawWordCloud(wcId,freq){
  const wrap=document.getElementById('wc-wrap-'+wcId);
  const canvas=document.getElementById('wc-canvas-'+wcId);
  const emptyEl=document.getElementById('wc-empty-'+wcId);
  if(!canvas)return;
  const words=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  if(!words.length){if(emptyEl)emptyEl.style.display='block';return;}
  if(emptyEl)emptyEl.style.display='none';

  const w=wrap.offsetWidth||600;
  const h=wrap.offsetHeight||200;
  canvas.width=w;
  canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);

  const maxFreq=words[0][1];
  const minSize=14,maxSize=52;
  const placed=[];

  function overlaps(x,y,tw,th){
    return placed.some(p=>!(x+tw<p.x||x>p.x+p.w||y+th<p.y||y>p.y+p.h));
  }

  words.forEach(([word,count],i)=>{
    const size=Math.round(minSize+(count/maxFreq)*(maxSize-minSize));
    ctx.font=`bold ${size}px Heebo,sans-serif`;
    const tw=ctx.measureText(word).width+8;
    const th=size+6;
    let placed_=false;
    // נסה למקם
    for(let attempt=0;attempt<80;attempt++){
      const x=Math.random()*(w-tw);
      const y=Math.random()*(h-th)+th;
      if(!overlaps(x,y-th,tw,th)){
        ctx.fillStyle=WC_COLORS[i%WC_COLORS.length];
        ctx.fillText(word,x,y);
        placed.push({x,y:y-th,w:tw,h:th});
        placed_=true;
        break;
      }
    }
  });
}

let _agentPanel=null;
let _agentHistory=[];

function openAgent(stIdx,sli,question){
  if(_agentPanel){_agentPanel.remove();_agentPanel=null;return;}
  const panel=document.createElement('div');
  panel.style.cssText='position:fixed;bottom:0;left:0;right:0;max-height:55vh;background:#1a0f05;border-top:1px solid rgba(109,40,217,.4);display:flex;flex-direction:column;z-index:200;font-family:Heebo,sans-serif;';
  const avatar=agentConfig.avatar||'\u{1F916}';
  const name=agentConfig.name||'\u05E1\u05D5\u05DB\u05DF \u05D4\u05DC\u05DE\u05D9\u05D3\u05D4';
  panel.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(109,40,217,.2);">
      <span style="font-size:1.2rem;">${avatar}</span>
      <span style="font-weight:700;font-size:.9rem;color:#c4b5fd;">${name}</span>
      <button onclick="this.closest('[style]').remove();_agentPanel=null;"
        style="margin-right:auto;background:none;border:none;color:#c4b5fd;cursor:pointer;font-size:1rem;">✕</button>
    </div>
    <div id="agent-msgs" style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;">
      <div style="background:rgba(109,40,217,.12);border:1px solid rgba(109,40,217,.2);border-radius:10px;padding:10px 12px;font-size:.85rem;color:#e9d5ff;">שלום! אני כאן לעזור לך לחשוב. מה מעסיק אותך בשאלה?</div>
    </div>
    <div style="display:flex;gap:8px;padding:10px 16px;border-top:1px solid rgba(109,40,217,.2);">
      <textarea id="agent-input" rows="2" placeholder="שאל/י אותי..."
        style="flex:1;resize:none;background:rgba(109,40,217,.08);border:1px solid rgba(109,40,217,.3);border-radius:8px;color:#fdf5e0;font-family:Heebo,sans-serif;font-size:.85rem;padding:8px;outline:none;"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAgent(this.dataset.q);}"></textarea>
      <button onclick="sendAgent(document.getElementById('agent-input').dataset.q)"
        style="padding:8px 14px;background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85rem;">↑</button>
    </div>`;
  document.body.appendChild(panel);
  _agentPanel=panel;
  const inp=document.getElementById('agent-input');
  inp.dataset.q=question;
  inp.focus();
}

async function sendAgent(question){
  const inp=document.getElementById('agent-input');
  if(!inp)return;
  const msg=inp.value.trim();if(!msg)return;
  inp.value='';
  const msgs=document.getElementById('agent-msgs');
  const userBubble=document.createElement('div');
  userBubble.style.cssText='background:rgba(253,245,224,.08);border:1px solid rgba(253,245,224,.12);border-radius:10px;padding:10px 12px;font-size:.85rem;color:#fdf5e0;align-self:flex-end;max-width:80%;';
  userBubble.textContent=msg;
  msgs.appendChild(userBubble);
  const thinking=document.createElement('div');
  thinking.style.cssText='font-size:.78rem;opacity:.4;font-style:italic;';
  thinking.textContent='חושב...';
  msgs.appendChild(thinking);
  msgs.scrollTop=msgs.scrollHeight;
  _agentHistory.push({role:'user',content:msg});
  try{
    const sys=`אתה סוכן למידה תומך. השאלה בשיעור: "${question}". שם התלמיד: "${studentName}". אל תתן תשובות ישירות — שאל שאלות שיעזרו לתלמיד להגיע לתובנות בעצמו. ענה בעברית פשוטה, משפטים קצרים.`;
    const res=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:_agentHistory})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'לא הצלחתי להתחבר.';
    thinking.remove();
    const ab=document.createElement('div');
    ab.style.cssText='background:rgba(109,40,217,.12);border:1px solid rgba(109,40,217,.2);border-radius:10px;padding:10px 12px;font-size:.85rem;color:#e9d5ff;';
    ab.textContent=reply;
    msgs.appendChild(ab);
    _agentHistory.push({role:'assistant',content:reply});
    if(_agentHistory.length>20)_agentHistory=_agentHistory.slice(-20);
  }catch(e){thinking.textContent='שגיאת חיבור. נסה שוב.';}
  msgs.scrollTop=msgs.scrollHeight;
}

function insertWord(el,uid,word){
  const ta=document.getElementById(uid);
  if(!ta)return;
  const pos=ta.selectionStart;
  ta.value=ta.value.slice(0,pos)+word+' '+ta.value.slice(pos);
  ta.focus();
  ta.selectionStart=ta.selectionEnd=pos+word.length+1;
}

function saveArgueAnswer(stIdx,sli,uid,isStructured,numSections){
  let val;
  if(isStructured&&numSections>0){
    val=JSON.stringify(Array.from({length:numSections},(_,i)=>({text:document.getElementById(uid+'-'+i)?.value||''})));
  } else {
    val=document.getElementById(uid)?.value||'';
  }
  answers[`${stIdx}-${sli}`]=val;
  db.ref(answersPath+`/${stIdx}-${sli}`).set(val);
  const saved=document.getElementById(`saved-${stIdx}-${sli}`);
  if(saved){saved.style.display='inline';setTimeout(()=>saved.style.display='none',2000);}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
