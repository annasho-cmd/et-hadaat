<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>הצגה על לוח — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{
  --gold:#d4a843;--gold2:#f0c060;--parch:#fdf5e0;
  --surface:rgba(44,26,14,0.88);--border:rgba(212,168,67,0.22);
  --border2:rgba(212,168,67,0.42);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0a0602;color:var(--parch);min-height:100vh;direction:rtl;}

/* TOPBAR */
.topbar{background:rgba(10,5,2,.98);border-bottom:1px solid var(--border2);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--gold2);}
.step-nav{display:flex;gap:8px;}
.step-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;opacity:.5;}
.step-btn.active{background:rgba(212,168,67,.15);border-color:var(--gold);color:var(--gold2);opacity:1;}
.btn-ctrl{padding:6px 14px;border-radius:8px;border:none;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}
.btn-prev{background:none;border:1px solid var(--border2);color:var(--parch);}
.btn-next{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;}

/* MAIN */
.main{padding:32px 48px;max-width:1100px;margin:0 auto;}

/* SECTION LABEL */
.section-label{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.35;margin-bottom:16px;}

/* STATION DISPLAY */
.station-display{display:flex;flex-direction:column;gap:20px;}
.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 28px;}
.slot-type{font-size:.72rem;font-weight:700;color:var(--gold);opacity:.6;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.slot-content{font-size:1.05rem;line-height:1.8;direction:rtl;}
.slot-image{max-width:100%;border-radius:10px;max-height:400px;object-fit:contain;}

/* SORT TABLE DISPLAY */
.sort-table-display{width:100%;border-collapse:collapse;}
.sort-table-display th{background:rgba(212,168,67,.18);border:1px solid var(--border2);padding:10px 14px;font-size:.9rem;font-weight:700;color:var(--gold2);text-align:center;}
.sort-table-display td{border:1px solid var(--border);padding:8px;vertical-align:top;min-height:44px;}

/* LOADING */
.loading{text-align:center;padding:80px 20px;opacity:.4;}
.spin{display:inline-block;animation:spin 1.2s linear infinite;font-size:2rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="topbar-title" id="lesson-title">טוען...</div>
  </div>
  <div class="step-nav" id="step-nav"></div>
  <div style="display:flex;gap:8px;">
    <button class="btn-ctrl btn-prev" onclick="prevStation()">← קודם</button>
    <button class="btn-ctrl btn-next" onclick="nextStation()">הבא ←</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><span class="spin">⏳</span><br>טוען שיעור...</div>
</div>

<script>
const FB_CFG={apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",authDomain:"et-hadaat.firebaseapp.com",databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",projectId:"et-hadaat",storageBucket:"et-hadaat.firebasestorage.app",messagingSenderId:"141400405468",appId:"1:141400405468:web:c1090c52477d14a159cb19"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

const params=new URLSearchParams(window.location.search);
const subjectId=params.get('subject');
const unitId=params.get('unit');
const lessonIdx=parseInt(params.get('lesson')||'0');
const initStep=parseInt(params.get('step')||'0');
const classCode=params.get('class')||'';

let lessonData=null;
let allStations=[];
let currentStation=0;

const SECTION_LABELS={intro:'🌅 פתיח',body:'🚂 גוף השיעור',closing:'🌇 סיום'};
const STEP_SECTIONS=['intro','body','closing','enrichment'];

window.onload=async function(){
  const snap=await db.ref(`teacher/subjects/${subjectId}/units/${unitId}/lessons/${lessonIdx}`).once('value');
  lessonData=snap.val();
  if(!lessonData){document.getElementById('main').innerHTML='<div class="loading">שיעור לא נמצא</div>';return;}
  document.getElementById('lesson-title').textContent=lessonData.topic||lessonData.name||'שיעור';
  buildStations();
  buildStepNav();
  const stepSection=STEP_SECTIONS[initStep]||'intro';
  const firstInSection=allStations.findIndex(s=>s.section===stepSection);
  currentStation=firstInSection>=0?firstInSection:0;
  currentSlot=0;
  renderStation();
};

function buildStepNav(){
  const nav=document.getElementById('step-nav');
  const sections=['intro','body','closing'];
  const labels=['🌅 פתיח','🚂 גוף','🌇 סיום'];
  nav.innerHTML=sections.map((sec,i)=>`
    <button class="step-btn" data-section="${sec}"
      onclick="jumpToSection('${sec}')">${labels[i]}</button>`).join('');
}

function buildStations(){
  const d=lessonData.data||{};
  allStations=[];
  ['intro','stations','closing'].forEach((key,ki)=>{
    const section=['intro','body','closing'][ki];
    if(d[key]) d[key].forEach((st,si)=>{
      const slots=(st.slots||st.items||[]).filter(s=>s&&s.type&&(s.content||s.tableData||s.mcData||s.tfData||s.argueData));
      if(slots.length) allStations.push({section,si,slots});
    });
  });
}

function buildStepNav(){
  const nav=document.getElementById('step-nav');
  const sections=['intro','body','closing'];
  const labels=['🌅 פתיח','🚂 גוף','🌇 סיום'];
  nav.innerHTML=sections.map((sec,i)=>`
    <button class="step-btn ${allStations.some(s=>s.section===sec)?'':'disabled'}"
      onclick="jumpToSection('${sec}')">${labels[i]}</button>`).join('');
}

function jumpToSection(section){
  const idx=allStations.findIndex(s=>s.section===section);
  if(idx>=0){currentStation=idx;renderStation();}
}

let currentSlot=0;

function renderStation(){
  if(!allStations.length){
    document.getElementById('main').innerHTML='<div class="loading">אין תחנות בשיעור</div>';
    return;
  }
  const st=allStations[Math.min(currentStation,allStations.length-1)];
  currentSlot=Math.min(currentSlot,st.slots.length-1);
  const main=document.getElementById('main');

  // עדכן כפתורי step nav
  document.querySelectorAll('.step-btn').forEach(b=>{
    const sec=b.getAttribute('data-section');
    b.classList.toggle('active',sec===st.section);
  });

  const slot=st.slots[currentSlot];
  const totalSlots=st.slots.length;

  let html=`<div class="section-label">${SECTION_LABELS[st.section]||''} · תחנה ${st.si+1}
    ${totalSlots>1?`<span style="margin-right:10px;opacity:.5;">פריט ${currentSlot+1}/${totalSlots}</span>`:''}
  </div>
  <div class="station-display">
    ${buildSlotHTML(slot)}
  </div>`;

  if(totalSlots>1){
    html+=`<div style="display:flex;gap:10px;justify-content:center;margin-top:20px;">
      ${currentSlot>0?`<button class="btn-ctrl btn-prev" onclick="prevSlot()">← פריט קודם</button>`:''}
      ${currentSlot<totalSlots-1?`<button class="btn-ctrl btn-next" onclick="nextSlot()">פריט הבא ←</button>`:''}
    </div>`;
  }

  main.innerHTML=html;
}

function buildSlotHTML(slot){
  const LABELS={
    entry:'🚪 כרטיס כניסה', entry_card:'🚪 כרטיס כניסה',
    exit:'🎫 כרטיס יציאה',  exit_card:'🎫 כרטיס יציאה',
    open_q:'❓ שאלה פתוחה', question:'❓ שאלה פתוחה',
    sources:'📜 קריאת מקורות',
    image:'🖼️ תמונה', video:'▶️ סרטון',
    sort_table:'📊 טבלת מיון', fill_table:'📋 טבלת מילוי',
    mc_q:'🔘 רב-ברירה', tf_q:'✅ נכון/לא נכון',
    argue:'🖊️ כתיבה טיעונית', full_ans:'📝 תשובה מלאה',
  };

  let inner='';

  if(slot.type==='question'||slot.type==='open_q'){
    const d=slot.questionData||{};
    const q=d.question||slot.content||'';
    inner=`<div class="slot-content" style="font-size:1.15rem;margin-bottom:12px;">${esc(q)}</div>
      <div style="font-size:.8rem;opacity:.4;">התלמידים כותבים את תשובתם בטאבלט</div>`;

  } else if(slot.type==='riddle_draw'){
    const d=slot.riddleData||{riddles:[]};
    const count=(d.riddles||[]).filter(r=>r.answer).length;
    inner=`<div style="text-align:center;padding:28px 20px;">
      <div style="font-size:2.5rem;margin-bottom:10px;">✏️</div>
      <div style="font-size:1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">חידות בציורים</div>
      <div style="font-size:.85rem;opacity:.5;">${count} חידות</div>
      <div style="font-size:.75rem;opacity:.35;margin-top:6px;">התלמידים פותרים בטאבלט</div>
    </div>`;

  } else if(slot.type==='wordsearch'){
    const d=slot.wordsearchData||{instruction:'',clues:[]};
    const validClues=(d.clues||[]).filter(c=>c.word);
    inner=`<div style="text-align:center;padding:28px 20px;">
      <div style="font-size:2.5rem;margin-bottom:10px;">🔤</div>
      <div style="font-size:1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">תפזורת</div>
      <div style="font-size:.85rem;opacity:.5;margin-bottom:6px;">${validClues.length} מושגים מוסתרים</div>
      <div style="font-size:.75rem;opacity:.35;">התלמידים מוצאים ומסמנים בטאבלט</div>
    </div>`;

  } else if(slot.type==='crossword'){
    const d=slot.crosswordData||{instruction:'',clues:[]};
    const validClues=(d.clues||[]).filter(c=>c.word&&c.clue);
    inner=`<div style="text-align:center;padding:28px 20px;">
      <div style="font-size:2.5rem;margin-bottom:10px;">📐</div>
      <div style="font-size:1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">תשבץ</div>
      <div style="font-size:.85rem;opacity:.5;margin-bottom:8px;">${validClues.length} מושגים</div>
      <div style="font-size:.75rem;opacity:.35;">התלמידים פותרים בטאבלט</div>
    </div>`;

  } else if(slot.type==='match_line'){
    const d=slot.matchLineData||{instruction:'',headerA:'',headerB:'',pairs:[]};
    const pairs=(d.pairs||[]).filter(p=>p.a?.value&&p.b?.value);
    const leftHtml=pairs.map(p=>p.a?.type==='image'
      ?`<div style="padding:5px;border:1px solid var(--border);border-radius:6px;"><img src="${esc(p.a.value)}" style="height:44px;width:66px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'"></div>`
      :`<div style="padding:7px 12px;background:rgba(253,245,224,.06);border:1px solid var(--border);border-radius:7px;font-size:.88rem;">${esc(p.a.value)}</div>`
    ).join('');
    const rightHtml=pairs.map(p=>p.b?.type==='image'
      ?`<div style="padding:5px;border:1px solid var(--border);border-radius:6px;"><img src="${esc(p.b.value)}" style="height:44px;width:66px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'"></div>`
      :`<div style="padding:7px 12px;background:rgba(253,245,224,.06);border:1px solid var(--border);border-radius:7px;font-size:.88rem;">${esc(p.b.value)}</div>`
    ).join('');
    inner=`<div style="font-size:.88rem;opacity:.6;margin-bottom:12px;">${esc(d.instruction||'חברו בין הצמדים המתאימים')}</div>
      <div style="display:flex;gap:16px;">
        <div style="flex:1;">
          ${d.headerA?`<div style="font-size:.72rem;color:var(--gold);opacity:.5;margin-bottom:6px;text-transform:uppercase;">${esc(d.headerA)}</div>`:''}
          <div style="display:flex;flex-direction:column;gap:7px;">${leftHtml}</div>
        </div>
        <div style="width:30px;display:flex;flex-direction:column;justify-content:space-around;opacity:.3;">
          ${pairs.map(()=>'<div>—</div>').join('')}
        </div>
        <div style="flex:1;">
          ${d.headerB?`<div style="font-size:.72rem;color:var(--gold);opacity:.5;margin-bottom:6px;text-transform:uppercase;">${esc(d.headerB)}</div>`:''}
          <div style="display:flex;flex-direction:column;gap:7px;">${rightHtml}</div>
        </div>
      </div>
      <div style="font-size:.75rem;opacity:.4;margin-top:10px;">התלמידים מותחים קווים בטאבלט</div>`;

  } else if(slot.type==='memory'){
    const d=slot.memoryData||{cards:[],numPairs:6};
    inner=`<div style="text-align:center;padding:28px 20px;">
      <div style="font-size:2.5rem;margin-bottom:10px;">🃏</div>
      <div style="font-size:1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">משחק זיכרון</div>
      <div style="font-size:.85rem;opacity:.5;">${d.cards?.length||0} צמדים · ${d.numPairs||6} צמדים לניצחון</div>
      ${d.allowDuel!==false?`<div style="font-size:.78rem;opacity:.4;margin-top:6px;">ניתן לשחק ראש בראש</div>`:''}
      <div style="font-size:.75rem;opacity:.35;margin-top:8px;">התלמידים פותחים בטאבלט</div>
    </div>`;

  } else if(slot.type==='puzzle'){
    const d=slot.puzzleData||{images:[]};
    const imgs=(d.images||[]).filter(img=>img.url);
    inner=`<div style="text-align:center;padding:28px 20px;">
      <div style="font-size:2.5rem;margin-bottom:10px;">🧩</div>
      <div style="font-size:1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">פאזל</div>
      <div style="font-size:.85rem;opacity:.5;margin-bottom:12px;">${imgs.length} פאזל — התלמידים עונים שאלות ובונים</div>
      ${imgs.length?`<div style="display:flex;gap:8px;justify-content:center;">
        ${imgs.slice(0,3).map(img=>{
          let src=img.url;
          const m=src.match(/\/file\/d\/([^\/\?]+)/);
          if(m)src=`https://drive.google.com/uc?export=view&id=${m[1]}`;
          return `<img src="${esc(src)}" style="height:70px;width:105px;object-fit:cover;border-radius:7px;border:1px solid var(--border);" onerror="this.style.display='none'">`;
        }).join('')}
      </div>`:''}
    </div>`;

  } else if(slot.type==='zoom_img'){
    const d=slot.zoomData||{images:[]};
    const zoomParams=encodeURIComponent(JSON.stringify(d));
    const zoomUrl=window.location.href.replace('lesson_board.html','zoom_image.html')+'?data='+zoomParams;
    inner=`<div style="text-align:center;padding:32px 20px;">
      <div style="font-size:3rem;margin-bottom:12px;">🔎</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">זום תמונה</div>
      <div style="font-size:.85rem;opacity:.5;margin-bottom:20px;">${(d.images||[]).length} תמונות · גילוי הדרגתי</div>
      <button onclick="window.open('${zoomUrl}','_blank','width=1100,height=750')"
        style="padding:12px 28px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:12px;font-family:Heebo,sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;">
        🔎 פתח זום תמונה
      </button>
    </div>`;

  } else if(slot.type==='reveal_img'){
    const d=slot.revealData||{images:[]};
    const imgs=(d.images||[]).filter(img=>img.url);
    inner=`<div style="text-align:center;padding:32px 20px;">
      <div style="font-size:3rem;margin-bottom:12px;">🖼️</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">גלה את התמונה</div>
      <div style="font-size:.85rem;opacity:.5;margin-bottom:20px;">${imgs.length} תמונה${imgs.length>1?'ות':''} · תלמידים עונים שאלות ומגלים</div>
      ${imgs.length?`<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        ${imgs.slice(0,3).map((img,ii)=>{
          let src=img.url||'';
          const m=src.match(/\/file\/d\/([^\/\?]+)/);
          if(m)src=`https://drive.google.com/uc?export=view&id=${m[1]}`;
          return `<img src="${esc(src)}" style="height:80px;width:120px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" onerror="this.style.display='none'">`;
        }).join('')}
      </div>`:''}
      <div style="font-size:.75rem;opacity:.4;margin-top:12px;">התלמידים פותחים בטאבלט</div>
    </div>`;

  } else if(slot.type==='fill_sentence'){
    const d=slot.fillSentenceData||{instruction:'',sentences:[]};
    const sents=(d.sentences||[]).filter(s=>s.text);
    const sentsHtml=sents.map((s,si2)=>{
      const parts=s.text.split('___');
      let html='<span>';
      parts.forEach((part,pi)=>{
        html+=esc(part);
        if(pi<parts.length-1)
          html+='</span><span style="display:inline-block;min-width:70px;border-bottom:2px solid var(--gold);margin:0 3px;"></span><span>';
      });
      html+='</span>';
      return `<div style="margin-bottom:10px;font-size:.92rem;line-height:2.2;">${html}</div>`;
    }).join('');
    inner=`<div style="font-size:.88rem;opacity:.6;margin-bottom:10px;">${esc(d.instruction||'השלימו את המשפטים')}</div>
      ${sentsHtml}
      <div style="font-size:.75rem;opacity:.4;">התלמידים ממלאים בטאבלט ${d.useBank!==false?'(עם בנק מילים)':'(עצמאי)'}</div>`;

  } else if(slot.type==='timeline'){
    const d=slot.timelineData||{startYear:1800,endYear:2000,interval:50,events:[]};
    const years=[];
    for(let y=d.startYear;y<=d.endYear;y+=d.interval)years.push(y);
    const events=(d.events||[]).filter(e=>e.text||e.year);

    const yearsHtml=years.map(y=>`
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:60px;">
        <div style="width:2px;height:12px;background:var(--gold);"></div>
        <div style="padding:3px 8px;background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.3);border-radius:5px;font-size:.75rem;color:var(--gold);font-weight:700;white-space:nowrap;">${y}</div>
      </div>`).join('');

    const eventsHtml=years.map(y=>{
      const colEvs=events.filter(ev=>{
        const yr=parseInt(ev.year)||0;
        return yr===y||(yr>y&&yr<(years[years.indexOf(y)+1]||Infinity));
      });
      return `<div style="flex:1;min-width:60px;padding:0 3px;">
        ${colEvs.map(ev=>`<div style="background:rgba(44,26,14,.7);border:1px solid var(--border);border-radius:6px;padding:5px 7px;font-size:.75rem;text-align:center;margin-bottom:4px;line-height:1.4;">${esc(ev.text||'')}</div>`).join('')}
      </div>`;
    }).join('');

    inner=`<div style="overflow-x:auto;">
      <div style="min-width:${Math.max(years.length*80,400)}px;">
        <div style="position:relative;padding:10px 0;">
          <div style="position:absolute;top:50%;left:0;right:0;height:3px;background:var(--gold);border-radius:2px;"></div>
          <div style="display:flex;position:relative;z-index:1;">${yearsHtml}</div>
        </div>
        <div style="display:flex;margin-top:8px;">${eventsHtml}</div>
      </div>
    </div>`;

  } else if(slot.type==='klue'){
    const d=slot.klueData||{text:'',hiddenWords:[]};
    const words=(d.text||'').split(/\s+/).filter(Boolean);
    const hiddenSet=new Set(d.hiddenWords||[]);
    const textHtml=words.map((w,wi)=>hiddenSet.has(wi)
      ?`<span style="display:inline-block;min-width:70px;border-bottom:2px solid var(--gold);margin:0 2px;color:rgba(0,0,0,0);">____</span>`
      :`<span>${esc(w)} </span>`
    ).join('');
    inner=`<div style="line-height:2.2;font-size:1rem;direction:rtl;">${textHtml}</div>
      <div style="font-size:.75rem;opacity:.4;margin-top:10px;">התלמידים ממלאים בטאבלט ${d.useBank!==false?'(עם בנק מילים)':'(עצמאי)'}</div>`;

  } else if(slot.type==='what_connects'){
    const d=slot.whatConnectsData||{instruction:'',cards:[],numPairs:2};
    const cards=(d.cards||[]).filter(c=>c.value);
    const numPairs=d.numPairs||2;
    const cardsHtml=cards.map(c=>c.type==='image'
      ?`<div style="padding:4px;border:1px solid var(--border);border-radius:7px;display:inline-flex;"><img src="${esc(c.value)}" style="height:52px;width:76px;object-fit:cover;border-radius:5px;" onerror="this.style.display='none'"></div>`
      :`<div style="padding:7px 12px;background:rgba(253,245,224,.07);border:1px solid var(--border);border-radius:7px;font-size:.88rem;">${esc(c.value)}</div>`
    ).join('');
    inner=`<div style="font-size:.88rem;opacity:.65;margin-bottom:12px;">${esc(d.instruction||`מצאו ${numPairs} זוגות שיש ביניהן קשר`)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">${cardsHtml}</div>
      <div style="font-size:.75rem;opacity:.4;">התלמידים מוצאים זוגות ומסבירים את הקשר בטאבלט</div>`;

  } else if(slot.type==='drag_drop'){
    const d=slot.dragDropData||{instruction:'',sentences:[]};
    const sents=d.sentences.filter(Boolean);
    inner=`<div style="font-size:.88rem;opacity:.65;margin-bottom:12px;">${esc(d.instruction||'סדרו את האירועים לפי הסדר הכרונולוגי')}</div>
      <div style="display:flex;gap:12px;">
        <div style="flex:1;">
          <div style="font-size:.72rem;opacity:.4;margin-bottom:8px;">משפטים מבולגנים</div>
          ${[...sents].sort(()=>Math.random()-.5).map(s=>`
            <div style="background:rgba(253,245,224,.07);border:1px solid var(--border);border-radius:7px;padding:9px 12px;margin-bottom:7px;font-size:.88rem;">${esc(s)}</div>`).join('')}
        </div>
        <div style="flex:1;">
          <div style="font-size:.72rem;opacity:.4;margin-bottom:8px;">סדר נכון</div>
          ${sents.map((_,i)=>`
            <div style="border:2px dashed rgba(212,168,67,.25);border-radius:7px;padding:9px 12px;margin-bottom:7px;min-height:42px;display:flex;align-items:center;gap:8px;">
              <span style="min-width:20px;height:20px;border-radius:4px;background:rgba(212,168,67,.15);color:var(--gold);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;">${i+1}</span>
              <span style="opacity:.3;font-size:.8rem;">התלמיד ממיין בטאבלט</span>
            </div>`).join('')}
        </div>
      </div>`;

  } else if(slot.type==='wordcloud'){
    const d=slot.wordcloudData||{question:''};
    const boardId=`wc_${subjectId}_${unitId}_${lessonIdx}_${allStations.findIndex(s=>s.slots.includes(slot))}_${allStations.find(s=>s.slots.includes(slot))?.slots.indexOf(slot)||0}`;
    const wcUrl=window.location.href.replace('lesson_board.html','wordcloud_board.html')+'?boardId='+boardId+'&q='+encodeURIComponent(d.question||'');
    inner=`<div style="text-align:center;padding:32px 20px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">☁️</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--gold2);margin-bottom:8px;">${esc(d.question||'ענן מילים')}</div>
      <button onclick="window.open('${wcUrl}','_blank','width=1100,height=700')"
        style="padding:12px 28px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:12px;font-family:Heebo,sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;">
        ☁️ פתח ענן מילים
      </button>
      <div style="font-size:.75rem;opacity:.4;margin-top:10px;">מתעדכן בזמן אמת</div>
    </div>`;

  } else if(slot.type==='stickies'){
    const d=slot.stickiesData||{boardName:'לוח שיתופי',instruction:''};
    const boardId=`stickies_${subjectId}_${unitId}_${lessonIdx}_${allStations.findIndex(s=>s.slots.includes(slot))}_${allStations.find(s=>s.slots.includes(slot))?.slots.indexOf(slot)||0}`;
    const boardUrl=window.location.href.replace('lesson_board.html','sticky_board.html')+'?boardId='+boardId+'&name='+encodeURIComponent(d.boardName||'לוח שיתופי');
    inner=`<div style="text-align:center;padding:32px 20px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">🗒️</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--gold2);margin-bottom:4px;">${esc(d.boardName||'לוח שיתופי')}</div>
      ${d.instruction?`<div style="font-size:.85rem;opacity:.6;margin-bottom:16px;">${esc(d.instruction)}</div>`:'<div style="margin-bottom:16px;"></div>'}
      <button onclick="window.open('${boardUrl}','_blank','width=1100,height=750')"
        style="padding:12px 28px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:12px;font-family:Heebo,sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;">
        🗒️ פתח לוח שיתופי
      </button>
      <div style="font-size:.75rem;opacity:.4;margin-top:10px;">הפתקיות מתעדכנות בזמן אמת</div>
    </div>`;

  } else if(slot.type==='lucky_wheel'){
    const d=slot.wheelData||{mode:'names'};
    const modeLabels={names:'👥 שמות תלמידים',questions:'❓ שאלות / נושאים',numbers:'🔢 מספרים',teams:'🏆 קבוצות עבודה'};
    const wheelParams=encodeURIComponent(JSON.stringify({
      mode:d.mode,
      items:d.items||[],
      maxNumber:d.maxNumber||20,
      numTeams:d.numTeams||3,
      subjectId,unitId,lessonIdx,classCode
    }));
    const wheelUrl=window.location.href.replace('lesson_board.html','lucky_wheel.html')+'?data='+wheelParams;
    inner=`<div style="text-align:center;padding:40px 20px;">
      <div style="font-size:3rem;margin-bottom:16px;">🎡</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--gold2);margin-bottom:6px;">גלגל המזל</div>
      <div style="font-size:.85rem;opacity:.5;margin-bottom:24px;">${modeLabels[d.mode]||d.mode}</div>
      <button onclick="window.open('${wheelUrl}','_blank','width=900,height=700')"
        style="padding:12px 32px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:12px;font-family:Heebo,sans-serif;font-size:1rem;font-weight:700;cursor:pointer;">
        🎡 פתח גלגל
      </button>
    </div>`;

  } else if(slot.type==='sources'){
    const d=slot.sourcesData||{};
    const qs=d.questions||[];
    let sourceHtml='';
    if(d.mode==='image'){
      sourceHtml=`<img src="${esc(d.imageUrl||'')}" style="max-width:100%;max-height:380px;border-radius:8px;object-fit:contain;">`;
    } else {
      const lines=(d.text||'').split('\n').slice(0,15);
      sourceHtml=lines.map((line,i)=>`
        <div style="display:flex;gap:10px;line-height:1.85;font-size:.95rem;">
          <span style="min-width:22px;color:var(--gold);opacity:.4;font-size:.75rem;padding-top:3px;">${i+1}</span>
          <span>${esc(line)||'&nbsp;'}</span>
        </div>`).join('');
    }
    const qHtml=qs.map((q,qi)=>`
      <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);">
        <div style="font-size:.7rem;color:var(--gold);opacity:.5;margin-bottom:4px;">שאלה ${qi+1}</div>
        <div style="font-size:.9rem;">${esc(q.question)}</div>
      </div>`).join('');
    inner=`<div style="display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;min-height:300px;">
      <div style="flex:1;padding:16px;border-left:1px solid var(--border);overflow-y:auto;">${sourceHtml}</div>
      <div style="width:40%;padding:14px;overflow-y:auto;background:rgba(253,245,224,.03);">
        <div style="font-size:.72rem;opacity:.35;margin-bottom:10px;">שאלות</div>
        ${qHtml||'<div style="opacity:.3;">אין שאלות</div>'}
      </div>
    </div>`;

  } else if(slot.type==='sort_table'&&slot.tableData){
    const td=slot.tableData;
    const colsHtml=td.cols.map(c=>`<th>${esc(c.name)}</th>`).join('');
    const rows=Math.ceil((td.items?.length||8)/td.cols.length)||3;
    let emptyRows='';
    for(let r=0;r<rows;r++){
      emptyRows+=`<tr>${td.cols.map(()=>`<td style="padding:12px;min-width:120px;height:44px;"></td>`).join('')}</tr>`;
    }
    inner=`<div style="font-size:.78rem;opacity:.4;margin-bottom:8px;">התלמידים ממיינים בטאבלט שלהם</div>
      <table class="sort-table-display"><thead><tr>${colsHtml}</tr></thead><tbody>${emptyRows}</tbody></table>`;

  } else if(slot.type==='mc_q'&&slot.mcData){
    const mc=slot.mcData;
    const opts=mc.options.filter(Boolean).map((o,i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;margin-bottom:8px;border:1px solid var(--border);border-radius:10px;font-size:1rem;">
        <span style="min-width:22px;opacity:.5;">${String.fromCharCode(65+i)}.</span>
        <span style="flex:1;">${esc(o)}</span>
        ${!mc.isSurvey&&i===mc.correct?'<span style="color:#22c55e;">✅</span>':''}
        ${mc.showOnBoard?`<div id="mc-bar-${i}" style="display:flex;align-items:center;gap:6px;min-width:120px;">
          <div style="flex:1;height:8px;background:rgba(212,168,67,.15);border-radius:4px;overflow:hidden;">
            <div class="mc-fill-${i}" style="height:100%;background:var(--gold);border-radius:4px;width:0%;transition:width .4s;"></div>
          </div>
          <span class="mc-count-${i}" style="font-size:.75rem;opacity:.6;min-width:20px;">0</span>
        </div>`:''}
      </div>`).join('');
    const liveId=`mc-live-${Math.random().toString(36).slice(2,7)}`;
    inner=`<div class="slot-content" style="margin-bottom:16px;font-size:1.1rem;">${esc(mc.question)}</div>
      <div id="${liveId}">${opts}</div>
      <div style="font-size:.75rem;opacity:.4;margin-top:8px;" id="${liveId}-count">ממתין לתשובות...</div>`;
    if(mc.showOnBoard&&classCode){
      // listener יתווסף אחרי שה-HTML ייכנס לדף
      setTimeout(()=>{
        const stIdx=allStations.findIndex(s=>s.slots.includes(slot));
        const sli=allStations.find(s=>s.slots.includes(slot))?.slots.indexOf(slot)||0;
        const path=`studentAnswers/${classCode}`;
        db.ref(path).on('value',snap=>{
          const students=snap.val()||{};
          const counts=Array(mc.options.length).fill(0);
          let total=0;
          Object.values(students).forEach(student=>{
            const key=Object.keys(student?.['lesson_'+lessonIdx]||{}).find(k=>k.includes('station_'));
            const ans=student?.['lesson_'+lessonIdx]?.[key];
            if(ans?.answer!==undefined){counts[parseInt(ans.answer)]++;total++;}
          });
          const countEl=document.getElementById(liveId+'-count');
          if(countEl)countEl.textContent=total+' תלמידים ענו';
          mc.options.forEach((_,i)=>{
            const fill=document.querySelector('.mc-fill-'+i);
            const count=document.querySelector('.mc-count-'+i);
            if(fill)fill.style.width=(total?Math.round(counts[i]/total*100):0)+'%';
            if(count)count.textContent=counts[i];
          });
        });
      },200);
    }

  } else if(slot.type==='tf_q'&&slot.tfData){
    const tf=slot.tfData;
    const liveId=`tf-live-${Math.random().toString(36).slice(2,7)}`;
    inner=`<div class="slot-content" style="margin-bottom:16px;font-size:1.1rem;">${esc(tf.question)}</div>
      <div style="display:flex;gap:12px;margin-bottom:8px;" id="${liveId}">
        <div style="flex:1;padding:14px;border:2px solid ${!tf.isSurvey&&tf.correct===true?'#22c55e':'var(--border)'};border-radius:10px;text-align:center;">
          <div style="font-size:1.1rem;font-weight:700;color:${!tf.isSurvey&&tf.correct===true?'#22c55e':'var(--parch)'};">✅ נכון</div>
          ${tf.showOnBoard?`<div style="margin-top:8px;height:8px;background:rgba(34,197,94,.15);border-radius:4px;overflow:hidden;"><div id="tf-bar-true" style="height:100%;background:#22c55e;width:0%;transition:width .4s;"></div></div><div id="tf-count-true" style="font-size:.8rem;margin-top:4px;opacity:.7;">0</div>`:''}
        </div>
        <div style="flex:1;padding:14px;border:2px solid ${!tf.isSurvey&&tf.correct===false?'#f87171':'var(--border)'};border-radius:10px;text-align:center;">
          <div style="font-size:1.1rem;font-weight:700;color:${!tf.isSurvey&&tf.correct===false?'#f87171':'var(--parch)'};">❌ לא נכון</div>
          ${tf.showOnBoard?`<div style="margin-top:8px;height:8px;background:rgba(248,129,113,.15);border-radius:4px;overflow:hidden;"><div id="tf-bar-false" style="height:100%;background:#f87171;width:0%;transition:width .4s;"></div></div><div id="tf-count-false" style="font-size:.8rem;margin-top:4px;opacity:.7;">0</div>`:''}
        </div>
      </div>
      <div style="font-size:.75rem;opacity:.4;" id="${liveId}-count">${tf.showOnBoard?'ממתין לתשובות...':'התלמידים בוחרים בטאבלט'}</div>`;
    if(tf.showOnBoard&&classCode){
      setTimeout(()=>{
        db.ref(`studentAnswers/${classCode}`).on('value',snap=>{
          const students=snap.val()||{};
          let trueCount=0,falseCount=0;
          Object.values(students).forEach(student=>{
            const lesson=student?.['lesson_'+lessonIdx]||{};
            Object.values(lesson).forEach(ans=>{
              if(ans?.answer==='true')trueCount++;
              else if(ans?.answer==='false')falseCount++;
            });
          });
          const total=trueCount+falseCount;
          ['true','false'].forEach(v=>{
            const c=v==='true'?trueCount:falseCount;
            const bar=document.getElementById('tf-bar-'+v);
            const count=document.getElementById('tf-count-'+v);
            if(bar)bar.style.width=(total?Math.round(c/total*100):0)+'%';
            if(count)count.textContent=c;
          });
          const countEl=document.getElementById(liveId+'-count');
          if(countEl&&total)countEl.textContent=total+' תלמידים ענו';
        });
      },200);
    }

  } else if((slot.type==='argue'||slot.type==='full_ans')&&slot.argueData){
    const d=slot.argueData;
    inner=`<div class="slot-content" style="margin-bottom:12px;">${esc(d.prompt)}</div>
      <div style="font-size:.82rem;opacity:.5;">סגנון: ${esc(d.style||'מובנית')} ${d.showWordBank&&d.wordBank?'· עם בנק מילים':''}</div>
      <div style="font-size:.75rem;opacity:.4;margin-top:8px;">התלמידים כותבים בטאבלט</div>`;

  } else if(slot.type==='image'){
    let src=esc(slot.content||'');
    const m=(slot.content||'').match(/\/file\/d\/([^\/\?]+)/);
    if(m) src=`https://drive.google.com/uc?export=view&id=${m[1]}`;
    inner=`<img class="slot-image" src="${src}" alt="תמונה" onerror="this.onerror=null;this.style.opacity='.3';">`;

  } else if(slot.type==='video'){
    const m=(slot.content||'').match(/(?:v=|youtu\.be\/)([^&\s]+)/);
    inner=m?`<iframe width="100%" height="360" src="https://www.youtube.com/embed/${m[1]}" frameborder="0" allowfullscreen style="border-radius:10px;"></iframe>`
      :`<div style="opacity:.4;">${esc(slot.content||'')}</div>`;

  } else if(slot.content){
    inner=`<div class="slot-content">${esc(slot.content).replace(/\n/g,'<br>')}</div>`;
  }

  return `<div class="slot-card">
    <div class="slot-type">${LABELS[slot.type]||slot.type}</div>
    ${inner}
  </div>`;
}

function buildStepNav(){
  const nav=document.getElementById('step-nav');
  const sections=['intro','body','closing'];
  const labels=['🌅 פתיח','🚂 גוף','🌇 סיום'];
  nav.innerHTML=sections.map((sec,i)=>`
    <button class="step-btn" data-section="${sec}"
      onclick="jumpToSection('${sec}')">${labels[i]}</button>`).join('');
}

function jumpToSection(section){
  const idx=allStations.findIndex(s=>s.section===section);
  if(idx>=0){currentStation=idx;currentSlot=0;renderStation();}
}

function nextStation(){
  if(currentStation<allStations.length-1){currentStation++;currentSlot=0;renderStation();}
}
function prevStation(){
  if(currentStation>0){currentStation--;currentSlot=0;renderStation();}
}
function nextSlot(){
  const st=allStations[currentStation];
  if(currentSlot<st.slots.length-1){currentSlot++;renderStation();}
  else nextStation();
}
function prevSlot(){
  if(currentSlot>0){currentSlot--;renderStation();}
  else prevStation();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
