<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>לוח שיתופי — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{--gold:#d4a843;--gold2:#f0c060;--parch:#fdf5e0;--surface:rgba(44,26,14,0.9);--border:rgba(212,168,67,0.22);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0a0602;color:var(--parch);min-height:100vh;direction:rtl;}

.topbar{background:rgba(10,5,2,.98);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--gold2);flex:1;}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.8rem;cursor:pointer;}
.btn-sm:hover{background:rgba(212,168,67,.1);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;font-weight:700;}

.header-section{padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(44,26,14,.4);}
.board-name{font-family:'Frank Ruhl Libre',serif;font-size:1.3rem;font-weight:700;color:var(--gold2);}
.board-instruction{font-size:.88rem;opacity:.65;margin-top:4px;}
.board-meta{font-size:.72rem;opacity:.4;margin-top:4px;}

.board-area{padding:20px 24px;min-height:calc(100vh - 140px);}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}

.note-card{border-radius:12px;padding:14px;position:relative;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.note-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.note-student{font-size:.7rem;font-weight:700;margin-bottom:6px;opacity:.6;color:#1c1208;}
.note-text{font-size:.88rem;line-height:1.6;color:#1c1208;word-break:break-word;}
.note-img{width:100%;border-radius:7px;margin-top:8px;max-height:120px;object-fit:cover;}
.note-bonus{position:absolute;top:8px;left:8px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border-radius:12px;padding:2px 8px;font-size:.72rem;font-weight:700;}
.note-time{position:absolute;bottom:6px;left:8px;font-size:.65rem;opacity:.35;color:#1c1208;}

.empty-board{text-align:center;padding:80px 20px;opacity:.3;}

/* saved boards drawer */
.drawer{position:fixed;top:0;right:-340px;width:320px;height:100vh;background:#1a0f05;border-left:1px solid var(--border);z-index:100;transition:right .3s;overflow-y:auto;padding:16px;}
.drawer.open{right:0;}
.drawer-title{font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:14px;}
.board-item{padding:10px 12px;background:rgba(253,245,224,.05);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;}
.board-item:hover{background:rgba(212,168,67,.1);}
.board-item-name{font-size:.85rem;font-weight:700;margin-bottom:2px;}
.board-item-meta{font-size:.72rem;opacity:.45;}

.bonus-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.bonus-modal.open{display:flex;}
.bonus-box{background:#1a0f05;border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;min-width:260px;}
.bonus-title{font-size:1rem;font-weight:700;color:var(--gold2);margin-bottom:16px;}
.bonus-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.bonus-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:rgba(212,168,67,.1);color:var(--gold);font-family:'Heebo',sans-serif;font-size:.88rem;cursor:pointer;}
.bonus-btn:hover{background:rgba(212,168,67,.2);}
.bonus-btn.cancel{color:#f87171;border-color:rgba(248,129,113,.3);background:rgba(248,129,113,.05);}

.spin{display:inline-block;animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title" id="board-title-bar">🗒️ לוח שיתופי</div>
  <span id="count-badge" style="font-size:.75rem;opacity:.45;"></span>
  <button class="btn-sm" onclick="toggleDrawer()">📂 לוחות שמורים</button>
  <button class="btn-sm btn-gold" onclick="clearBoard()">🗑 נקה לוח</button>
  <button class="btn-sm" onclick="window.close()">✕</button>
</div>

<div class="header-section" id="header-section">
  <div class="board-name" id="board-name-display">טוען...</div>
  <div class="board-instruction" id="board-instruction-display"></div>
  <div class="board-meta" id="board-meta"></div>
</div>

<div class="board-area">
  <div class="notes-grid" id="notes-grid">
    <div class="empty-board"><span class="spin">⏳</span><br>ממתין לפתקיות...</div>
  </div>
</div>

<!-- Bonus Modal -->
<div class="bonus-modal" id="bonus-modal">
  <div class="bonus-box">
    <div class="bonus-title" id="bonus-student-name">תן/י נקודות בונוס</div>
    <div class="bonus-btns">
      <button class="bonus-btn" onclick="giveBonus(1)">+1 נקודה</button>
      <button class="bonus-btn" onclick="giveBonus(2)">+2 נקודות</button>
      <button class="bonus-btn" onclick="giveBonus(3)">+3 נקודות</button>
      <button class="bonus-btn cancel" onclick="closeBonusModal()">ביטול</button>
    </div>
  </div>
</div>

<!-- Saved Boards Drawer -->
<div class="drawer" id="boards-drawer">
  <div class="drawer-title">📂 לוחות שמורים</div>
  <div id="saved-boards-list"><div style="opacity:.4;font-size:.85rem;">טוען...</div></div>
  <button class="btn-sm" style="margin-top:12px;width:100%;" onclick="toggleDrawer()">סגור</button>
</div>

<script>
const FB_CFG={apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",authDomain:"et-hadaat.firebaseapp.com",databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",projectId:"et-hadaat",storageBucket:"et-hadaat.firebasestorage.app",messagingSenderId:"141400405468",appId:"1:141400405468:web:c1090c52477d14a159cb19"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

const params=new URLSearchParams(window.location.search);
let boardId=params.get('boardId')||'board_'+Date.now();
let showNames=true;
let currentNotes={};
let selectedNoteKey=null;

// ── INIT ──
window.onload=function(){
  loadBoard(boardId);
  loadSavedBoards();
};

function loadBoard(bid){
  boardId=bid;
  // טען meta
  db.ref(`stickies/${bid}/meta`).once('value',snap=>{
    const meta=snap.val()||{};
    showNames=meta.showNames!==false;
    document.getElementById('board-title-bar').textContent='🗒️ '+(meta.name||'לוח שיתופי');
    document.getElementById('board-name-display').textContent=meta.name||'לוח שיתופי';
    document.getElementById('board-instruction-display').textContent=meta.instruction||'';
    document.getElementById('board-meta').textContent=meta.createdAt
      ?'נוצר: '+new Date(meta.createdAt).toLocaleDateString('he-IL'):'';
  });

  // האזן לפתקיות בזמן אמת
  db.ref(`stickies/${bid}/notes`).off();
  db.ref(`stickies/${bid}/notes`).on('value',snap=>{
    currentNotes=snap.val()||{};
    renderNotes();
  });
}

function renderNotes(){
  const grid=document.getElementById('notes-grid');
  const keys=Object.keys(currentNotes).sort((a,b)=>(currentNotes[a].ts||0)-(currentNotes[b].ts||0));
  document.getElementById('count-badge').textContent=keys.length+' פתקיות';

  if(!keys.length){
    grid.innerHTML='<div class="empty-board">📌<br>אין פתקיות עדיין<br><small style="font-size:.75rem;margin-top:6px;display:block;">התלמידים יכתבו ולוחצו "הצג"</small></div>';
    return;
  }

  grid.innerHTML=keys.map(key=>{
    const n=currentNotes[key];
    return `<div class="note-card" style="background:${esc(n.color||'#fde68a')};" onclick="openBonusModal('${key}')">
      ${n.bonus?`<div class="note-bonus">⭐ +${n.bonus}</div>`:''}
      ${showNames&&n.student?`<div class="note-student">👤 ${esc(n.student)}</div>`:''}
      <div class="note-text">${esc(n.text||'')}</div>
      ${n.imageUrl?`<img class="note-img" src="${esc(n.imageUrl)}" alt="תמונה" onerror="this.style.display='none'">`:'' }
      <div class="note-time">${n.ts?new Date(n.ts).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}):''}</div>
    </div>`;
  }).join('');
}

// ── BONUS ──
function openBonusModal(key){
  selectedNoteKey=key;
  const note=currentNotes[key];
  document.getElementById('bonus-student-name').textContent=
    (showNames&&note?.student?note.student+' — ':'')+
    'נקודות בונוס'+(note?.bonus?` (נוכחי: ${note.bonus})`:'');
  document.getElementById('bonus-modal').classList.add('open');
}

function closeBonusModal(){
  document.getElementById('bonus-modal').classList.remove('open');
  selectedNoteKey=null;
}

function giveBonus(points){
  if(!selectedNoteKey)return;
  const current=currentNotes[selectedNoteKey]?.bonus||0;
  db.ref(`stickies/${boardId}/notes/${selectedNoteKey}/bonus`).set(current+points);
  closeBonusModal();
}

// ── CLEAR ──
function clearBoard(){
  if(!confirm('למחוק את כל הפתקיות מהלוח?'))return;
  db.ref(`stickies/${boardId}/notes`).remove();
}

// ── SAVED BOARDS ──
function loadSavedBoards(){
  db.ref('stickies').once('value',snap=>{
    const all=snap.val()||{};
    const list=document.getElementById('saved-boards-list');
    const boards=Object.entries(all)
      .filter(([k,v])=>v?.meta)
      .sort((a,b)=>(b[1].meta?.createdAt||0)-(a[1].meta?.createdAt||0))
      .slice(0,20);
    if(!boards.length){list.innerHTML='<div style="opacity:.4;font-size:.82rem;">אין לוחות שמורים</div>';return;}
    list.innerHTML=boards.map(([bid,v])=>`
      <div class="board-item" onclick="loadBoard('${bid}');toggleDrawer();">
        <div class="board-item-name">${esc(v.meta?.name||bid)}</div>
        <div class="board-item-meta">${Object.keys(v.notes||{}).length} פתקיות · ${v.meta?.createdAt?new Date(v.meta.createdAt).toLocaleDateString('he-IL'):''}</div>
      </div>`).join('');
  });
}

function toggleDrawer(){
  const d=document.getElementById('boards-drawer');
  d.classList.toggle('open');
  if(d.classList.contains('open'))loadSavedBoards();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
