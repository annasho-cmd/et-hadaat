<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>פיצוחים — תלמיד</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{--gold:#d4a843;--gold2:#f0c060;--parch:#fdf5e0;--border:rgba(212,168,67,.22);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0a0006;color:var(--parch);min-height:100vh;direction:rtl;}
.topbar{background:rgba(5,0,10,.98);border-bottom:1px solid rgba(255,255,255,.1);padding:8px 16px;display:flex;align-items:center;gap:10px;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:.95rem;font-weight:700;color:var(--gold2);flex:1;}
.team-badge{padding:4px 12px;border-radius:14px;font-size:.78rem;font-weight:700;}
.blue-badge{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);color:#60a5fa;}
.red-badge{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171;}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.82rem;cursor:pointer;}
.btn:hover{background:rgba(212,168,67,.1);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;font-weight:700;}

/* SETUP */
.setup-screen{max-width:420px;margin:40px auto;padding:24px;background:rgba(30,0,40,.8);border:1px solid rgba(150,0,200,.2);border-radius:16px;text-align:center;}

/* MAIN GAME */
.main{display:flex;flex-direction:column;min-height:calc(100vh - 45px);}

/* MINI HONEYCOMB */
.mini-comb{display:flex;flex-direction:column;gap:1px;align-items:center;padding:10px;}
.mini-hex-row{display:flex;gap:2px;}
.mini-hex{width:44px;height:50px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Frank Ruhl Libre',serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
.mini-hex.empty{background:rgba(60,0,80,.5);}
.mini-hex.empty:hover{background:rgba(90,0,120,.7);}
.mini-hex.blue{background:linear-gradient(135deg,#1d4ed8,#1e40af);}
.mini-hex.red{background:linear-gradient(135deg,#dc2626,#991b1b);}
.mini-hex.black{background:#111;color:rgba(255,255,255,.2);}
.mini-hex.active{animation:pulse .7s ease infinite;}
.mini-hex.disabled{opacity:.4;pointer-events:none;}
@keyframes pulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.8) drop-shadow(0 0 6px gold);}}

/* QUESTION & ANSWER */
.q-area{flex:1;padding:12px 16px;}
.turn-bar{text-align:center;padding:8px;border-radius:8px;margin-bottom:10px;font-size:.85rem;font-weight:700;}
.turn-bar.blue{background:rgba(59,130,246,.15);color:#60a5fa;}
.turn-bar.red{background:rgba(239,68,68,.1);color:#f87171;}
.question-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;margin-bottom:10px;}
.q-letter-big{font-family:'Frank Ruhl Libre',serif;font-size:2rem;font-weight:900;text-align:center;margin-bottom:4px;}
.q-def{font-size:.92rem;line-height:1.7;text-align:center;}
.answer-area{display:flex;gap:8px;margin-bottom:10px;}
.answer-input{flex:1;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:var(--parch);font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;padding:9px 12px;outline:none;direction:rtl;}
.answer-input:focus{border-color:var(--gold);}
.answers-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;max-height:200px;overflow-y:auto;}
.answer-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:7px;font-size:.85rem;}
.answer-name{font-size:.72rem;opacity:.5;min-width:50px;}
.leader-pick-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px;}
.waiting-msg{text-align:center;padding:20px;opacity:.4;font-size:.88rem;}
.status-msg{text-align:center;padding:8px;border-radius:7px;font-size:.82rem;margin-top:8px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">💥 פיצוחים</div>
  <span id="my-team-badge" class="team-badge" style="display:none;"></span>
  <span id="leader-badge" style="display:none;font-size:.72rem;color:var(--gold);opacity:.7;">👑 ראש קבוצה</span>
  <button class="btn" onclick="window.close()">✕</button>
</div>

<div id="setup-screen" class="setup-screen">
  <div style="font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;color:var(--gold2);margin-bottom:16px;">💥 פיצוחים</div>
  <div id="instruction-text" style="font-size:.85rem;opacity:.6;margin-bottom:16px;line-height:1.6;"></div>
  <input id="student-name" class="answer-input" placeholder="שם..." style="margin-bottom:10px;text-align:center;">
  <div style="font-size:.78rem;opacity:.5;margin-bottom:10px;">בחרו קבוצה:</div>
  <div style="display:flex;gap:10px;justify-content:center;">
    <button onclick="joinTeam('blue')" style="flex:1;padding:12px;background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);border-radius:10px;color:#60a5fa;font-family:'Heebo',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;">
      🔵 קבוצה כחולה
    </button>
    <button onclick="joinTeam('red')" style="flex:1;padding:12px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:10px;color:#f87171;font-family:'Heebo',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;">
      🔴 קבוצה אדומה
    </button>
  </div>
</div>

<div class="main" id="game-screen" style="display:none;">
  <div class="mini-comb" id="mini-comb"></div>
  <div class="q-area" id="q-area">
    <div class="waiting-msg">ממתין לבחירת אות...</div>
  </div>
</div>

<script>
const FB_CFG={apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",authDomain:"et-hadaat.firebaseapp.com",databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",projectId:"et-hadaat",storageBucket:"et-hadaat.firebasestorage.app",messagingSenderId:"141400405468",appId:"1:141400405468:web:c1090c52477d14a159cb19"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

const params=new URLSearchParams(window.location.search);
const sessionId=params.get('session')||'crack_default';
const SESSION=db.ref('crackers/'+sessionId);

let myName='';
let myTeam='';
let isLeader=false;
let activeLetters=[];
let gridCols=5;
let cellStates={};
let currentState={activeLetter:null,qIdx:0,turn:'blue'};

window.onload=function(){
  SESSION.child('instruction').once('value',snap=>{
    const inst=snap.val()||'';
    document.getElementById('instruction-text').textContent=inst;
  });
};

async function joinTeam(team){
  const name=document.getElementById('student-name').value.trim();
  if(!name){alert('יש להזין שם');return;}
  myName=name;myTeam=team;

  // בדוק אם ראשון בקבוצה
  const snap=await SESSION.child('teams/'+team).once('value');
  const members=snap.val()||{};
  if(!Object.keys(members).length){
    isLeader=true;
    await SESSION.child('teams/'+team+'/leader').set(name);
  }
  await SESSION.child('teams/'+team+'/members/'+encodeURIComponent(name)).set(true);

  // הצג badge
  const badge=document.getElementById('my-team-badge');
  badge.textContent=team==='blue'?'🔵 כחולים':'🔴 אדומים';
  badge.className='team-badge '+(team==='blue'?'blue-badge':'red-badge');
  badge.style.display='inline';
  if(isLeader)document.getElementById('leader-badge').style.display='inline';

  document.getElementById('setup-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';

  // טען גריד
  SESSION.child('grid').once('value',snap=>{
    const g=snap.val()||{};
    activeLetters=g.letters||[];
    gridCols=g.cols||5;
    buildMiniComb();
  });

  // האזן לשינויי מצב
  SESSION.child('state').on('value',snap=>{
    const s=snap.val()||{};
    currentState=s;
    updateActiveHex(s.activeLetter);
    renderQArea(s);
  });
  SESSION.child('cells').on('value',snap=>{
    const cells=snap.val()||{};
    Object.entries(cells).forEach(([l,color])=>{
      cellStates[l]=color;
      const el=document.getElementById('mhex-'+l);
      if(el){el.className='mini-hex '+color;}
    });
  });
}

function buildMiniComb(){
  const n=activeLetters.length;
  const cols=gridCols||Math.ceil(Math.sqrt(n*1.3));
  const rows=Math.ceil(n/cols);
  const comb=document.getElementById('mini-comb');
  comb.innerHTML='';
  let idx=0;
  for(let r=0;r<rows;r++){
    const row=document.createElement('div');
    row.className='mini-hex-row';
    if(r%2===1)row.style.marginRight='24px';
    for(let c=0;c<cols;c++){
      const letter=activeLetters[idx];
      const hex=document.createElement('div');
      hex.className='mini-hex '+(cellStates[letter]||'empty');
      hex.id='mhex-'+(letter||'_'+r+'_'+c);
      hex.textContent=letter||'';
      if(letter){
        hex.onclick=()=>selectLetter(letter);
        idx++;
      } else {hex.style.opacity='0';hex.style.pointerEvents='none';}
      row.appendChild(hex);
    }
    comb.appendChild(row);
  }
}

function updateActiveHex(letter){
  document.querySelectorAll('.mini-hex.active').forEach(el=>el.classList.remove('active'));
  if(letter){
    const el=document.getElementById('mhex-'+letter);
    if(el&&!['blue','red','black'].includes(el.className.split(' ')[1]))
      el.classList.add('active');
  }
}

function selectLetter(letter){
  if(cellStates[letter])return; // תא כבר נצבע
  if(!isLeader||myTeam!==currentState.turn)return; // רק ראש קבוצה בתורה
  SESSION.child('state').set({activeLetter:letter,qIdx:0,turn:myTeam});
  SESSION.child('answers').remove();
}

function renderQArea(state){
  const qArea=document.getElementById('q-area');
  if(!state.activeLetter){
    qArea.innerHTML='<div class="waiting-msg">ממתין לבחירת אות...</div>';
    return;
  }

  const isMyTurn=state.turn===myTeam;
  const turnText=state.turn==='blue'?'🔵 תור כחולים':'🔴 תור אדומים';

  qArea.innerHTML=`
    <div class="turn-bar ${state.turn}">${turnText}</div>
    <div class="question-box">
      <div class="q-letter-big" style="color:${state.turn==='blue'?'#60a5fa':'#f87171'}">${state.activeLetter||''}</div>
      <div style="font-size:.72rem;opacity:.4;text-align:center;margin-bottom:6px;">הגדרה ${(state.qIdx||0)+1}</div>
      <div class="q-def" id="q-def-text">טוען...</div>
    </div>
    ${isMyTurn?`
    <div style="font-size:.75rem;opacity:.5;margin-bottom:4px;">כתבו תשובה (חייבת להתחיל באות ${state.activeLetter}):</div>
    <div class="answer-area">
      <input class="answer-input" id="my-answer" placeholder="תשובה..." maxlength="30"
        onkeydown="if(event.key==='Enter')submitAnswer()">
      <button class="btn-gold" onclick="submitAnswer()">שלח</button>
    </div>
    <div style="font-size:.75rem;opacity:.4;margin-bottom:6px;">תשובות הקבוצה:</div>
    <div class="answers-list" id="answers-list"></div>
    ${isLeader?`<button class="leader-pick-btn" onclick="pickBestAnswer()">👑 אני מכריע — שלח תשובה</button>`:''}
    `:'<div class="waiting-msg" style="margin-top:10px;">ממתין לתור שלכם...</div>'}`;

  // טען הגדרה
  SESSION.child('grid').once('value',snap=>{/* already have data */});
  // טען מה-crackerData שיגיע מה-params
  try{
    const cd=JSON.parse(decodeURIComponent(params.get('data')||'{}'));
    const ld=cd.letters[state.activeLetter]||{};
    const def=state.qIdx===0?ld.def1:ld.def2;
    const el=document.getElementById('q-def-text');
    if(el)el.textContent=def||'אין הגדרה';
  }catch(e){}

  // האזן לתשובות
  if(isMyTurn){
    SESSION.child('answers').on('value',snap=>{
      const ans=snap.val()||{};
      const list=document.getElementById('answers-list');
      if(list)list.innerHTML=Object.entries(ans).map(([name,a])=>`
        <div class="answer-item">
          <span class="answer-name">${esc(name)}</span>
          <span>${esc(a.text||'')}</span>
          ${isLeader?`<button onclick="sendLeaderDecision('${esc(a.text||'')}','${esc(name)}')"
            style="margin-right:auto;padding:3px 8px;background:rgba(212,168,67,.15);border:1px solid var(--border);border-radius:5px;font-family:Heebo,sans-serif;font-size:.72rem;cursor:pointer;">בחר</button>`:''}
        </div>`).join('');
    });
  }
}

function submitAnswer(){
  const inp=document.getElementById('my-answer');
  const val=(inp?.value||'').trim();
  if(!val)return;
  SESSION.child('answers/'+encodeURIComponent(myName)).set({text:val,ts:Date.now()});
  inp.value='';
  const statusDiv=document.createElement('div');
  statusDiv.className='status-msg';
  statusDiv.style.color='#22c55e';
  statusDiv.textContent='✅ תשובתך נשלחה';
  document.getElementById('q-area').appendChild(statusDiv);
  setTimeout(()=>statusDiv.remove(),2000);
}

function pickBestAnswer(){
  const list=document.getElementById('answers-list');
  const first=list?.querySelector('.answer-item');
  if(!first)return;
  const text=first.querySelector('span:nth-child(2)')?.textContent||'';
  sendLeaderDecision(text,myName);
}

function sendLeaderDecision(text,name){
  SESSION.child('leaderDecision').set({text,name,team:myTeam,ts:Date.now()});
  document.getElementById('q-area').innerHTML+=`<div class="status-msg" style="color:var(--gold);">👑 התשובה שנבחרה: ${esc(text)}</div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
