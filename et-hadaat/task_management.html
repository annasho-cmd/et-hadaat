<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ניהול משימות — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{
  --ink:#1c1208;--gold:#d4a843;--gold2:#f0c060;
  --parch:#fdf5e0;--red:#8b2020;--green:#2a6b2a;
  --surface:rgba(44,26,14,0.88);--border:rgba(212,168,67,0.22);
  --muted:rgba(253,245,224,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0f0a04;color:var(--parch);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(107,58,31,.18) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 80% 80%,rgba(212,168,67,.08) 0%,transparent 50%);}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;
  background:rgba(15,8,2,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:1.05rem;color:var(--gold2);font-weight:700;white-space:nowrap;}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:.78rem;flex:1;margin:0 14px;flex-wrap:wrap;}
.bc-item{color:var(--gold);cursor:pointer;opacity:.75;transition:opacity .2s;}
.bc-item:hover{opacity:1;}
.bc-sep{opacity:.35;}
.btn-back{padding:5px 12px;background:rgba(212,168,67,.1);border:1px solid var(--border);
  color:var(--parch);border-radius:6px;cursor:pointer;font-size:.8rem;font-family:'Heebo',sans-serif;white-space:nowrap;}
.main{padding:20px 18px;max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:1;}
.screen{display:none;}.screen.active{display:block;}
.screen-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.screen-title{font-family:'Frank Ruhl Libre',serif;font-size:1.25rem;color:var(--gold2);font-weight:700;}
/* CARDS */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;}
.card-title{font-family:'Frank Ruhl Libre',serif;font-size:.95rem;color:var(--gold2);font-weight:700;margin-bottom:10px;}
/* SUBJECTS */
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:26px;}
.subject-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:20px;
  cursor:pointer;transition:transform .2s,border-color .2s;position:relative;overflow:hidden;}
.subject-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--gold));}
.subject-card:hover{transform:translateY(-3px);border-color:var(--gold);}
.subject-icon{font-size:1.9rem;margin-bottom:7px;}
.subject-name{font-size:.95rem;font-weight:700;color:var(--parch);margin-bottom:3px;}
.subject-meta{font-size:.75rem;opacity:.55;}
.subject-arrow{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:1.2rem;opacity:.28;}
.badge-urgent{position:absolute;top:7px;left:7px;background:#dc2626;color:#fff;border-radius:50%;
  width:19px;height:19px;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* ALERTS */
.alerts-title{font-family:'Frank Ruhl Libre',serif;font-size:.95rem;color:var(--gold2);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.alert-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(44,26,14,.7);
  border:1px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:border-color .2s;}
.alert-row:hover{border-color:var(--gold);}
.alert-row.urgent{border-color:rgba(220,38,38,.5);background:rgba(220,38,38,.07);}
.alert-row.soon{border-color:rgba(234,88,12,.4);}
.alert-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.alert-dot.urgent{background:#dc2626;}.alert-dot.soon{background:#ea580c;}.alert-dot.ok{background:var(--gold);}
.alert-info{flex:1;}
.alert-name{font-size:.86rem;font-weight:700;}
.alert-sub{font-size:.72rem;opacity:.5;margin-top:1px;}
.alert-days{font-size:.8rem;font-weight:700;flex-shrink:0;}
.alert-days.urgent{color:#f87171;}.alert-days.soon{color:#fb923c;}.alert-days.ok{color:var(--gold);}
/* TASK CARDS */
.task-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;
  padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;}
.task-card:hover{border-color:var(--gold);transform:translateY(-1px);}
.task-card.urgent{border-color:rgba(220,38,38,.5);background:rgba(220,38,38,.06);}
.task-card.soon{border-color:rgba(234,88,12,.35);}
.task-top{display:flex;align-items:flex-start;gap:10px;}
.task-name{font-size:.92rem;font-weight:700;margin-bottom:3px;}
.task-meta{font-size:.72rem;opacity:.5;margin-bottom:5px;}
.task-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{padding:2px 7px;border-radius:9px;font-size:.68rem;font-weight:700;}
.tag-type{background:rgba(212,168,67,.15);color:var(--gold);}
.tag-mode{background:rgba(109,40,217,.15);color:#c4b5fd;}
.tag-rubric{background:rgba(42,107,42,.2);color:#6ee7a0;}
.tag-norubric{background:rgba(100,100,100,.15);color:#888;}
.task-stats{text-align:center;flex-shrink:0;}
.task-stats-n{font-size:1.15rem;font-weight:900;color:var(--gold);}
.task-stats-l{font-size:.62rem;opacity:.4;}
.task-del-btn{position:absolute;top:8px;left:8px;background:rgba(139,32,32,.2);
  border:1px solid rgba(139,32,32,.3);border-radius:4px;color:#f87171;cursor:pointer;
  font-size:.68rem;padding:2px 6px;z-index:2;font-family:'Heebo',sans-serif;}
.progress-bar{height:3px;background:rgba(212,168,67,.12);border-radius:2px;margin-top:6px;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),#f0c060);}
/* DETAIL */
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:4px;}
.detail-field{padding:9px 11px;background:rgba(253,245,224,.04);border-radius:7px;}
.detail-label{font-size:.68rem;opacity:.4;margin-bottom:3px;}
.detail-val{font-size:.85rem;font-weight:600;}
/* STUDENT ROW IN DETAIL */
.s-row{padding:12px 4px;border-bottom:1px solid rgba(212,168,67,.07);}
.s-row:last-child{border-bottom:none;}
.s-row-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.s-name-btn{font-size:.92rem;font-weight:700;cursor:pointer;color:var(--parch);
  background:none;border:none;padding:0;font-family:'Heebo',sans-serif;text-align:right;}
.s-name-btn:hover{color:var(--gold2);text-decoration:underline;}
.s-score-input{width:56px;background:rgba(42,107,42,.15);border:1.5px solid rgba(42,107,42,.35);
  border-radius:6px;color:#6ee7a0;text-align:center;font-size:.95rem;font-weight:700;
  padding:4px;font-family:'Heebo',sans-serif;outline:none;}
.s-fb-area{margin-top:7px;width:100%;background:rgba(253,245,224,.05);
  border:1px solid rgba(212,168,67,.13);border-radius:6px;color:var(--parch);
  font-family:'Heebo',sans-serif;font-size:.8rem;padding:6px 8px;outline:none;
  resize:vertical;direction:rtl;min-height:38px;}
.s-rubric-info{font-size:.68rem;color:var(--gold);opacity:.65;margin-top:2px;}
/* BUTTONS */
.btn-primary{padding:8px 15px;background:linear-gradient(135deg,var(--gold),#b8860b);color:var(--ink);
  border:none;border-radius:7px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.83rem;font-weight:700;}
.btn-primary:hover{opacity:.9;}
.btn-sm{padding:5px 11px;background:rgba(212,168,67,.1);border:1px solid var(--border);
  color:var(--gold);border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.78rem;}
.btn-sm:hover{background:rgba(212,168,67,.22);}
.btn-green{padding:5px 11px;background:rgba(42,107,42,.18);border:1px solid rgba(42,107,42,.38);
  color:#6ee7a0;border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.78rem;}
.btn-danger{padding:6px 12px;background:rgba(139,32,32,.2);border:1px solid rgba(139,32,32,.35);
  color:#f87171;border-radius:7px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.8rem;}
.btn-purple{padding:5px 11px;background:rgba(109,40,217,.18);border:1px solid rgba(109,40,217,.38);
  color:#c4b5fd;border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.78rem;}

/* ══ GRADING SCREEN ══ */
#screen-grade{background:#0f0a04;}
.grade-header{display:flex;align-items:center;gap:10px;padding:14px 18px;
  background:rgba(20,12,4,.95);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.grade-task-name{font-family:'Frank Ruhl Libre',serif;font-size:1rem;color:var(--gold2);font-weight:700;}
.grade-student-name{font-size:.95rem;font-weight:700;color:var(--parch);}
.grade-nav{display:flex;gap:5px;margin-right:auto;}
.grade-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px 18px;
  min-height:calc(100vh - 110px);}
@media(max-width:800px){.grade-layout{grid-template-columns:1fr;}}
.grade-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  display:flex;flex-direction:column;overflow:hidden;}
.grade-panel-hd{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.82rem;
  font-weight:700;color:var(--gold);display:flex;align-items:center;justify-content:space-between;}
.grade-panel-bd{flex:1;padding:14px;overflow-y:auto;}
.work-display{min-height:300px;background:rgba(253,245,224,.03);border:1px dashed rgba(212,168,67,.2);
  border-radius:8px;padding:12px;font-size:.85rem;line-height:1.7;white-space:pre-wrap;
  overflow-y:auto;max-height:500px;direction:rtl;}
.work-display img{max-width:100%;border-radius:6px;}
.rubric-row-grade{display:flex;align-items:flex-start;gap:8px;padding:8px 0;
  border-bottom:1px solid rgba(212,168,67,.07);}
.rubric-row-grade:last-child{border-bottom:none;}
.rg-name{flex:1;font-size:.83rem;line-height:1.4;}
.rg-max{font-size:.72rem;opacity:.4;width:36px;text-align:center;flex-shrink:0;padding-top:3px;}
.rg-score{width:52px;background:rgba(253,245,224,.08);border:1px solid rgba(212,168,67,.3);
  border-radius:5px;color:var(--gold);text-align:center;font-size:.88rem;font-weight:700;
  padding:4px;font-family:'Heebo',sans-serif;outline:none;flex-shrink:0;}
.rg-comment{flex:1.5;background:rgba(253,245,224,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:5px;color:var(--parch);font-size:.75rem;padding:4px 6px;
  font-family:'Heebo',sans-serif;outline:none;resize:none;}
.grade-score-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(212,168,67,.07);border-top:1px solid rgba(212,168,67,.15);}
.grade-total-input{width:65px;background:rgba(253,245,224,.07);border:2px solid var(--gold);
  border-radius:7px;color:var(--gold);text-align:center;font-size:1.05rem;font-weight:900;
  padding:5px;font-family:'Heebo',sans-serif;outline:none;}
.grade-fb{width:100%;background:rgba(253,245,224,.06);border:1.5px solid rgba(212,168,67,.2);
  border-radius:8px;color:#fdf5e0;font-family:'Heebo',sans-serif;font-size:.85rem;
  padding:9px;outline:none;resize:vertical;direction:rtl;line-height:1.6;}

/* ══ WIZARD MODAL ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;
  display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px 0;}
.modal-overlay.open{display:flex;}
.modal{background:#1a0e05;border:2px solid var(--gold);border-radius:14px;
  width:100%;max-width:620px;margin:auto 16px;}
.modal-lg{max-width:720px;}
/* WIZARD STEPS */
.wizard-steps{display:flex;align-items:center;padding:16px 22px 0;gap:0;}
.wstep{display:flex;align-items:center;flex:1;}
.wstep-dot{width:28px;height:28px;border-radius:50%;background:rgba(212,168,67,.12);
  border:2px solid var(--border);color:var(--muted);font-size:.75rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;}
.wstep-dot.done{background:rgba(42,107,42,.3);border-color:#6ee7a0;color:#6ee7a0;}
.wstep-dot.active{background:rgba(212,168,67,.2);border-color:var(--gold);color:var(--gold2);}
.wstep-label{font-size:.65rem;opacity:.5;margin-top:3px;text-align:center;white-space:nowrap;}
.wstep-line{flex:1;height:1px;background:var(--border);margin:0 4px;margin-bottom:16px;}
.wstep-line.done{background:rgba(42,107,42,.5);}
.wstep-wrap{display:flex;flex-direction:column;align-items:center;}
.wizard-body{padding:20px 22px;}
.wizard-title{font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;color:var(--gold2);
  font-weight:700;margin-bottom:16px;}
.wizard-btns{padding:14px 22px;border-top:1px solid rgba(212,168,67,.12);
  display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
/* MODAL FIELDS */
.mf{margin-bottom:13px;}
.ml{font-size:.77rem;color:var(--gold);opacity:.82;margin-bottom:5px;}
.mi{width:100%;padding:9px 11px;background:rgba(253,245,224,.07);border:1.5px solid var(--border);
  border-radius:7px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;outline:none;transition:border .2s;}
.mi:focus{border-color:var(--gold);}
select.mi{appearance:auto;}
select.mi option{background:#2c1a0e;}
textarea.mi{resize:vertical;direction:rtl;}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
/* CHECKBOXES GRID */
.check-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.check-opt{display:flex;align-items:center;gap:6px;padding:6px 12px;
  border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:.83rem;
  background:rgba(253,245,224,.04);transition:all .2s;}
.check-opt:hover{border-color:var(--gold);}
.check-opt.sel{border-color:var(--gold);background:rgba(212,168,67,.13);color:var(--gold2);}
.check-opt input{accent-color:var(--gold);}
/* RADIO */
.radio-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px;}
.radio-opt{padding:6px 12px;border:1px solid var(--border);border-radius:7px;cursor:pointer;
  font-size:.82rem;background:rgba(253,245,224,.04);transition:all .2s;}
.radio-opt:hover,.radio-opt.sel{border-color:#7c3aed;background:rgba(109,40,217,.13);color:#c4b5fd;}
/* FILE DROP */
.file-drop{border:2px dashed var(--border);border-radius:9px;padding:16px;text-align:center;
  cursor:pointer;transition:border-color .2s;}
.file-drop:hover{border-color:var(--gold);}
.file-name{font-size:.76rem;color:var(--gold);margin-top:5px;}
/* RUBRIC TABLE */
.rubric-tbl{width:100%;border-collapse:collapse;margin-bottom:10px;}
.rubric-tbl th{padding:6px 7px;font-size:.7rem;color:var(--gold);text-align:right;
  border-bottom:1px solid rgba(212,168,67,.18);}
.rubric-tbl td{padding:6px 7px;vertical-align:top;border-bottom:1px solid rgba(212,168,67,.05);}
.ri{width:100%;background:rgba(253,245,224,.06);border:1px solid rgba(212,168,67,.14);
  border-radius:5px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.8rem;padding:5px 7px;outline:none;}
.ri-num{width:54px;text-align:center;color:var(--gold);font-weight:700;}
/* AI STATUS */
.ai-status{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:rgba(109,40,217,.1);border:1px solid rgba(109,40,217,.25);border-radius:8px;
  font-size:.82rem;color:#c4b5fd;margin-bottom:10px;}
.ai-spin{width:16px;height:16px;border:2px solid rgba(109,40,217,.3);
  border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* SUB OPTION */
.sub-opt-row{display:none;margin-top:8px;padding:10px;background:rgba(109,40,217,.07);
  border:1px solid rgba(109,40,217,.22);border-radius:8px;}
.sub-opt-row.vis{display:block;}
/* GROUP SLOTS */
.group-slot{background:rgba(44,26,14,.6);border:1px solid var(--border);border-radius:7px;
  padding:9px 12px;margin-bottom:7px;}
.gs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.gs-title{font-size:.8rem;font-weight:700;color:var(--gold);}
.member-tag{display:inline-flex;align-items:center;padding:3px 9px;
  background:rgba(212,168,67,.1);border:1px solid var(--border);border-radius:11px;
  font-size:.73rem;cursor:pointer;margin:2px;transition:all .15s;}
.member-tag.sel{background:rgba(109,40,217,.18);border-color:#7c3aed;color:#c4b5fd;}
/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:#1a3a1a;border:1px solid #3fb950;
  color:#6ee7a0;padding:9px 17px;border-radius:8px;font-size:.83rem;z-index:9999;display:none;pointer-events:none;}
/* MISC */
.empty-state{text-align:center;padding:32px;opacity:.38;font-size:.86rem;}
.info-box{padding:10px 13px;border-radius:8px;font-size:.8rem;margin-bottom:10px;}
.info-box.green{background:rgba(42,107,42,.12);border:1px solid rgba(42,107,42,.3);color:#6ee7a0;}
.info-box.gold{background:rgba(212,168,67,.09);border:1px solid rgba(212,168,67,.25);color:var(--gold2);}
.info-box.purple{background:rgba(109,40,217,.1);border:1px solid rgba(109,40,217,.28);color:#c4b5fd;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📋 ניהול משימות</div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <button class="btn-back" onclick="goBack()">← לוח המורה</button>
</div>

<div class="main" id="main-wrap">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="screen-hd">
      <div class="screen-title">📋 ניהול משימות</div>
    </div>
    <div class="subjects-grid" id="home-subjects-grid"><div class="empty-state">טוען...</div></div>
    <div style="margin-top:4px;">
      <div class="alerts-title">⏰ לוח התרעות
        <span id="alerts-count" style="display:none;background:rgba(220,38,38,.2);color:#f87171;border-radius:9px;padding:1px 8px;font-size:.7rem;font-weight:700;"></span>
      </div>
      <div id="alerts-list"><div class="empty-state" style="padding:14px;">אין משימות פעילות</div></div>
    </div>
  </div>

  <!-- SUBJECT -->
  <div class="screen" id="screen-subject">
    <div class="screen-hd">
      <div class="screen-title" id="subject-title"></div>
      <button class="btn-primary" onclick="openWizard()">➕ משימה חדשה</button>
    </div>
    <div id="tasks-columns"></div>
    <div class="empty-state" id="tasks-empty" style="display:none;">אין משימות עדיין.</div>
  </div>

  <!-- TASK DETAIL -->
  <div class="screen" id="screen-detail">
    <div class="screen-hd">
      <div class="screen-title" id="detail-title"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn-sm" onclick="editCurrentTask()">✏️ ערוך</button>
        <button class="btn-sm" onclick="duplicateCurrentTask()">📋 שכפל</button>
        <div style="position:relative;">
          <button class="btn-sm" onclick="toggleRubricMenu()">📑 מחוון ▾</button>
          <div id="rubric-menu" style="display:none;position:absolute;top:110%;right:0;background:#1a0f05;
            border:1px solid var(--border);border-radius:9px;padding:5px;z-index:50;min-width:170px;box-shadow:0 8px 22px rgba(0,0,0,.5);">
            <button onclick="viewRubric();closeRubricMenu()" class="rmb">👁 צפה במחוון</button>
            <button onclick="openBuildRubric('qa');closeRubricMenu()" class="rmb" style="color:#c4b5fd;">📝 שאלות/תשובות</button>
            <button onclick="openBuildRubric('eval');closeRubricMenu()" class="rmb" style="color:#93c5fd;">📊 הערכה</button>
          </div>
        </div>
        <button class="btn-sm" style="background:rgba(34,197,94,.1);color:#22c55e;border-color:rgba(34,197,94,.28);"
          id="btn-complete" onclick="completeCurrentTask()">✅ סיים</button>

.rmb:hover{background:rgba(212,168,67,.1);}
</style>

<script>
/* ══════════════════════════════════════
   FIREBASE + CONFIG
══════════════════════════════════════ */
const firebaseConfig={
  apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",
  authDomain:"et-hadaat.firebaseapp.com",
  databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",
  projectId:"et-hadaat",storageBucket:"et-hadaat.firebasestorage.app",
  messagingSenderId:"141400405468",appId:"1:141400405468:web:c1090c52477d14a159cb19"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const AI_PROXY='https://anthropic-proxy.anna-sho-ea8.workers.dev';

/* STATE */
let subjects=[],groups=[],tasks=[];
let currentSubject=null,currentTaskId=null;
let _studentFileCache={};

/* WIZARD STATE */
let _wz={
  step:1,editId:null,
  data:{}, // task data accumulated
  instrFile:null,
  rubricImgFile:null,
  rubricType:null,  // 'qa','eval','none'
  hasExistingRubric:null,
  rubric:null,
  taskGroups:[],
  groupMethod:'free'
};

/* GRADING STATE */
let _grade={
  taskId:null,studentName:null,
  studentList:[],studentIdx:0,
  workFile:null,workMode:'text',
  rubricRows:0
};

/* ══ INIT ══ */
window.addEventListener('load',()=>{
  if(sessionStorage.getItem('teacher_logged_in')!=='yes'){
    window.location.href='teacher_dashboard.html';return;
  }
  loadAll();
});

function loadAll(){
  db.ref('teacher').once('value',snap=>{
    const data=snap.val()||{};
    groups=data.groups?Object.values(data.groups):[];
    subjects=data.subjects?Object.entries(data.subjects).map(([sid,s])=>({
      ...s,_fbKey:sid,
      units:s.units?Object.entries(s.units).map(([uid,u])=>({
        ...u,_fbKey:uid,lessons:u.lessons?Object.values(u.lessons):[]
      })):[]
    })):[];
    db.ref('teacher/tasks').once('value',ts=>{
      tasks=ts.val()?Object.entries(ts.val()).map(([id,v])=>({id,...v})):[];
      renderHome();
    });
  });
}

/* ══ NAVIGATION ══ */
function showScreen(id){
  // hide all except grade (which is fixed overlay)
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // if not grading, ensure grade screen hidden
  if(id!=='screen-grade')document.getElementById('screen-grade').classList.remove('active');
}
function setBc(items){
  let h='<span class="bc-item" onclick="goHome()">🏠</span>';
  items.forEach((it,i)=>{
    h+='<span class="bc-sep">›</span>';
    if(it.fn&&i<items.length-1)h+=`<span class="bc-item" onclick="${it.fn}">${it.label}</span>`;
    else h+=`<span class="bc-item" style="color:var(--gold2);opacity:1;">${it.label}</span>`;
  });
  document.getElementById('breadcrumb').innerHTML=h;
}
function goHome(){currentSubject=null;currentTaskId=null;setBc([]);renderHome();showScreen('screen-home');}
function goBack(){window.location.href='teacher_dashboard.html';}

/* ══ HOME ══ */
function renderHome(){renderSubjectGrid();renderAlerts();setBc([]);}

function renderSubjectGrid(){
  const g=document.getElementById('home-subjects-grid');
  if(!subjects.length){g.innerHTML='<div class="empty-state">אין מקצועות בלוח המורה.</div>';return;}
  g.innerHTML='';
  subjects.forEach(sub=>{
    const cnt=tasks.filter(t=>t.subjectId===sub.id).length;
    const urg=tasks.filter(t=>t.subjectId===sub.id&&!t.completed&&daysLeft(t)<=3&&daysLeft(t)>=0).length;
    const c=document.createElement('div');
    c.className='subject-card';c.style.setProperty('--card-color',sub.color||'var(--gold)');
    c.innerHTML=`${urg?`<div class="badge-urgent">${urg}</div>`:''}
      <div class="subject-icon">${sub.icon||'📚'}</div>
      <div class="subject-name">${esc(sub.name)}</div>
      <div class="subject-meta">${cnt} משימות</div>
      <div class="subject-arrow">‹</div>`;
    c.onclick=()=>openSubject(sub);g.appendChild(c);
  });
}

function renderAlerts(){
  const list=document.getElementById('alerts-list');
  const cnt=document.getElementById('alerts-count');
  const active=tasks.filter(t=>!t.completed);
  if(!active.length){list.innerHTML='<div class="empty-state" style="padding:14px;">אין משימות פעילות</div>';return;}
  const sorted=[...active].sort((a,b)=>daysLeft(a)-daysLeft(b));
  list.innerHTML='';let urg=0;
  sorted.forEach(t=>{
    const d=daysLeft(t);
    let cl='ok';
    if(d<=1){cl='urgent';urg++;}else if(d<=3){cl='soon';urg++;}
    const gr=groups.find(g=>g.id===t.groupId);
    const sub=subjects.find(s=>s.id===t.subjectId);
    const chk=t.grades?Object.keys(t.grades).length:0;
    const tot=gr?.students?.length||0;
    const row=document.createElement('div');
    row.className=`alert-row ${cl==='ok'?'':cl}`;
    row.onclick=()=>{if(sub)openSubject(sub);setTimeout(()=>openTaskDetail(t.id),50);};
    row.innerHTML=`<div class="alert-dot ${cl}"></div>
      <div class="alert-info">
        <div class="alert-name">${esc(t.name)}</div>
        <div class="alert-sub">${esc(sub?.name||'')} · ${esc(gr?.name||'')} · ${chk}/${tot} נבדקו</div>
      </div>
      <div class="alert-days ${cl}">${d<=0?'🔴 עבר':d===1?'מחר!':d+' ימים'}</div>`;
    list.appendChild(row);
  });
  cnt.style.display=urg?'inline':'none';if(urg)cnt.textContent=urg;
}

function daysLeft(t){
  const dl=new Date(new Date(t.due).getTime()+(t.gradeDays||21)*86400000);
  return Math.ceil((dl-new Date())/(1000*60*60*24));
}

/* ══ SUBJECT ══ */
function openSubject(sub){
  currentSubject=sub;
  setBc([{label:sub.name}]);
  document.getElementById('subject-title').textContent=(sub.icon||'📚')+' '+sub.name;
  renderTasksList();showScreen('screen-subject');
}

function renderTasksList(){
  const col=document.getElementById('tasks-columns');
  const empty=document.getElementById('tasks-empty');
  const subs=tasks.filter(t=>t.subjectId===currentSubject.id);
  if(!subs.length){col.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const byGrp={};
  subs.forEach(t=>{if(!byGrp[t.groupId])byGrp[t.groupId]=[];byGrp[t.groupId].push(t);});
  const gids=Object.keys(byGrp);
  col.style.display=gids.length>1?'grid':'block';
  if(gids.length>1){col.style.gridTemplateColumns='repeat(auto-fill,minmax(290px,1fr))';col.style.gap='14px';}
  col.innerHTML='';
  gids.forEach(gid=>{
    const gr=groups.find(g=>g.id===gid);
    const wrap=document.createElement('div');
    if(gids.length>1)wrap.innerHTML=`<div style="font-size:.78rem;font-weight:700;color:var(--gold);opacity:.65;margin-bottom:7px;">👥 ${esc(gr?.name||gid)}</div>`;
    [...byGrp[gid]].sort((a,b)=>new Date(a.due)-new Date(b.due)).forEach(t=>wrap.appendChild(buildTaskCard(t,gr)));
    col.appendChild(wrap);
  });
}

function buildTaskCard(t,gr){
  const d=daysLeft(t);
  const chk=t.grades?Object.keys(t.grades).length:0;
  const tot=gr?.students?.length||0;
  const pct=tot?Math.round(chk/tot*100):0;
  const c=document.createElement('div');
  c.className='task-card'+((!t.completed&&d<=1)?' urgent':(!t.completed&&d<=3)?' soon':'');
  if(t.completed)c.style.opacity='.5';
  c.innerHTML=`
    <button class="task-del-btn" onclick="event.stopPropagation();deleteTask('${t.id}')">🗑</button>
    <div class="task-top">
      <div style="flex:1;">
        <div class="task-name">${esc(t.name)}${t.completed?' <span style="font-size:.7rem;color:#6ee7a0;">✅</span>':''}</div>
        <div class="task-meta">${fmtDate(t.due)} · ${esc(gr?.name||'')}</div>
        <div class="task-tags">
          <span class="tag tag-type">${esc(t.type||'')}</span>
          <span class="tag tag-mode">${esc(t.mode||'')}</span>
          ${t.rubric?'<span class="tag tag-rubric">✓ מחוון</span>':'<span class="tag tag-norubric">ללא מחוון</span>'}
          ${t.submitTypes?.length?`<span class="tag" style="background:rgba(37,99,235,.15);color:#93c5fd;">${t.submitTypes.join('/')}</span>`:''}
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:.7rem;opacity:.4;margin-top:3px;">${chk}/${tot} נבדקו${!t.completed?' · '+(d<=0?'🔴 עבר':d+' ימים'):''}
        </div>
      </div>
      <div class="task-stats"><div class="task-stats-n">${chk}</div><div class="task-stats-l">נבדקו</div></div>
    </div>`;
  c.onclick=()=>openTaskDetail(t.id);return c;
}

/* ══ TASK DETAIL ══ */
function openTaskDetail(taskId){
  currentTaskId=taskId;
  db.ref('teacher/tasks/'+taskId+'/grades').once('value',snap=>{
    const task=tasks.find(t=>t.id===taskId);
    if(!task)return;
    task.grades=snap.val()||{};
    _renderDetail(task);
  });
}

function _renderDetail(task){
  const gr=groups.find(g=>g.id===task.groupId);
  const sub=subjects.find(s=>s.id===task.subjectId);
  document.getElementById('detail-title').textContent=task.name;
  const bc=document.getElementById('btn-complete');
  bc.textContent=task.completed?'🔄 פתח':'✅ סיים';
  bc.style.color=task.completed?'#fb923c':'#22c55e';

  const students=gr?.students||[];
  const checked=students.filter(s=>task.grades?.[s.replace(/ /g,'_')]?.score!==undefined).length;
  const dl=new Date(new Date(task.due).getTime()+(task.gradeDays||21)*86400000);

  // student rows
  const sRowsHtml=students.length?students.map(s=>{
    const key=s.replace(/ /g,'_');
    const g=task.grades?.[key]||{};
    const hasScore=g.score!==undefined&&g.score!=='';
    const hasRubric=hasScore&&g.rubricScores?.length;
    const sEsc=s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="s-row">
      <div class="s-row-top">
        <button class="s-name-btn" onclick="openGradingScreen('${task.id}','${sEsc}')">${esc(s)}</button>
        <div style="flex:1;"></div>
        ${hasRubric?`<span style="font-size:.7rem;color:var(--gold);opacity:.65;">📑 מחוון שמור</span>`:''}
        ${hasScore
          ?`<input type="number" min="0" max="100" value="${g.score}" id="sc-${key}" class="s-score-input" title="ציון">`
          :`<span style="opacity:.28;font-size:.78rem;">—</span>`}
        <div style="display:flex;gap:4px;">
          ${hasScore?`<button class="btn-green" onclick="quickSave('${task.id}','${sEsc}')">💾 שמור</button>`:''}
          <button class="btn-purple" onclick="editStudentRubric('${task.id}','${sEsc}')">📑 ערוך</button>
          <button class="btn-sm" onclick="openGradingScreen('${task.id}','${sEsc}')">🤖 בדוק</button>
        </div>
      </div>
      <textarea id="fb-${key}" class="s-fb-area" rows="2"
        placeholder="הערה מילולית..." onclick="this.select()">${esc(g.feedback||'')}</textarea>
      ${hasRubric?`<div class="s-rubric-info">📑 ${g.rubricScores.length} קריטריונים · ציון: ${g.score}</div>`:''}
    </div>`;
  }).join(''):'<div class="empty-state" style="padding:14px;">אין תלמידים בקבוצה</div>';

  document.getElementById('detail-content').innerHTML=`
    <div class="card" style="margin-bottom:12px;">
      <div class="detail-grid">
        <div class="detail-field"><div class="detail-label">קבוצה</div><div class="detail-val">${esc(gr?.name||'—')}</div></div>
        <div class="detail-field"><div class="detail-label">סוג</div><div class="detail-val">${esc(task.type||'')} · ${esc(task.mode||'')}</div></div>
        <div class="detail-field"><div class="detail-label">פתיחה</div><div class="detail-val">${task.openDate?fmtDate(task.openDate):'—'}</div></div>
        <div class="detail-field"><div class="detail-label">הגשה</div><div class="detail-val">${fmtDate(task.due)}</div></div>
        <div class="detail-field"><div class="detail-label">מועד לציונים</div><div class="detail-val">${fmtDate(dl.toISOString().split('T')[0])}</div></div>
        <div class="detail-field"><div class="detail-label">נבדקו</div><div class="detail-val">${checked}/${students.length}</div></div>
      </div>
      ${task.submitTypes?.length?`<div style="margin-top:9px;font-size:.78rem;opacity:.6;">📎 הגשה: ${task.submitTypes.join(' / ')}</div>`:''}
      ${task.rubric?`<div style="margin-top:8px;font-size:.76rem;color:#6ee7a0;">✅ מחוון — ${task.rubric.criteria?.length||0} קריטריונים</div>`:'<div style="margin-top:7px;font-size:.76rem;color:#888;">ללא מחוון</div>'}
    </div>
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>👥 תלמידים (${students.length})</span>
        <div style="display:flex;gap:5px;">
          <button class="btn-sm" onclick="exportGrades('${task.id}','simple')" title="CSV למערכת ציונים">📥 CSV</button>
          <button class="btn-sm" style="color:#c4b5fd;border-color:rgba(109,40,217,.3);" onclick="exportGrades('${task.id}','full')" title="דוח מפורט">📋 דוח</button>
        </div>
      </div>
      ${sRowsHtml}
    </div>`;

  setBc([
    {label:currentSubject?.name||sub?.name||'',fn:`openSubject(subjects.find(s=>s.id==='${task.subjectId}')||currentSubject)`},
    {label:task.name}
  ]);
  showScreen('screen-detail');
}

/* ══ GRADING SCREEN ══ */
function openGradingScreen(taskId,studentName){
  const task=tasks.find(t=>t.id===taskId);
  if(!task)return;
  const gr=groups.find(g=>g.id===task.groupId);
  const students=gr?.students||[];
  const idx=students.indexOf(studentName);
  _grade={taskId,studentName,studentList:students,studentIdx:Math.max(0,idx),workFile:null,workMode:'text',rubricRows:0};
  currentTaskId=taskId;
  _renderGradingScreen();
}

function _renderGradingScreen(){
  const {taskId,studentName,studentList,studentIdx}=_grade;
  const task=tasks.find(t=>t.id===taskId);
  if(!task)return;
  const key=studentName.replace(/ /g,'_');
  const existing=task.grades?.[key]||{};

  document.getElementById('grade-task-name').textContent=task.name;
  document.getElementById('grade-student-name').textContent='👤 '+studentName;
  document.getElementById('grade-nav-pos').textContent=(studentIdx+1)+' / '+studentList.length;

  // reset work area
  document.getElementById('grade-work-text').value='';
  document.getElementById('grade-pdf-name').textContent='';
  document.getElementById('grade-img-name').textContent='';
  document.getElementById('grade-pdf-viewer').style.display='none';
  document.getElementById('grade-img-viewer').style.display='none';
  _grade.workFile=null;

  // restore cached file if any
  const cached=_studentFileCache[key];
  if(cached){
    _grade.workFile=cached;
    if(cached.type==='pdf'){setGradeMode('pdf');document.getElementById('grade-pdf-name').textContent='✓ '+cached.name;
      const url='data:application/pdf;base64,'+cached.base64;
      document.getElementById('grade-pdf-frame').src=url;
      document.getElementById('grade-pdf-viewer').style.display='block';
    } else {
      setGradeMode('image');document.getElementById('grade-img-name').textContent='✓ '+cached.name;
      document.getElementById('grade-img-el').src='data:'+cached.mediaType+';base64,'+cached.base64;
      document.getElementById('grade-img-viewer').style.display='block';
    }
  } else {
    setGradeMode('text');
  }

  // if existing grade — load it
  if(existing.score!==undefined&&existing.rubricScores?.length&&task.rubric?.criteria){
    const fakeResult={
      scores:task.rubric.criteria.map((c,i)=>({
        criterion:c.name,score:existing.rubricScores[i]?.score??0,
        maxScore:c.maxPoints,comment:existing.rubricScores[i]?.comment||''
      })),
      totalScore:existing.score,verbalFeedback:existing.feedback||''
    };
    renderGradeRubric(fakeResult,task);
    document.getElementById('grade-rubric-status').textContent='📋 ציון שמור: '+existing.score;
  } else {
    document.getElementById('grade-rubric-panel').innerHTML='<div class="empty-state">העלי עבודה ולחצי "בדוק לפי מחוון"</div>';
    document.getElementById('grade-bottom').style.display='none';
    document.getElementById('grade-rubric-status').textContent='';
    if(!task.rubric)document.getElementById('grade-rubric-panel').innerHTML='<div class="info-box gold">אין מחוון למשימה זו. לחצי "📑 מחוון" כדי לבנות מחוון תחילה.</div>';
  }

  showScreen('screen-grade');
}

function setGradeMode(mode){

function loadGradeFile(input,type){
  const file=input.files[0];if(!file)return;
  input.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    const base64=e.target.result.split(',')[1];
    const fd={type,base64,mediaType:type==='pdf'?'application/pdf':file.type,name:file.name};
    _grade.workFile=fd;
    const key=_grade.studentName?.replace(/ /g,'_');
    if(key)_studentFileCache[key]=fd;
    if(type==='pdf'){
      document.getElementById('grade-pdf-name').textContent='✓ '+file.name;
      document.getElementById('grade-pdf-frame').src='data:application/pdf;base64,'+base64;
      document.getElementById('grade-pdf-viewer').style.display='block';
    } else {
      document.getElementById('grade-img-name').textContent='✓ '+file.name;
      document.getElementById('grade-img-el').src=e.target.result;
      document.getElementById('grade-img-viewer').style.display='block';
    }
  };
  reader.readAsDataURL(file);
}

async function gradeWithAI(){
  const task=tasks.find(t=>t.id===_grade.taskId);
  if(!task?.rubric){toast('אין מחוון. בני מחוון תחילה.');return;}
  const btn=document.getElementById('btn-grade-ai');
  btn.textContent='⏳ בודק...';btn.disabled=true;
  const rubricText=task.rubric.criteria.map(c=>`${c.name} (${c.maxPoints} נק׳): ${c.description||''}`).join('\n');
  const answerKeys=task.rubric.rubricType==='qa'?
    task.rubric.criteria.filter(c=>c.answerKey).map(c=>`${c.name}: ${c.answerKey}`).join('\n'):'';
  const jp=`\n\nהחזר JSON בלבד:\n{"scores":[{"criterion":"שם הקריטריון בדיוק","score":מספר,"maxScore":מספר,"comment":"הערה ספציפית לתלמיד"}],"totalScore":מספר,"verbalFeedback":"הערה מילולית אישית 3-4 משפטים — פתחי בחיובי, הצביעי על שיפורים, סיימי בעידוד."}`;
  try{
    let body;
    if(_grade.workMode==='text'){
      const txt=document.getElementById('grade-work-text').value.trim();
      if(!txt){toast('הדביקי את תוכן העבודה.');btn.textContent='🤖 בדוק לפי מחוון';btn.disabled=false;return;}
      body={model:'claude-sonnet-4-20250514',max_tokens:2000,
        system:'אתה עוזר הוראה מנוסה. בדוק בצורה מקצועית ומדויקת. ענה רק ב-JSON תקני.',
        messages:[{role:'user',content:`בדוק לפי המחוון:\n${rubricText}${answerKeys?'\n\nתשובות נכונות:\n'+answerKeys:''}\n\nעבודת ${_grade.studentName}:\n${txt}${jp}`}]};
    } else {
      if(!_grade.workFile){toast('טעני קובץ תחילה.');btn.textContent='🤖 בדוק לפי מחוון';btn.disabled=false;return;}
      const fc=_grade.workFile.type==='pdf'
        ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:_grade.workFile.base64}}
        :{type:'image',source:{type:'base64',media_type:_grade.workFile.mediaType,data:_grade.workFile.base64}};
      body={model:'claude-sonnet-4-20250514',max_tokens:2000,
        system:'אתה עוזר הוראה מנוסה. בדוק בצורה מקצועית. ענה רק ב-JSON תקני.',
        messages:[{role:'user',content:[fc,{type:'text',text:`בדוק לפי המחוון:\n${rubricText}${answerKeys?'\n\nתשובות נכונות:\n'+answerKeys:''}${jp}`}]}]};
    }
    const r=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const raw=(d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    let result;
    try{result=JSON.parse(raw);}
    catch{const m=raw.match(/\{[\s\S]*\}/);if(m)result=JSON.parse(m[0]);else throw new Error('JSON לא תקין');}
    renderGradeRubric(result,task);
    document.getElementById('grade-rubric-status').textContent='✅ AI בדק';
  }catch(e){toast('שגיאה: '+e.message);}
  btn.textContent='🤖 בדוק לפי מחוון';btn.disabled=false;
}

function renderGradeRubric(result,task){
  const rows=result.scores.map((s,i)=>`

      <div class="rg-name"><span style="font-weight:600;">${esc(s.criterion)}</span></div>
      <div class="rg-max">${s.maxScore}</div>
      <input type="number" min="0" max="${s.maxScore}" value="${s.score}" id="gr-s-${i}"
        class="rg-score" onchange="gradeCalcTotal(${result.scores.length})">
      <textarea rows="1" id="gr-c-${i}" class="rg-comment"
        style="height:32px;">${esc(s.comment)}</textarea>

  _grade.rubricRows=result.scores.length;

      grid-template-columns:1fr 36px 52px 1.5fr;gap:6px;padding:0 0 6px;border-bottom:1px solid rgba(212,168,67,.12);margin-bottom:4px;">

function cgLimitCheck(cb,max){
  const all=document.querySelectorAll('#copy-group-list input[type=checkbox]');

function copyCradeToGroup(){
  const data=window._copyGroupData;
  if(!data){toast('שגיאה — נסי שוב');return;}
  const {taskId,gradeData,gradedStudent}=data;
  const checked=[...document.querySelectorAll('#copy-group-list input:checked')];
  if(!checked.length){toast('לא סומנה אף תלמידה. לחצי "דלג" לחזרה.');return;}
  const task=tasks.find(t=>t.id===taskId);
  checked.forEach(cb=>{
    const sName=cb.value;
    const key=sName.replace(/ /g,'_');
    const gd={...gradeData,copiedFrom:gradedStudent,gradedAt:Date.now()};
    db.ref('teacher/tasks/'+taskId+'/grades/'+key).set(gd);
    if(task){if(!task.grades)task.grades={};task.grades[key]=gd;}
  });
  toast(`✓ ציון הועתק ל-${checked.length} תלמידים`);
  document.getElementById('copy-group-overlay')?.remove();
  window._copyGroupData=null;
  closeGradingScreen();
}

const WIZARD_STEPS=[
  {n:1,label:'פרטי משימה'},
  {n:2,label:'הוראות'},
  {n:3,label:'מחוון'},
  {n:4,label:'תשובות מפתח'}

function openWizard(editId){
  _wz={step:1,editId:editId||null,data:{},instrFile:null,rubricImgFile:null,
    rubricType:null,hasExistingRubric:null,rubric:null,taskGroups:[],groupMethod:'free'};
  if(editId){
    const t=tasks.find(t=>t.id===editId);
    if(t){_wz.data={name:t.name,groupId:t.groupId,type:t.type,mode:t.mode,
      openDate:t.openDate,due:t.due,gradeDays:t.gradeDays,instructions:t.instructions,
      submitTypes:t.submitTypes||[],subjectId:t.subjectId};
      _wz.rubric=t.rubric||null;_wz.rubricType=t.rubricType||null;
      _wz.taskGroups=t.taskGroups||[];_wz.groupMethod=t.groupMethod||'free';
    }
  }
  renderWizardStep();
  openModal('modal-wizard');
}

function renderWizardStep(){
  // step bar
  const total=_wz.rubricType==='qa'?4:3;
  const steps=WIZARD_STEPS.slice(0,total);
  let barHtml='';
  steps.forEach((s,i)=>{
    const st=s.n<_wz.step?'done':s.n===_wz.step?'active':'';
    barHtml+=`<div class="wstep">
      <div class="wstep-wrap"><div class="wstep-dot ${st}">${s.n<_wz.step?'✓':s.n}</div>
      <div class="wstep-label">${s.label}</div></div>
      ${i<steps.length-1?`<div class="wstep-line ${s.n<_wz.step?'done':''}"></div>`:''}
    </div>`;
  });
  document.getElementById('wizard-steps-bar').innerHTML=barHtml;
  // body + buttons
  if(_wz.step===1)renderWizStep1();
  else if(_wz.step===2)renderWizStep2();
  else if(_wz.step===3)renderWizStep3();
  else if(_wz.step===4)renderWizStep4();
}

function wzModeChange(){

function wzSelectMethod(m){
  _wz.groupMethod=m;
  document.querySelectorAll('#wz-subopt .radio-opt').forEach(el=>{
    el.classList.toggle('sel',el.textContent.trim()===({'free':'בחירה חופשית','manual':'קביעה ידנית','auto':'אוטומטי'}[m]));
  });
  wzBuildGroupsPanel();
}

function wzToggleSubmit(val,label){
  label.classList.toggle('sel');
  const inp=label.querySelector('input');
  if(inp)inp.checked=label.classList.contains('sel');
}

function wzBuildGroupsPanel(){
  const panel=document.getElementById('wz-groups-panel');
  if(!panel)return;
  if(_wz.groupMethod==='free'){
    panel.innerHTML='<div class="info-box gold" style="margin:4px 0;font-size:.78rem;">התלמידים יבחרו בעצמם. תוכלי לסמן בעת הבדיקה.</div>';
    return;
  }
  const gid=document.getElementById('wf-group')?.value;
  const gr=groups.find(g=>g.id===gid);
  const students=gr?.students||[];
  if(!students.length){panel.innerHTML='<div style="font-size:.75rem;color:#fb923c;margin-top:4px;">אין תלמידים בקבוצה זו.</div>';return;}
  const mode=document.getElementById('wf-mode')?.value||'אישי';
  const size=mode.includes('3')?3:mode.includes('4')?4:mode.includes('5')?5:2;
  const numGrps=Math.ceil(students.length/size);
  if(_wz.groupMethod==='auto'||!_wz.taskGroups.length){
    const sh=[...students].sort(()=>Math.random()-.5);
    _wz.taskGroups=[];
    for(let i=0;i<numGrps;i++)_wz.taskGroups.push({id:'g'+(i+1),name:'קבוצה '+(i+1),members:[]});
    sh.forEach((s,i)=>_wz.taskGroups[i%numGrps].members.push(s));
  }
  if(_wz.groupMethod==='auto'){
    panel.innerHTML=_wz.taskGroups.map(g=>`<div class="group-slot">
      <div class="gs-title">${g.name}: ${g.members.map(m=>`<span class="member-tag sel">${esc(m)}</span>`).join('')}</div>
    </div>`).join('');
  } else {
    const assigned=_wz.taskGroups.flatMap(g=>g.members);
    const unassigned=students.filter(s=>!assigned.includes(s));
    let html=unassigned.length?`<div style="padding:7px;background:rgba(212,168,67,.05);border-radius:6px;margin-bottom:7px;">
      <div style="font-size:.7rem;color:var(--gold);margin-bottom:4px;">לא שובצו:</div>
      <div>${unassigned.map(s=>`<span class="member-tag" onclick="wzAddToGroup('${s.replace(/'/g,"\\'")}',this)">${esc(s)} +</span>`).join('')}</div>
    </div>`:'';
    html+=_wz.taskGroups.map((g,gi)=>`<div class="group-slot">
      <div class="gs-header"><span class="gs-title">${g.name}</span>
        <button onclick="wzAddGroupSlot()" style="font-size:.68rem;padding:2px 6px;background:rgba(212,168,67,.08);border:1px solid var(--border);border-radius:4px;color:var(--gold);cursor:pointer;font-family:Heebo,sans-serif;">+ קבוצה</button>
      </div>
      <div>${g.members.map(m=>`<span class="member-tag sel" onclick="wzRemoveFromGroup(${gi},'${m.replace(/'/g,"\\'")}',this)">${esc(m)} ✕</span>`).join('')}
        ${!g.members.length?'<span style="font-size:.7rem;opacity:.3;">ריק</span>':''}</div>
    </div>`).join('');
    panel.innerHTML=html;
  }
}

function wzAddToGroup(student){
  const g=_wz.taskGroups.find(g=>g.members.length<6);
  if(g){g.members.push(student);wzBuildGroupsPanel();}
}
function wzRemoveFromGroup(gi,student){
  _wz.taskGroups[gi].members=_wz.taskGroups[gi].members.filter(s=>s!==student);
  wzBuildGroupsPanel();
}
function wzAddGroupSlot(){
  _wz.taskGroups.push({id:'g'+(_wz.taskGroups.length+1),name:'קבוצה '+(_wz.taskGroups.length+1),members:[]});
  wzBuildGroupsPanel();
}

async function wzAnalyzeInstructions(){
  const txt=document.getElementById('wf-instr').value.trim();
  if(!txt&&!_wz.instrFile){toast('הדביקי הוראות או העלי קובץ תחילה.');return;}
  const status=document.getElementById('wz-ai-status');
  status.style.display='block';
  status.innerHTML=`<div class="ai-status"><div class="ai-spin"></div>AI קורא את ההוראות...</div>`;
  const jp='החזר JSON בלבד: {"rubricType":"qa|eval","rationale":"הסבר קצר"}';
  try{
    let body;
    if(txt){
      body={model:'claude-sonnet-4-20250514',max_tokens:300,
        system:'אתה עוזר הוראה. ענה ב-JSON בלבד.',
        messages:[{role:'user',content:`קרא את הוראות המשימה הבאות וזהה: האם המשימה כוללת שאלות ספציפיות (qa) או קריטריונים כלליים להערכה (eval)?\n\n${txt.slice(0,800)}\n\n${jp}`}]};
    } else {
      const fc={type:_wz.instrFile.mediaType.includes('pdf')?'document':'image',
        source:{type:'base64',media_type:_wz.instrFile.mediaType,data:_wz.instrFile.base64}};
      body={model:'claude-sonnet-4-20250514',max_tokens:300,
        system:'אתה עוזר הוראה. ענה ב-JSON בלבד.',
        messages:[{role:'user',content:[fc,{type:'text',text:`זהה את סוג המשימה: qa (שאלות ספציפיות) או eval (קריטריונים).\n${jp}`}]}]};
    }
    const r=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    const raw=(d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    const res=JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0]||raw);
    _wz.rubricType=res.rubricType||'eval';
    document.getElementById('wz-rubric-type-section').style.display='block';
    const hints={qa:'זוהו שאלות ספציפיות — האפליקציה תבנה מחוון לפי שאלות',eval:'זוהו קריטריונים להערכה — האפליקציה תציע קריטריונים מקצועיים'};
    status.innerHTML=`<div class="info-box green">✅ ${res.rationale||hints[_wz.rubricType]||''}</div>`;
    document.querySelectorAll('#wz-rubric-type-section .radio-opt').forEach(el=>{
      const map={'qa':'📝 שאלות ותשובות','eval':'📊 קריטריונים','none':'ללא מחוון'};
      el.classList.toggle('sel',el.textContent.trim()===map[_wz.rubricType]);
    });
  }catch(e){status.innerHTML=`<div class="info-box" style="background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.3);color:#fca5a5;">⚠️ לא הצלחתי לנתח. בחרי סוג מחוון ידנית.</div>`;
    document.getElementById('wz-rubric-type-section').style.display='block';}
}

function wzSetRubricType(v,el){
  _wz.rubricType=v;
  document.querySelectorAll('#wz-rubric-type-section .radio-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

async function wzBuildFromImage(){
  if(!_wz.rubricImgFile){toast('העלי תמונת מחוון תחילה.');return;}
  const st=document.getElementById('wz-ai-build-status');
  st.innerHTML=`<div class="ai-status"><div class="ai-spin"></div>קורא מחוון מהתמונה...</div>`;
  try{
    const fc={type:_wz.rubricImgFile.mediaType.includes('pdf')?'document':'image',
      source:{type:'base64',media_type:_wz.rubricImgFile.mediaType,data:_wz.rubricImgFile.base64}};
    const r=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,
        system:'אתה עוזר הוראה. ענה ב-JSON תקני בלבד.',
        messages:[{role:'user',content:[fc,{type:'text',text:'קרא את המחוון בתמונה והחזר JSON:\n{"rubricType":"eval","criteria":[{"name":"שם","maxPoints":20,"description":"תיאור"}],"totalPoints":100}'}]}]})});
    const d=await r.json();
    const raw=(d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    const rubric=JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0]||raw);
    if(!rubric?.criteria?.length)throw new Error('לא נמצא מחוון');
    rubric.rubricType=_wz.rubricType||'eval';
    _wz.rubric=rubric;
    st.innerHTML=`<div class="info-box green">✅ מחוון נקרא — ${rubric.criteria.length} קריטריונים</div>`;
    renderWzRubricPreview(rubric);
  }catch(e){st.innerHTML=`<div class="info-box" style="background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.3);color:#fca5a5;">שגיאה: ${e.message}</div>`;}
}

async function wzBuildRubricAuto(){
  const name=_wz.data.name||'';
  const instr=(_wz.data.instructions||name).replace(/"/g,"'").slice(0,700);
  const type=_wz.data.type||'עבודה';
  const isQA=_wz.rubricType==='qa';
  const st=document.getElementById('wz-ai-build-status');
  st.innerHTML=`<div class="ai-status"><div class="ai-spin"></div>בונה מחוון...</div>`;
  const prompt=isQA
    ?`משימה: ${name}. סוג: ${type}. הוראות:\n${instr}\n\nזהה שאלות וסעיפים. בנה מחוון שאלות/תשובות.\nכללים חשובים:\n- כותרות בלבד ללא תיאור (לדוגמא: "שאלה 1 – סעיף א – זיהוי")\n- אל תמלא description\n- החזר JSON בלבד:\n{"rubricType":"qa","criteria":[{"name":"שאלה 1 – סעיף א – זיהוי","maxPoints":20,"description":"","answerKey":""}],"totalPoints":100}`
    :`משימה: ${name}. סוג: ${type}. הוראות:\n${instr}\n\nהצע קריטריונים מקצועיים מתאימים לסוג המשימה.\nקריטריונים מומלצים: דיוק מידע, ארגון וסדר, יצירתיות, שימוש במקורות, ביטוי בכתב.\nהחזר JSON בלבד:\n{"rubricType":"eval","criteria":[{"name":"קריטריון","maxPoints":20,"description":"מה נבדק"}],"totalPoints":100}`;
  try{
    const r=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,
        system:'אתה עוזר הוראה. ענה ב-JSON תקני בלבד. ללא טקסט לפני או אחרי.',
        messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const raw=(d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    const rubric=JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0]||raw);
    if(!rubric?.criteria?.length)throw new Error('מחוון לא תקין');
    rubric.rubricType=_wz.rubricType;
    _wz.rubric=rubric;
    st.innerHTML=`<div class="info-box green">✅ מחוון נבנה — ${rubric.criteria.length} קריטריונים</div>`;
    renderWzRubricPreview(rubric);
  }catch(e){st.innerHTML=`<div class="info-box" style="background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.3);color:#fca5a5;">שגיאה: ${e.message}</div>`;}
}

function renderWzRubricPreview(rubric){
  const isQA=rubric.rubricType==='qa';
  const total=rubric.criteria.reduce((s,c)=>s+(parseInt(c.maxPoints)||0),0);
  rubric.totalPoints=total;
  const rows=rubric.criteria.map((c,i)=>`
    <tr>
      <td style="padding:6px 7px;">
        <input class="ri" value="${esc(c.name||'')}" onchange="wzUpdateCrit(${i},'name',this.value)" style="margin-bottom:2px;">
        ${isQA?'<div style="font-size:.7rem;opacity:.35;margin-top:2px;">כותרת בלבד — תשובה מפתח בשלב הבא</div>':'<div style="font-size:.7rem;opacity:.35;margin-top:1px;">'+esc(c.description||'')+'</div>'}
      </td>
      <td style="width:62px;padding:6px 7px;">
        <input type="number" min="0" max="100" value="${parseInt(c.maxPoints)||0}"
          class="ri ri-num" onchange="wzUpdateCrit(${i},'maxPoints',parseInt(this.value)||0);wzUpdateTotal()">
      </td>
      <td style="width:30px;text-align:center;">
        <button onclick="wzRemoveCrit(${i})" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:.82rem;">✕</button>
      </td>
    </tr>`).join('');
  const prev=document.getElementById('wz-rubric-preview');
  prev._rubric=rubric;
  prev.innerHTML=`
    <div style="background:rgba(42,107,42,.08);border:1px solid rgba(42,107,42,.22);border-radius:9px;padding:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:.8rem;font-weight:700;color:#6ee7a0;">✅ מחוון — ערכי לפי הצורך</span>
        <span style="padding:2px 7px;border-radius:9px;font-size:.68rem;font-weight:700;
          background:${isQA?'rgba(109,40,217,.2)':'rgba(212,168,67,.12)'};
          color:${isQA?'#c4b5fd':'var(--gold)'};">${isQA?'📝 שאלות/תשובות':'📊 קריטריונים'}</span>
      </div>
      <table class="rubric-tbl">
        <thead><tr><th>${isQA?'שאלה / סעיף':'קריטריון'}</th><th style="width:62px;text-align:center;">ניקוד</th><th style="width:30px;"></th></tr></thead>
        <tbody id="wz-rubric-rows">${rows}</tbody>
      </table>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
        <button onclick="wzAddCrit()" style="padding:4px 10px;background:rgba(212,168,67,.07);border:1px dashed rgba(212,168,67,.28);
          border-radius:5px;color:var(--gold);font-size:.75rem;cursor:pointer;font-family:Heebo,sans-serif;">+ הוסף</button>
        <div style="font-size:.82rem;">סה"כ: <span id="wz-rubric-total" style="font-weight:700;color:${total===100?'#6ee7a0':'#f87171'};">${total}</span>
          ${total!==100?'<span style="color:#f87171;font-size:.72rem;"> ⚠️ חייב 100</span>':'<span style="color:#6ee7a0;font-size:.72rem;"> ✅</span>'}
        </div>
      </div>
    </div>`;
}

function wzUpdateCrit(i,f,v){
  const p=document.getElementById('wz-rubric-preview');
  if(p?._rubric)p._rubric.criteria[i][f]=v;
}
function wzUpdateTotal(){
  const p=document.getElementById('wz-rubric-preview');
  if(!p?._rubric)return;
  const t=p._rubric.criteria.reduce((s,c)=>s+(parseInt(c.maxPoints)||0),0);
  p._rubric.totalPoints=t;
  const el=document.getElementById('wz-rubric-total');
  if(el){el.textContent=t;el.style.color=t===100?'#6ee7a0':'#f87171';}
}
function wzRemoveCrit(i){
  const p=document.getElementById('wz-rubric-preview');
  if(!p?._rubric)return;
  p._rubric.criteria.splice(i,1);renderWzRubricPreview(p._rubric);
}
function wzAddCrit(){
  const p=document.getElementById('wz-rubric-preview');
  if(!p?._rubric)return;
  p._rubric.criteria.push({name:'קריטריון חדש',maxPoints:10,description:'',answerKey:''});
  renderWzRubricPreview(p._rubric);
}

function wzNext3(){
  const p=document.getElementById('wz-rubric-preview');
  if(!p?._rubric&&!_wz.rubric){toast('בני מחוון תחילה.');return;}
  _wz.rubric=p?._rubric||_wz.rubric;
  if(_wz.rubricType==='qa'){_wz.step=4;renderWizardStep();}
  else{saveWizardTask();}
}

/* STEP 4 — answer keys */
function renderWizStep4(){
  const criteria=_wz.rubric?.criteria||[];
  const rows=criteria.map((c,i)=>`
    <div style="margin-bottom:12px;padding:10px 12px;background:rgba(44,26,14,.5);border:1px solid var(--border);border-radius:8px;">
      <div style="font-size:.82rem;font-weight:700;margin-bottom:6px;color:var(--gold2);">${esc(c.name)}</div>
      <div class="ml" style="margin-bottom:4px;">תשובה נכונה / רכיבי חובה:</div>
      <textarea class="mi" id="ak-${i}" rows="3"
        placeholder="הזיני תשובה מלאה או רכיבים נדרשים..."
        style="background:rgba(109,40,217,.08);border-color:rgba(109,40,217,.3);color:#c4b5fd;">${esc(c.answerKey||'')}</textarea>
    </div>`).join('');
  document.getElementById('wizard-body').innerHTML=`
    <div class="wizard-title">שלב 4: תשובות מפתח</div>
    <div class="info-box purple" style="margin-bottom:12px;">💡 מלאי תשובות מפתח — האפליקציה תשתמש בהן לבדיקה אוטומטית. ניתן להשאיר ריק.</div>
    ${rows||'<div class="empty-state">אין קריטריונים</div>'}`;
  document.getElementById('wizard-btns').innerHTML=`
    <button onclick="_wz.step=3;renderWizardStep()" style="padding:7px 15px;background:none;border:1px solid var(--border);
      color:var(--parch);border-radius:7px;cursor:pointer;font-family:'Heebo',sans-serif;">← ערוך</button>
    <button class="btn-primary" onclick="wzSaveWithKeys()">💾 שמור מחוון ✓</button>`;
}

function wzSaveWithKeys(){
  if(_wz.rubric?.criteria){
    _wz.rubric.criteria.forEach((c,i)=>{
      const el=document.getElementById('ak-'+i);
      if(el)c.answerKey=el.value.trim();
    });
  }
  saveWizardTask();
}

function saveWizardTask(){
  const taskData={..._wz.data,groupMethod:_wz.groupMethod,taskGroups:_wz.taskGroups,rubricType:_wz.rubricType};
  if(_wz.rubric)taskData.rubric=_wz.rubric;
  if(_wz.editId){
    db.ref('teacher/tasks/'+_wz.editId).update(taskData);
    const t=tasks.find(t=>t.id===_wz.editId);
    if(t)Object.assign(t,taskData);
    toast('✓ המשימה עודכנה');
    closeModals();openTaskDetail(_wz.editId);
  } else {
    taskData.createdAt=Date.now();taskData.grades={};
    const ref=db.ref('teacher/tasks').push(taskData);
    tasks.push({id:ref.key,...taskData});
    toast('✓ המשימה נשמרה'+(taskData.rubric?' עם מחוון':''));
    closeModals();renderTasksList();renderAlerts();renderSubjectGrid();
  }
}

/* ══ TASK ACTIONS ══ */
function editCurrentTask(){openWizard(currentTaskId);}
function deleteTask(id){
  if(!confirm('למחוק?'))return;
  db.ref('teacher/tasks/'+id).remove();
  tasks=tasks.filter(t=>t.id!==id);
  toast('✓ נמחקה');renderTasksList();renderAlerts();renderSubjectGrid();
}
function deleteCurrentTask(){
  const t=tasks.find(t=>t.id===currentTaskId);
  if(!confirm(`למחוק "${t?.name||''}"?`))return;
  db.ref('teacher/tasks/'+currentTaskId).remove();
  tasks=tasks.filter(t=>t.id!==currentTaskId);
  toast('✓ נמחקה');
  openSubject(currentSubject);
}
function completeCurrentTask(){
  const task=tasks.find(t=>t.id===currentTaskId);if(!task)return;
  if(task.completed){
    if(!confirm('לפתוח מחדש?'))return;
    db.ref('teacher/tasks/'+currentTaskId+'/completed').remove();
    task.completed=false;toast('🔄 נפתחה מחדש');
  } else {
    if(!confirm('לסמן כמושלמת?'))return;
    db.ref('teacher/tasks/'+currentTaskId+'/completed').set(true);
    task.completed=true;toast('✅ הושלמה');
  }
  _renderDetail(task);renderAlerts();
}
function duplicateCurrentTask(){
  const t=tasks.find(t=>t.id===currentTaskId);

  // בנה modal פשוט — קבוצה ותאריכים בלבד

  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML=`
    <div style="background:#1a0e05;border:2px solid var(--gold);border-radius:14px;padding:24px;
      width:100%;max-width:460px;">
      <div style="font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;color:var(--gold2);margin-bottom:4px;">📋 שכפול משימה</div>
      <div style="font-size:.8rem;opacity:.55;margin-bottom:18px;">כל הנתונים, ההוראות והמחוון יועתקו. שנני רק את הקבוצה והתאריכים.</div>

      <div style="background:rgba(253,245,224,.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:.82rem;opacity:.7;">
        <div style="font-weight:700;margin-bottom:3px;">${esc(t.name)}</div>
        <div>${esc(t.type||'')} · ${esc(t.mode||'')} ${t.rubric?'· ✅ מחוון ('+( t.rubric.criteria?.length||0)+' קריטריונים)':''}</div>
      </div>

      <div style="margin-bottom:13px;">
        <div style="font-size:.77rem;color:var(--gold);opacity:.82;margin-bottom:5px;">קבוצת לימוד</div>
        <select id="dup-group" style="width:100%;padding:9px 11px;background:rgba(253,245,224,.07);border:1.5px solid rgba(212,168,67,.22);border-radius:7px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;outline:none;appearance:auto;">
          ${grOpts}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px;">
        <div>
          <div style="font-size:.77rem;color:var(--gold);opacity:.82;margin-bottom:5px;">תאריך פתיחה</div>
          <input type="date" id="dup-open" value="${t.openDate||today()}"
            style="width:100%;padding:9px 11px;background:rgba(253,245,224,.07);border:1.5px solid rgba(212,168,67,.22);border-radius:7px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;outline:none;">
        </div>
        <div>
          <div style="font-size:.77rem;color:var(--gold);opacity:.82;margin-bottom:5px;">תאריך הגשה</div>
          <input type="date" id="dup-due" value="${dft.toISOString().split('T')[0]}"
            style="width:100%;padding:9px 11px;background:rgba(253,245,224,.07);border:1.5px solid rgba(212,168,67,.22);border-radius:7px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;outline:none;">
        </div>
      </div>
      <div style="margin-bottom:18px;">
        <div style="font-size:.77rem;color:var(--gold);opacity:.82;margin-bottom:5px;">מועד אחרון לציונים</div>
        <select id="dup-gradedays" style="width:100%;padding:9px 11px;background:rgba(253,245,224,.07);border:1.5px solid rgba(212,168,67,.22);border-radius:7px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.88rem;outline:none;appearance:auto;">
          <option value="21" ${(t.gradeDays||21)==21?'selected':''}>3 שבועות</option>
          <option value="14" ${t.gradeDays==14?'selected':''}>2 שבועות</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="document.getElementById('dup-modal-overlay').remove()"
          style="padding:8px 18px;background:none;border:1px solid rgba(212,168,67,.22);color:var(--parch);
          border-radius:7px;cursor:pointer;font-family:'Heebo',sans-serif;">ביטול</button>
        <button onclick="saveDuplicate('${t.id}')"
          style="padding:8px 18px;background:linear-gradient(135deg,var(--gold),#b8860b);color:var(--ink);
          border:none;border-radius:7px;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;">
          📋 שמור עותק ✓

  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});

function saveDuplicate(srcId){
  const t=tasks.find(t=>t.id===srcId);
  if(!t)return;
  const groupId=document.getElementById('dup-group').value;
  const openDate=document.getElementById('dup-open').value;
  const due=document.getElementById('dup-due').value;
  const gradeDays=parseInt(document.getElementById('dup-gradedays').value)||21;
  if(!due){toast('נא למלא תאריך הגשה.');return;}

  // העתק הכל חוץ מציונים ותאריך יצירה
  const {grades:_,createdAt:__,...rest}=t;
  const newTask={
    ...rest,
    groupId,openDate,due,gradeDays,
    grades:{},
    createdAt:Date.now()
  };
  const ref=db.ref('teacher/tasks').push(newTask);
  tasks.push({id:ref.key,...newTask});
  document.getElementById('dup-modal-overlay')?.remove();
  toast('✓ המשימה שוכפלה'+(newTask.rubric?' עם המחוון':''));
  renderTasksList();
  renderAlerts();
  renderSubjectGrid();
}

/* ══ RUBRIC MODAL ══ */
function toggleRubricMenu(){const m=document.getElementById('rubric-menu');m.style.display=m.style.display==='block'?'none':'block';}
function closeRubricMenu(){document.getElementById('rubric-menu').style.display='none';}
document.addEventListener('click',e=>{
  const m=document.getElementById('rubric-menu');
  if(m&&!e.target.closest('[onclick*="toggleRubricMenu"]')&&!m.contains(e.target))closeRubricMenu();
});

function viewRubric(){
  const task=tasks.find(t=>t.id===currentTaskId);
  if(!task?.rubric){toast('אין מחוון למשימה זו');return;}
  const isQA=task.rubric.rubricType==='qa';
  const criteria=task.rubric.criteria||[];
  let html=`<div style="margin-bottom:8px;font-size:.8rem;font-weight:700;color:${isQA?'#c4b5fd':'var(--gold)'};">${isQA?'📝 שאלות/תשובות':'📊 קריטריונים'} · סה"כ ${task.rubric.totalPoints||100} נק׳</div>`;
  html+=criteria.map(c=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(212,168,67,.07);">

  _wz.rubricType=rubricType;
  _wz.editId=currentTaskId;
  _wz.rubric=null;
  _wz.step=3;
  renderWizardStep();

function saveRubricFromModal(){}

/* ══ EXPORT ══ */
function exportGrades(taskId,mode){
  const task=tasks.find(t=>t.id===taskId);if(!task)return;
  const gr=groups.find(g=>g.id===task.groupId);
  const students=gr?.students||[];
  const cell=v=>'"'+String(v??'').replace(/"/g,'""').replace(/\r?\n/g,' ')+'"';
  if(mode==='simple'){
    const rows=[['שם תלמיד/ה','ציון','הערה מילולית','תאריך בדיקה'].map(cell).join(',')];
    students.forEach(s=>{const key=s.replace(/ /g,'_');const g=task.grades?.[key]||{};
      rows.push([s,g.score??'',g.feedback||'',g.gradedAt?fmtDate(new Date(g.gradedAt).toISOString().split('T')[0]):''].map(cell).join(','));});
    dlFile('\uFEFF'+rows.join('\r\n'),task.name+'_ציונים.csv','text/csv;charset=utf-8');
    toast('✓ CSV הורד');
  } else {
    const cNames=task.rubric?.criteria?.map(c=>c.name)||
      (()=>{const n=[];students.forEach(s=>{const rs=task.grades?.[s.replace(/ /g,'_')]?.rubricScores||[];rs.forEach((r,i)=>{if(r.criterion&&!n[i])n[i]=r.criterion;});});return n;})();
    const hdr=['שם','ציון'];
    cNames.forEach(n=>{hdr.push('ניקוד — '+n,'הערה — '+n);});
    hdr.push('הערה מילולית','תאריך');
    const rows=[hdr.map(cell).join(',')];
    students.forEach(s=>{const key=s.replace(/ /g,'_');const g=task.grades?.[key]||{};
      const rs=g.rubricScores||[];const row=[s,g.score??''];
      cNames.forEach((_,i)=>{row.push(rs[i]?.score??'',rs[i]?.comment||'');});
      row.push(g.feedback||'',g.gradedAt?fmtDate(new Date(g.gradedAt).toISOString().split('T')[0]):'');
      rows.push(row.map(cell).join(','));});
    dlFile('\uFEFF'+rows.join('\r\n'),task.name+'_דוח_מפורט.csv','text/csv;charset=utf-8');
    toast('✓ דוח מפורט הורד');
  }
}
function dlFile(content,name,mime){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}

/* ══ MODAL HELPERS ══ */
function openModal(id){const m=document.getElementById(id);m.classList.add('open');m.style.display='flex';}
function closeModals(){document.querySelectorAll('.modal-overlay').forEach(m=>{m.classList.remove('open');m.style.display='none';});}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});

/* ══ UTILS ══ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(iso){if(!iso)return '—';const d=new Date(iso);return isNaN(d)?iso:d.toLocaleDateString('he-IL');}
function toast(msg,ms=2500){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.style.display='none',ms);
}
