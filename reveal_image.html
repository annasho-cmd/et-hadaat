<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>גלה את התמונה — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{--gold:#d4a843;--gold2:#f0c060;--parch:#fdf5e0;--surface:rgba(44,26,14,0.92);--border:rgba(212,168,67,0.22);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0a0602;color:var(--parch);min-height:100vh;direction:rtl;display:flex;flex-direction:column;}
.topbar{background:rgba(10,5,2,.98);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--gold2);flex:1;}
.btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.8rem;cursor:pointer;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;font-weight:700;}
.main{flex:1;display:flex;gap:0;overflow:hidden;}

/* IMAGE SIDE */
.img-side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;}
.puzzle-wrap{position:relative;display:inline-block;max-width:480px;width:100%;}
.puzzle-img{width:100%;display:block;border-radius:10px;}
.puzzle-grid{position:absolute;inset:0;display:grid;border-radius:10px;overflow:hidden;}
.puzzle-piece{background:linear-gradient(135deg,#1a0f05 0%,#2d1a08 100%);border:1.5px solid rgba(212,168,67,.15);transition:opacity .6s ease;cursor:default;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:rgba(212,168,67,.3);}
.puzzle-piece.revealed{opacity:0;pointer-events:none;}
.piece-num{font-size:.8rem;font-weight:700;color:rgba(212,168,67,.5);}

/* QUESTION SIDE */
.q-side{width:380px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.q-header{padding:14px 16px;border-bottom:1px solid var(--border);}
.q-title{font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:2px;}
.q-instruction{font-size:.78rem;opacity:.55;}
.progress-bar{height:4px;background:rgba(212,168,67,.15);border-radius:2px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s;}
.q-body{flex:1;overflow-y:auto;padding:16px;}
.q-card{background:rgba(253,245,224,.05);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.q-text{font-size:.92rem;line-height:1.6;margin-bottom:12px;}
.q-options{display:flex;flex-direction:column;gap:7px;}
.q-opt{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .15s;font-family:'Heebo',sans-serif;background:none;color:var(--parch);text-align:right;width:100%;}
.q-opt:hover{background:rgba(212,168,67,.1);border-color:var(--gold);}
.q-opt.correct{border-color:#22c55e;background:rgba(34,197,94,.15);pointer-events:none;}
.q-opt.wrong{border-color:#f87171;background:rgba(248,129,113,.1);pointer-events:none;}
.q-opt.disabled{pointer-events:none;opacity:.6;}
.guess-area{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.guess-label{font-size:.72rem;opacity:.5;margin-bottom:5px;}
.guess-input{width:100%;background:rgba(253,245,224,.06);border:1px solid var(--border);border-radius:7px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.85rem;padding:7px 10px;outline:none;resize:none;}
.guess-input:focus{border-color:var(--gold);}
.guess-btn{margin-top:6px;padding:7px 16px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:7px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;}
.result-msg{text-align:center;padding:10px;border-radius:8px;font-size:.88rem;font-weight:700;margin-top:8px;}
.result-msg.correct-msg{background:rgba(34,197,94,.15);color:#22c55e;}
.result-msg.wrong-msg{background:rgba(248,129,113,.1);color:#f87171;}

/* IMAGE NAV */
.img-nav{display:flex;gap:8px;margin-top:16px;}
.img-dot{width:10px;height:10px;border-radius:50%;background:rgba(212,168,67,.3);cursor:pointer;transition:all .15s;}
.img-dot.active{background:var(--gold);transform:scale(1.3);}

/* VICTORY */
.victory{text-align:center;padding:20px;}
.victory-emoji{font-size:3rem;margin-bottom:10px;}
.victory-title{font-family:'Frank Ruhl Libre',serif;font-size:1.3rem;color:var(--gold2);margin-bottom:6px;}
.victory-score{font-size:.95rem;opacity:.7;}
.btn-next{margin-top:14px;padding:10px 24px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:10px;font-family:'Heebo',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🖼️ גלה את התמונה</div>
  <span id="score-badge" style="font-size:.8rem;opacity:.5;"></span>
  <button class="btn" onclick="window.close()">✕</button>
</div>

<div class="main">
  <div class="q-side">
    <div class="q-header">
      <div class="q-title">ענה על השאלות וגלה מה מסתתר בתמונה</div>
      <div class="q-instruction" id="q-instruction"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="q-body" id="q-body">
      <div style="text-align:center;padding:40px;opacity:.3;">טוען...</div>
    </div>
  </div>

  <div class="img-side">
    <div class="puzzle-wrap" id="puzzle-wrap">
      <img id="puzzle-img" class="puzzle-img" src="" alt="תמונה">
      <div class="puzzle-grid" id="puzzle-grid"></div>
    </div>
    <div class="img-nav" id="img-nav"></div>
  </div>
</div>

<script>
const FB_CFG={apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",authDomain:"et-hadaat.firebaseapp.com",databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",projectId:"et-hadaat",storageBucket:"et-hadaat.firebasestorage.app",messagingSenderId:"141400405468",appId:"1:141400405468:web:c1090c52477d14a159cb19"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

const params=new URLSearchParams(window.location.search);
let revealData={images:[]};
try{revealData=JSON.parse(decodeURIComponent(params.get('data')||'{}'));}catch(e){}
const studentName=params.get('student')||'תלמיד';
const savePath=params.get('savePath')||null;

let currentImg=0;
let state={};// per image state

window.onload=function(){
  if(!revealData.images?.length){
    document.getElementById('q-body').innerHTML='<div style="opacity:.4;text-align:center;padding:30px;">אין נתונים</div>';
    return;
  }
  initImage(0);
  buildImgNav();
};

function initImage(ii){
  currentImg=ii;
  const img=revealData.images[ii];
  if(!img)return;
  if(!state[ii]){
    const qs=[...(img.questions||[])];
    state[ii]={questions:qs,queueIdx:0,revealed:0,total:img.pieces||6,guess:'',guessed:false,score:null};
  }
  // Set image
  let src=img.url||'';
  const m=(src).match(/\/file\/d\/([^\/\?]+)/);
  if(m)src=`https://drive.google.com/uc?export=view&id=${m[1]}`;
  document.getElementById('puzzle-img').src=src;
  buildGrid(img.pieces||6);
  updateNav();
  renderQuestion();
}

function buildGrid(pieces){
  const grid=document.getElementById('puzzle-grid');
  const cols=2,rows=pieces/2;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.style.gridTemplateRows=`repeat(${rows},1fr)`;
  grid.innerHTML='';
  const st=state[currentImg];
  for(let i=0;i<pieces;i++){
    const piece=document.createElement('div');
    piece.className='puzzle-piece'+(i<(st?.revealed||0)?' revealed':'');
    piece.id=`piece-${i}`;
    if(i>=(st?.revealed||0)){
      piece.innerHTML=`<span class="piece-num">${i+1}</span>`;
    }
    grid.appendChild(piece);
  }
  updateProgress();
}

function revealNextPiece(){
  const st=state[currentImg];
  if(st.revealed>=st.total)return;
  const piece=document.getElementById(`piece-${st.revealed}`);
  if(piece)piece.classList.add('revealed');
  st.revealed++;
  updateProgress();
  updateScoreBadge();
}

function updateProgress(){
  const st=state[currentImg];
  const pct=Math.round((st.revealed/st.total)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
}

function updateScoreBadge(){
  const st=state[currentImg];
  document.getElementById('score-badge').textContent=`${st.revealed}/${st.total} חלקים גולו`;
}

function renderQuestion(){
  const st=state[currentImg];
  const body=document.getElementById('q-body');
  if(!st.questions.length){
    body.innerHTML=buildGuessArea(st);
    return;
  }
  if(st.queueIdx>=st.questions.length||st.revealed>=st.total){
    // סיום — הצג ניחוש + תוצאה
    if(st.guessed||st.revealed>=st.total){
      showVictory();
    } else {
      body.innerHTML=buildGuessArea(st);
    }
    return;
  }
  const q=st.questions[st.queueIdx];
  const qHtml=q.type==='mc'?buildMC(q):buildTF(q);
  body.innerHTML=`<div class="q-card">
    <div style="font-size:.72rem;color:var(--gold);opacity:.5;margin-bottom:6px;">שאלה ${st.queueIdx+1} מתוך ${st.questions.length}</div>
    <div class="q-text">${esc(q.question)}</div>
    <div class="q-options">${qHtml}</div>
    <div id="q-result"></div>
  </div>
  ${buildGuessArea(st)}`;
}

function buildMC(q){
  return (q.options||[]).filter(Boolean).map((o,oi)=>`
    <button class="q-opt" onclick="answerMC(${oi},${q.correct})">${esc(o)}</button>`).join('');
}
function buildTF(q){
  return `<button class="q-opt" onclick="answerTF(true,${q.tfCorrect===true})">✅ נכון</button>
    <button class="q-opt" onclick="answerTF(false,${q.tfCorrect===false})">❌ לא נכון</button>`;
}

function buildGuessArea(st){
  return `<div class="guess-area">
    <div class="guess-label">מה מסתתר בתמונה? ניחוש שלי:</div>
    <textarea class="guess-input" id="guess-input" rows="2"
      placeholder="כתוב את הניחוש שלך...">${esc(st.guess||'')}</textarea>
    <button class="guess-btn" onclick="submitGuess()">שלח ניחוש ✓</button>
    ${st.guessed?`<div class="result-msg correct-msg">✅ הניחוש נשמר! (${st.revealed}/${st.total} חלקים)</div>`:''}
  </div>`;
}

function answerMC(chosen,correct){
  const isCorrect=chosen===correct;
  document.querySelectorAll('.q-opt').forEach((btn,i)=>{
    btn.classList.add('disabled');
    if(i===correct)btn.classList.add('correct');
    else if(i===chosen&&!isCorrect)btn.classList.add('wrong');
  });
  handleAnswer(isCorrect);
}
function answerTF(chosen,isCorrect){
  document.querySelectorAll('.q-opt').forEach(btn=>{
    btn.classList.add('disabled');
    const isTrue=btn.textContent.includes('נכון')&&!btn.textContent.includes('לא');
    if((isTrue&&isCorrect)||(!isTrue&&!isCorrect))btn.classList.add('correct');
    else if((isTrue&&!isCorrect)||(!isTrue&&isCorrect))btn.classList.add('wrong');
  });
  handleAnswer(isCorrect);
}

function handleAnswer(isCorrect){
  const st=state[currentImg];
  const resultEl=document.getElementById('q-result');
  if(isCorrect){
    if(resultEl)resultEl.innerHTML='<div class="result-msg correct-msg">🎉 נכון! חלק נוסף מתגלה...</div>';
    setTimeout(()=>{
      revealNextPiece();
      st.queueIdx++;
      if(st.revealed>=st.total){showVictory();return;}
      setTimeout(renderQuestion,400);
    },1000);
  } else {
    if(resultEl)resultEl.innerHTML='<div class="result-msg wrong-msg">❌ לא נכון. השאלה עוברת לסוף...</div>';
    // העבר שאלה לסוף התור
    const q=st.questions.splice(st.queueIdx,1)[0];
    st.questions.push(q);
    setTimeout(renderQuestion,1200);
  }
}

function submitGuess(){
  const st=state[currentImg];
  const val=document.getElementById('guess-input')?.value.trim();
  if(!val)return;
  st.guess=val;
  st.guessed=true;
  // שמור ל-Firebase
  if(savePath){
    db.ref(savePath+`/img${currentImg}`).set({
      guess:val,revealed:st.revealed,total:st.total,student:studentName,ts:Date.now()
    });
  }
  showVictory();
}

function showVictory(){
  const st=state[currentImg];
  const imgs=revealData.images;
  const hasNext=currentImg<imgs.length-1;
  document.getElementById('q-body').innerHTML=`
    <div class="victory">
      <div class="victory-emoji">${st.revealed>=st.total?'🎉':'🔍'}</div>
      <div class="victory-title">${st.revealed>=st.total?'גיליתם הכל!':'טוב מאוד!'}</div>
      <div class="victory-score">גיליתם ${st.revealed} מתוך ${st.total} חלקים</div>
      ${st.guess?`<div style="margin-top:8px;font-size:.82rem;opacity:.6;">הניחוש שלך: ${esc(st.guess)}</div>`:''}
      ${hasNext?`<button class="btn-next" onclick="nextImage()">לתמונה הבאה ←</button>`:''}
      ${!hasNext?`<button class="btn-next" onclick="window.close()">סיום ✓</button>`:''}
    </div>`;
  // גלה את כל שאר החלקים
  for(let i=st.revealed;i<st.total;i++){
    setTimeout(()=>{
      const piece=document.getElementById(`piece-${i}`);
      if(piece)piece.classList.add('revealed');
    },i*150);
  }
}

function nextImage(){
  if(currentImg<revealData.images.length-1){
    initImage(currentImg+1);
  }
}

function buildImgNav(){
  const nav=document.getElementById('img-nav');
  if(revealData.images.length<=1){nav.style.display='none';return;}
  nav.innerHTML=revealData.images.map((_,ii)=>`
    <div class="img-dot${ii===0?' active':''}" id="dot-${ii}" onclick="initImage(${ii})"></div>`).join('');
}
function updateNav(){
  document.querySelectorAll('.img-dot').forEach((d,i)=>{
    d.classList.toggle('active',i===currentImg);
  });
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
