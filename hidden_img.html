<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>גלה פרטים — עת הדעת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4a843;--gold2:#f0c060;--parch:#fdf5e0;--surface:rgba(44,26,14,.92);--border:rgba(212,168,67,.22);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0a0602;color:var(--parch);min-height:100vh;direction:rtl;}
.topbar{background:rgba(10,5,2,.98);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;}
.topbar-title{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--gold2);flex:1;}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.82rem;cursor:pointer;}
.btn:hover{background:rgba(212,168,67,.1);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;font-weight:700;}

.main{max-width:800px;margin:0 auto;padding:20px;}
.instruction{font-size:.88rem;opacity:.65;margin-bottom:12px;text-align:center;}
.score-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;}
.score-chip{padding:4px 14px;background:rgba(212,168,67,.1);border:1px solid var(--border);border-radius:20px;font-size:.82rem;color:var(--gold);}

/* IMAGE AREA */
.img-wrap{position:relative;display:block;cursor:crosshair;border-radius:12px;overflow:hidden;margin-bottom:14px;touch-action:none;}
.img-wrap img{width:100%;display:block;user-select:none;-webkit-user-drag:none;}

/* MARKERS */
.marker{position:absolute;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;pointer-events:none;transition:all .2s;}
.marker-empty{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);color:rgba(255,255,255,.7);cursor:crosshair;}
.marker-correct{background:#22c55e;border:2px solid #16a34a;color:#fff;animation:popIn .3s ease;}
.marker-student{background:rgba(212,168,67,.6);border:2px solid var(--gold);color:#1c1208;}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(.5);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}

/* RIPPLE on click */
.ripple{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(212,168,67,.3);transform:translate(-50%,-50%);animation:rippleAnim .5s ease-out forwards;pointer-events:none;}
@keyframes rippleAnim{from{width:10px;height:10px;opacity:1;}to{width:80px;height:80px;opacity:0;}}

/* WORD INPUT */
.word-input-popup{position:absolute;z-index:20;background:#1a0f05;border:1px solid var(--gold);border-radius:10px;padding:10px 12px;display:none;min-width:160px;}
.word-input-popup input{width:100%;background:rgba(253,245,224,.06);border:1px solid var(--border);border-radius:6px;color:var(--parch);font-family:'Frank Ruhl Libre',serif;font-size:.95rem;padding:6px 8px;outline:none;}
.word-input-popup input:focus{border-color:var(--gold);}
.word-input-popup .send-btn{display:block;width:100%;margin-top:6px;padding:6px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:6px;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}

/* FOUND LIST */
.found-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.found-chip{padding:4px 12px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:14px;font-size:.82rem;color:#6ee7b7;}

/* QUESTION */
.open-q{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:none;}
.q-label{font-size:.85rem;opacity:.7;margin-bottom:8px;}
.q-textarea{width:100%;background:rgba(253,245,224,.06);border:1.5px solid var(--border);border-radius:8px;color:var(--parch);font-family:'Heebo',sans-serif;font-size:.9rem;padding:10px;outline:none;resize:vertical;min-height:80px;}
.q-textarea:focus{border-color:var(--gold);}
.q-save-btn{margin-top:8px;padding:8px 20px;background:linear-gradient(135deg,var(--gold),#b8860b);color:#1c1208;border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;}

/* FEEDBACK toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:24px;font-size:.88rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;}
.toast.success{background:#22c55e;color:#fff;}
.toast.wrong{background:#f87171;color:#fff;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🕵️ גלה פרטים מסתתרים</div>
  <span id="score-badge" style="font-size:.78rem;opacity:.45;"></span>
  <button class="btn" onclick="window.close()">✕</button>
</div>

<div class="main">
  <div class="instruction" id="instruction"></div>
  <div class="score-row">
    <div class="score-chip" id="score-chip">0 / 0 נמצאו</div>
    <div style="font-size:.75rem;opacity:.35;">לחץ/י על התמונה במקום שבו מסתתר הפרט</div>
  </div>
  <div class="img-wrap" id="img-wrap">
    <img id="main-img" src="" alt="תמונה" onerror="this.style.opacity='.3'">
  </div>
  <!-- WORD INPUT POPUP -->
  <div class="word-input-popup" id="word-popup">
    <input type="text" id="word-input" placeholder="כתוב את המילה..." autocomplete="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')submitWord()">
    <button class="send-btn" onclick="submitWord()">אשר ✓</button>
  </div>

  <div class="found-list" id="found-list"></div>
  <div class="open-q" id="open-q">
    <div class="q-label" id="q-label"></div>
    <textarea class="q-textarea" id="q-answer" placeholder="כתוב/כתבי את תשובתך כאן..."></textarea>
    <button class="q-save-btn" onclick="saveAnswer()">שמור תשובה ✓</button>
    <div id="q-saved" style="font-size:.75rem;color:#6ee7b7;margin-top:6px;display:none;">✅ נשמר</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const params=new URLSearchParams(window.location.search);
let hiData={instruction:'',imageUrl:'',hotspots:[],question:''};
try{hiData=JSON.parse(decodeURIComponent(params.get('data')||'{}'));}catch(e){}

const TOLERANCE=12; // אחוז קרבה (מתוך 100)
const hotspots=hiData.hotspots||[];
let found=new Set(); // אינדקסים שנמצאו
let pendingHotspot=null; // אינדקס hotspot שממתין לאישור מילה

window.onload=function(){
  document.getElementById('instruction').textContent=hiData.instruction||'מצאו את הפרטים המוסתרים בתמונה';
  let src=hiData.imageUrl||'';
  const m=src.match(/\/file\/d\/([^\/\?]+)/);
  if(m)src=`https://drive.google.com/uc?export=view&id=${m[1]}`;
  document.getElementById('main-img').src=src;
  updateScore();

  // מאזין לחיצה
  const wrap=document.getElementById('img-wrap');
  wrap.addEventListener('click',handleImgClick);
  wrap.addEventListener('touchend',e=>{e.preventDefault();handleImgClick(e.changedTouches[0]);},{passive:false});
};

function handleImgClick(e){
  const img=document.getElementById('main-img');
  const wrap=document.getElementById('img-wrap');
  const rect=img.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width)*100;
  const y=((e.clientY-rect.top)/rect.height)*100;

  // סגור popup קיים
  closePopup();

  // הוסף אפקט ripple
  addRipple(e.clientX-rect.left,e.clientY-rect.top);

  // בדוק קרבה ל-hotspot שלא נמצא
  let closest=null,closestDist=Infinity;
  hotspots.forEach((hs,i)=>{
    if(found.has(i))return;
    if(hs.x==null)return;
    const dist=Math.sqrt(Math.pow(x-hs.x,2)+Math.pow(y-hs.y,2));
    if(dist<TOLERANCE&&dist<closestDist){closestDist=dist;closest=i;}
  });

  if(closest!==null){
    // נמצא! פתח popup לכתיבת המילה
    pendingHotspot=closest;
    showPopup(e.clientX-rect.left,e.clientY-rect.top);
    // הוסף סמן זמני
    addStudentMarker(x,y,closest);
  } else {
    // לא נמצא
    showToast('לא כאן... נסה/י שוב 🔍','wrong');
  }
}

function addRipple(x,y){
  const wrap=document.getElementById('img-wrap');
  const ripple=document.createElement('div');
  ripple.className='ripple';
  ripple.style.left=x+'px';ripple.style.top=y+'px';
  wrap.appendChild(ripple);
  setTimeout(()=>ripple.remove(),500);
}

let tempMarkers=[];
function addStudentMarker(x,y,hi){
  const wrap=document.getElementById('img-wrap');
  const m=document.createElement('div');
  m.className='marker marker-student';
  m.id=`student-marker-${hi}`;
  m.style.left=x+'%';m.style.top=y+'%';
  m.textContent='?';
  wrap.appendChild(m);
  tempMarkers.push(m);
}

function showPopup(x,y){
  const popup=document.getElementById('word-popup');
  const wrap=document.getElementById('img-wrap');
  const wRect=wrap.getBoundingClientRect();
  popup.style.display='block';
  popup.style.left=Math.min(x,wRect.width-170)+'px';
  popup.style.top=(y+10)+'px';
  document.getElementById('word-input').value='';
  setTimeout(()=>document.getElementById('word-input').focus(),50);
}

function closePopup(){
  document.getElementById('word-popup').style.display='none';
  // הסר סמנים זמניים
  tempMarkers.forEach(m=>m.remove());
  tempMarkers=[];
  pendingHotspot=null;
}

function submitWord(){
  if(pendingHotspot===null)return;
  const val=(document.getElementById('word-input').value||'').trim();
  if(!val)return;
  const hs=hotspots[pendingHotspot];
  const correct=val.toLowerCase()===hs.label?.toLowerCase();

  if(correct){
    found.add(pendingHotspot);
    // הסר סמן זמני, הוסף סמן קבוע
    document.getElementById(`student-marker-${pendingHotspot}`)?.remove();
    const wrap=document.getElementById('img-wrap');
    const marker=document.createElement('div');
    marker.className='marker marker-correct';
    marker.style.left=hs.x+'%';marker.style.top=hs.y+'%';
    marker.textContent=found.size;
    wrap.appendChild(marker);
    closePopup();
    addFoundChip(hs.label);
    updateScore();
    showToast('🎉 נכון! '+hs.label,'success');
    if(found.size===hotspots.filter(h=>h.x!=null&&h.label).length){
      setTimeout(openQuestion,800);
    }
  } else {
    document.getElementById(`student-marker-${pendingHotspot}`)?.remove();
    tempMarkers=[];
    pendingHotspot=null;
    document.getElementById('word-popup').style.display='none';
    showToast('המילה לא מתאימה... נסה/י שוב','wrong');
  }
}

function addFoundChip(label){
  const list=document.getElementById('found-list');
  if(!list.querySelector(`[data-label="${label}"]`)){
    const chip=document.createElement('div');
    chip.className='found-chip';
    chip.dataset.label=label;
    chip.textContent='✓ '+label;
    list.appendChild(chip);
  }
}

function updateScore(){
  const total=hotspots.filter(h=>h.x!=null&&h.label).length;
  const f=found.size;
  document.getElementById('score-chip').textContent=`${f} / ${total} נמצאו`;
  document.getElementById('score-badge').textContent=`${f}/${total}`;
}

function openQuestion(){
  if(!hiData.question)return;
  const qEl=document.getElementById('open-q');
  qEl.style.display='block';
  document.getElementById('q-label').textContent=hiData.question;
  qEl.scrollIntoView({behavior:'smooth'});
}

function saveAnswer(){
  const val=document.getElementById('q-answer')?.value||'';
  if(!val.trim())return;
  const saved=document.getElementById('q-saved');
  if(saved){saved.style.display='block';setTimeout(()=>saved.style.display='none',2500);}
}

let toastTimer=null;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=`toast ${type} show`;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
