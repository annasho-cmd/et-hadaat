<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ענן מילים — תלמיד</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Heebo',sans-serif;
  background:radial-gradient(ellipse at center,#0d1b2a,#060d14);
  color:white;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.box{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:18px;padding:32px 28px;
  max-width:480px;width:100%;text-align:center;
}
.cloud-icon{font-size:3rem;margin-bottom:12px;}
.question{
  font-family:'Frank Ruhl Libre',serif;
  font-size:1.3rem;font-weight:700;
  color:#f0c060;margin-bottom:6px;line-height:1.5;
}
.hint{font-size:.8rem;opacity:.45;margin-bottom:22px;}
.word-input{
  width:100%;background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.15);
  border-radius:10px;padding:14px 16px;
  color:white;font-family:'Frank Ruhl Libre',serif;
  font-size:1.3rem;font-weight:700;text-align:center;
  outline:none;transition:border .2s;margin-bottom:14px;
  direction:rtl;
}
.word-input:focus{border-color:#f0c060;}
.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#d4a843,#b8860b);
  color:#1c1208;border:none;border-radius:10px;
  font-family:'Heebo',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;transition:opacity .2s;
}
.btn-submit:hover{opacity:.9;}
.btn-submit:disabled{opacity:.4;cursor:default;}
.success{
  text-align:center;padding:12px;
  background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);
  border-radius:10px;color:#86efac;font-size:.9rem;margin-top:12px;
  display:none;
}
.waiting-msg{
  text-align:center;opacity:.4;padding:24px;
}
.mini-cloud{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  margin-top:18px;max-height:120px;overflow:hidden;
}
.mini-word{
  padding:3px 10px;border-radius:12px;font-size:.78rem;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);
}
.submitted-word{
  font-size:1rem;font-weight:700;color:#86efac;margin-top:10px;
}
</style>
</head>
<body>

<div class="box">
  <div class="cloud-icon">☁️</div>

  <!-- Waiting state -->
  <div id="state-waiting" class="waiting-msg">
    <div style="font-size:1rem;margin-bottom:6px;">ממתין לשאלה מהמורה...</div>
    <div style="font-size:.75rem;">הענן יתעדכן אוטומטית</div>
  </div>

  <!-- Active state -->
  <div id="state-active" style="display:none;">
    <div class="question" id="question-text"></div>
    <div class="hint">כתבי מילה אחת או שתיים בלבד</div>

    <input class="word-input" id="word-input" maxlength="20"
      placeholder="מילה..."
      onkeydown="if(event.key==='Enter')submitWord()"
      oninput="this.value=this.value.replace(/[^א-תa-zA-Z\s]/g,'')" />

    <button class="btn-submit" id="btn-submit" onclick="submitWord()">✦ שלחי</button>

    <div class="success" id="success-msg">
      ✓ התשובה שלך נשמרה!
      <div class="submitted-word" id="submitted-word-display"></div>
      <div style="font-size:.75rem;margin-top:6px;opacity:.7;">תוכלי לשנות — שלחי שוב</div>
    </div>

    <!-- Mini cloud preview -->
    <div class="mini-cloud" id="mini-cloud"></div>
  </div>
</div>

<script>
const FB = {
  apiKey:"AIzaSyA9Kut3G11sTzZYG1DBpyVPzLv2bTNvChw",
  authDomain:"et-hadaat.firebaseapp.com",
  databaseURL:"https://et-hadaat-default-rtdb.firebaseio.com",
  projectId:"et-hadaat",
  storageBucket:"et-hadaat.firebasestorage.app",
  messagingSenderId:"141400405468",
  appId:"1:141400405468:web:c1090c52477d14a159cb19"
};
try{firebase.initializeApp(FB);}catch(e){}
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const studentName = decodeURIComponent(params.get('student') || params.get('name') || '');
const studentKey = studentName.replace(/ /g,'_') || ('anon_' + Math.random().toString(36).substr(2,6));

let currentSessionId = null;

// Listen to active session
db.ref('wordcloud/active').on('value', snap => {
  const d = snap.val();
  if(d && d.active && d.sessionId){
    currentSessionId = d.sessionId;
    document.getElementById('question-text').textContent = d.question || '';
    document.getElementById('state-waiting').style.display = 'none';
    document.getElementById('state-active').style.display = 'block';
    listenToWords(d.sessionId);

    // Check if already submitted
    db.ref('wordcloud/sessions/' + d.sessionId + '/words/' + studentKey).once('value', snap2 => {
      const existing = snap2.val();
      if(existing && existing.word){
        showSuccess(existing.word);
      }
    });
  } else {
    currentSessionId = null;
    document.getElementById('state-waiting').style.display = 'block';
    document.getElementById('state-active').style.display = 'none';
  }
});

function submitWord(){
  const word = document.getElementById('word-input').value.trim();
  if(!word || !currentSessionId)return;
  if(word.split(/\s+/).length > 2){
    alert('כתבי מילה אחת או שתיים בלבד!');
    return;
  }
  db.ref('wordcloud/sessions/' + currentSessionId + '/words/' + studentKey).set({
    word,
    name: studentName,
    submittedAt: Date.now()
  });
  showSuccess(word);
}

function showSuccess(word){
  document.getElementById('success-msg').style.display = 'block';
  document.getElementById('submitted-word-display').textContent = '"' + word + '"';
  document.getElementById('word-input').value = word;
}

function listenToWords(sessionId){
  db.ref('wordcloud/sessions/' + sessionId + '/words').on('value', snap => {
    const data = snap.val() || {};
    // Build mini cloud
    const wordCount = {};
    Object.values(data).forEach(e => {
      if(e.word) wordCount[e.word] = (wordCount[e.word]||0)+1;
    });
    const sorted = Object.entries(wordCount).sort((a,b)=>b[1]-a[1]).slice(0,15);
    const cont = document.getElementById('mini-cloud');
    cont.innerHTML = sorted.map(([w,c]) =>
      `<span class="mini-word">${w} <small style="opacity:.5;">${c}</small></span>`
    ).join('');
  });
}
</script>
</body>
</html>
